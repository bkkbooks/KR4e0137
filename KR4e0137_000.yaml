body:
  text: 虚齋集别集類五明提要臣等謹案虚齋集五巻眀蔡清撰清字介夫晉江人成化甲辰進士官至江西提舉副使以守正忤寜王宸濠将中以罪謝病歸越數月起為南京國子監祭酒未及上而卒萬厯中賜謚文荘事蹟具眀史儒林傳清初學主於静後主於虚謂天下之理以虚而入亦以虚而應故自號虚齋成化間士大夫多空談理學惟清䔍實力行能不為訓詁支離所域所著易蒙引四書蒙引諸書皆别著録眀史藝文志載清所著虚齋文集五巻與此本合清為學以窮理為主平生篤守朱子之説其讀蜀阜存稿私計中謂朱陸俱宗孔孟而門戸不同然陸學未盡符於大中至正之矩不免為偏安之業其宗㫖所在可以槩見及其釋周易時於朱子之解意有未安者又多所異同不為苟合是其識解通逹與諸儒之膠固執滯者不同故其文章亦純厚朴質言皆有物雖不以藻彩見長而布帛菽粟之言殊非雕文刻鏤者所可㡬及至本傳稱清在吏部因王恕訪以時事清上二札一請振紀綱一薦劉大夏等三十餘人恕皆納用檢其文並不見集中盖編輯時巳有遺佚而今不可考矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀虚齋集原序温陵蔡介夫虚齋飾躬砥行動凖古人其學以六經為正宗四書為嫡傳四儒為真𣲖平生精力盡用之易四書蒙引之間闡發幽秘梓學宫而行天下其於易深矣究性命之原通幽微之故真有以見夫天下之賾象其物宜天下之動通其典禮四方學士師宗之曰虚齋説也守毋變扶衰振落温陵造就可謂易學一時矣經義趣深理到論䇿諸作暢達疏爽詩文别出體格掖人心而繫名教卒澤於仁義道徳粹如也貞剛善晦而亦間取夫名者之忌在禮曹三原王端毅公引入為吏曹竟復為禮曹乞南又乞告特起按察副使督學江西寧庶人仇予因仇介夫介夫引而去逆瑾亂政起祭酒以鎮壓人望而介夫先沒矣嗚呼介夫之不為鼂錯龜山非幸耶景尚遺徳姚英之諸君子為立祠葛石厓志貞為輯遺文梓之一時交與予在也序其可辭夫有造道之文有述事之文楊子雲曰商書灝灝爾周書噩噩爾後世有作其雄視前人亦不為少矣卒之無足嗣往徽而歆来聽又況移情役物越禮分而為者嗚呼邪説也贅言也雅論也知斯三者可以定是文矣其不然文華作氣質雅收聲而去道逺而昔後村序艾軒之文曰以言語文字行世非先生意也介夫言語文字間哉介夫初主於靜既又主於虚楊月湖方正曰主於靜是時理學中輟二公寗永貞丁王夫江朝東崛起於曠鈎深索隠二公殆獨得云正徳辛巳夏仲道友見素林俊書于雲莊青野
