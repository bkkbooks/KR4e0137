body:
  text: 虛齋集巻二明蔡清撰書寓杭州上瓊山邱祭酒先生書清自拜别而南再閲月矣念親庭日近私心每以自喜而顧師門日逺則此心又有不能不自惜者何也清生扵逺方自其少小始解人言語即聞當今天下有老先生矣稍長頗識讀書時時從長者求得老先生所為文章誦之雖淺陋不足以窺測其奥然竊見其詞氣老健理味悠長而光明闓爽正大無竒語無難字而亦無軟態讀其文者賢愚皆獲其益意其胸中所守確然而表裏洞達當以氣節道徳名世者也扵時雖未由一挹春風而心則以為依歸所在久矣顧踈賤俗子仰瞻天人何路請閽凡更㡬春秋乃今得至亰師羣四方之士以觀盛徳之光扵闤橋之下而又得在與進之列時賜教督以開發其愚昧凡平生大制作欲以訂既往以垂將來者皆得而伏讀之扵是向日之所慨想慕望以為可仰而不可親者一朝為知己清自念亦幸矣用是深願得留供灑掃以卒業焉而鄙人家宅之私竟有以奪之曽不踰時遂爾趣歸百年之幸忽自棄之他日尚能必得其門而入耶顧彼四方山林之下稍有志者仰清譽而讀雄文尚欲奔走門庭一領餘光而不可得而清也遭遇若此乃亦自棄而歸然則是歸也尚得如老先生者為之依歸耶縱能私有所進而鑿空杜撰其能㡬何耶此清之所以怏怏而自惜焉者也未審比日尊候如何清途次藉庇粗安第近南來天氣彌熱舟中不能常親筆硯所命批㸃易經大全八册尚有一册未完負罪負罪清竊謂此一經者當時諸老纂脩既不依古易編次如象曰彖曰等字至今不知何謂而所采諸家之説又或多咈扵義理而乖扵本義至朱子有向前未定之説明與本義不同者亦多搜掠以備成書使天下學者猶或紛扵多説而靡所適從似扵古人所以一道徳之意猶未也嗚呼當時諸老何人也猶有此憾况區區淺生俗學安敢有所是非扵其間哉承命以來無任愧恐姑以本義為宗而以尊命為㩀自程傳之外凡合扵本義者批之其非本義意者空之有雖扵本義不甚切而實有發扵義理者亦批之有雖切扵本義而一意錯出者則惟批其一二而餘皆空之有本義意兼两三端而彼僅得其一二者則亦批之有文采甚爛似扵舉業可用而實詞勝理者則亦空之有數十句皆通而僅一二句未妥者則批其數十句而空其一二句有數十字皆通而僅一二字未妥者則批其數十字而空其一二字有連板數説無一切要者則皆空之有連板數説而無一不切要者則皆批之但主理勝不甚拘舉業要用也然而亦在其中矣至扵訓詁名義之間大體凡例之際雖非舉業所急然切以為此等處乃入易門户學者尤不可不理㑹故亦從而批之若其中閑字稍有可畧則皆畧之矣所恨性質愚魯工夫尤極麄踈殊不能得其精當以副尊意徒能用其一已井蛙之見而已竊料朋友間見之必多有不合而疵議非笑者然而區區選取之間盖亦未嘗無説也惟老先生清暇時試一過目而加増損焉則幸也獨繫辭傳一册義理最為㣲妙衆説尤為紛拏閒嘗取而讀之乃有思量移日而竟不得其歸一之説者故未敢下手也夫上下經義理非獨易扵繫辭傳也經中一畵一字中涵天人之秘亦烏可以易言但却自為條項可以逐一理㑹又彖者材也爻也者效天下之動也既曰材曰動則有迹可尋矣若夫大傳則多取源頭大道理發之動數十百言所言者或三才之道或鬼神之情狀又或先天後天圖意也此豈淺生俗學所能定其説哉政使有得扵萬一亦豈能自信其必然哉故此須老先生自裁之或更命工夫深者理之乃庶㡬不誤讀者耳清固不敢非特以舟中天熱不及為之故也遵命扵河道屢訪海大尹舟欲以附之竟不遇今至杭州因以託張鴻臚云與孫九峯先生書清所以見怒扵寧王者一是賀王夀之旦不得已獨去了朝服中蔽膝一件為嫌其服制與在朝行扵親王者不同而與行扵皇上者無異也二是三司官舊用初一十五日朝王而扵初二十六日謁孔夫子清乃力請三司勿徇舊例俱用初一十五日行禮乃先謁孔夫子此乃以正禮處王王却疑清有他意扵其間也三是王素有憾扵林待用都憲䜛人因言清與待用頗厚王遂併怒清而力求清之短使人扵亰師傳謗欲以併壊之不知清碌碌凡品豈敢望林公髙致王亦待之過矣抑清在官儘有過失然亦皆可對人言者固不之恤也四是王素知清無學術一日扵宴侍間故設機械直譏其不能詩文清姑㨿理對之為稍咈其初意盖朝廷方面官豈容藩王輕易挫折也至扵奏討䕶衛事清當時已知為王積怒而同僚又有挟術相傾者寧復敢一語及之王乃對三司道清獨有後言明欲誣以非議詔㫖之罪清故因同僚之諭亦明言王者不宜輕易發言朝廷按察司官藩王亦不宜輕易訕詈且王此語必得之人所傳言若所傳果真豈但可發之扵三司便應以聞扵朝而罪之然傳言之人必得以為證固未可輕加誣也為此累不敢輕自屈以取容随其多方捃拾乍冷乍暖自信有道理在也特聞此王府中諸般左道俱有誠慮一旦死扵無名則非惟有孤朝廷任使及斯文責望之意而吾一身上闗祖宗所傳付下係族姓所籍頼者俱未有一毫成立亦可虞也故遂决意引疾致仕耳此其大畧也餘不敢盡言想近日江西人士至亰傳説不一或有失真而惑知舊之聴者便中姑畧及此盖清亦不得已而致仕耳豈是能髙者况官任提學亦無用别索髙名也若有意扵髙則矯激矣清不為也但今得善其退亦幸之甚矣相見知無日造次𤨏𤨏代面心照可也自知而宻之可也正徳三年正月日某再拜上天台謝祭酒先生書清家居時提學周時可先生嘗為清道及盛徳云秉禮持義一時學士大夫所共推重清雖不肖心已知向往矣已而得赤城論諌録讀之又得遜志齋集及赤城詩集讀之三集者皆執事所訂定表章其所闗渉與近時人所刋行泛泛者逈不類執事所養扵是益昭然可辨私心益用勤向慕不能忘第愚下之資不能遂藉是以私淑為愧耳三集之中遜志一編則天地正氣沉欝百年而㡬冺㓕者一旦遂得其全以顯行扵當世執事與黄亞卿公及前學諭趙先生之功大矣噫如遜志者盖千載一人也天地幸生斯人而乃不終祐之使斯人得竟為人世用天地果有知乎哉痛言及此使人直有追憾天地之心柰之何哉使斯人當日得盡行其志愚以為伊周格天之業宜亦不逺而竟止此謂之何哉吾知良工為之苦心甚矣篇為之收句為之訂今日編集之勞不减昔日著述之功矣遂使其正學其義氣今得與日月並垂光扵天壌之内人人得而仰之自當萬古不磨即此亦可以見道理之外利害成敗所較終不多古今真可以旦暮視也理長扵數亦明矣而執事之功亦扵是乎有不可磨矣始清得覽是集時以為執事盖遜志知己也于時蓽門私願只欲得執事輩人當路為斯文宗主庶幾得以幸斯人而今日執事所位實宗主斯文之任也豈非今日世道一機㑹哉清知執事自是得專為斯文出氣力凡闗繫世道好事在所得為者皆不久次第見矣近之為國家生長人才逺之為宇宙春秋是非進之而遂斷國論贊皇猷以盡出其素藴者盖皆自有其地如所聞近日條上六事亦其重節目也昔人只云仕宦當作執金吾執金吾趣味如國子祭酒其小大逺近豈可以同年語哉此天下知執事者之所為共快固将大有期扵後來也清向得見執事扵劉時雍方伯所繼遂進拜扵朝房以十數年之仰慕而幸得瞻望扵一旦乃又若淡乎其情而全無所云云者清自知固甚明恐執事過聽未知清之愚下而與進或太早耳盖清蚤有慕賢之心然慕來慕去至今尚未得所慕到手今此之來碌碌何為秪是為升斗之禄從事簿書求免責而已故每見賢人君子談吐間亦不欲多及好人好事有似乎厭言之者而亦不欲數數往來扵大人君子之門者以受教未有其地徒多往還無益或秪為賢者累也此豈有志慷慨舊勵者之為哉誠有自知自䖏之一私見意執事或未之察也因便真吐其情云執事南行時清以賤疾在告不及拜送至負至負久欲奉書一謝以素拙扵翰墨尚未及也近者家叔父監生睿從御史刷巻復命来京言執事扵語次曽一齒及且又有所恵教直以行時勢所拘制不及禀領為負耳生得此益増感愧昨因家叔父復監行迫簡率奉謝未盡所言兹者人便特此少布悃素庶幾執事亦得知生非自甘於外者云寄周黄門書南都别後執事之風神道履常聳然目睫中清自抵家忽忽六七載匆匆僅如數日其中憂故孔多百不如意分内可知不欲縷縷既而得覩執事扵壬戌登科録繼聞两縣卓異政蹟雖音問两濶而中情相愛如春矣即今擢位黄門亦得行其道之地而大行所學使萬物各得其所之階也懋哉懋哉尊府老先生九月初遇此病中幸得奉侍半日辱所以䇿勵不肖父子者深逺備至銘心之感有難名言前此清有書托陳進士錫齋轉奉渠未果行又有托陳克謹寅長渠又以中途得命留家不竟達只此片心欝欝莫展久矣其為負也清禀氣既駁且弱年邁五十而扵分内曽未能一成立今兹冐名提學而實學不聞道力不副心自知有負兹任徒貽斯文羞况學政所闗儘重豈容老病庸流久尸其位不即自引退哉已扵七月馳本乞致仕今只待報到即行儻吏部或更行勘鎮巡有相留意亦當繼有陳也適因豐城令朱君佐行奉此少申數年契闊之情病中不次不悉統祈心照外奉韓栁文一部備覽又程文及文移各一册不為知己者自諱其醜也與陳時安憲副書自己酉嵗七月都下一别抵今適周二嵗敬慕之心未嘗少忘去嵗論裁减宦鎮以靖地方一䟽堂老三位皆嘖嘖稱當清亦私録一通近日為公借㸔亦皆以為切實精至之論也顧斯言之行不行其所闗繫豈細故哉然自公發之安知其不終行扵後日也且公節行政事色色出人他日将必有以慰民望者固辱愛小子之所願見者也林待用今已長憲雲南前在雲南數年威恵甚著下民敬信如神明林廷玉先生在彼巡按每書來輒推重且曰所知鄉邦中最出色者矣李貞伯儲静夫在南都學行之重人無間言果符向日所諭近又有王鴻儒者字懋學南陽人年三十二三學識不减静夫而勵志有為又皆可望但自以學未成尚韜蓄其鋭他日當有見扵世者因并為吾人及之意皆所樂聞也懋學今為南京户部主事兹因提學周先生告行益注懐仰臨紙初若無可言忽不覺縷縷又清友鄭昇者侯官縣人今為廣東掲陽教諭其華藻似不甚出人而其學最正文亦自好行尤可重來嵗廣西若缺考試官此人某所任也亦周先生所知者公可恊贊然非其有屬扵清也幸亮之如不缺人則已不宜固必也上東山劉先生書清戊午嵗寓都下得拜送老先生致仕南歸當是時老先生已絶念世途自分與赤松子為伴矣既而為先帝所簡在士望所推戴幡然復起為國家擔當大事無少趦趄前却之態此豈止如近世名流期以一節自髙者所可論其涯量也哉且老先生數年在朝廷天下士夫人人知其不可一日無者况重以先帝之遺托去之一字在老先生豈忍􅃍出之口而形之辭哉彼人念不及天下大計識不剖破世間黒白而徒顛倒公論以效順私門而老先生則因事見㡬欲以全一生之大節欲以全君父之大恩欲以立士夫之表則固宜决扵今日之一去也然老先生今日之去為老先生計固得之矣若為朝廷計為天下計則有大不然者不知誰當執其咎耳清自别去南都近二年家居又六年自知凡百有退無進自甘槁死扵下矣乃承老先生列位當道不棄使供今日之事真所謂以蚊負山者日夕戰慄非可自知而令甥李學諭亦能察此意而相之庶幾可不至甚得罪扵斯文清亦自揣矣果才弱不勝便當及早引身而退當不令重得罪扵大人君子輩也數年以在草野不能致書古云莫謂無心向門下也曽終夕望三台清之情正類此兹因令甥之便敬此少布其私莫盡愚悃惟俯賜道鑑幸萬與内翰汪二先生書清不肖奉辱二位先生知遇及與進意良厚感佩何可當自南京歸家僅數十日而家父喪百願違心以故久不及修問吾府尊來承教帖益用感愧清今服闋已一年然先父母之塟僅得封壙而未成墳大父母塟失其地久未能遷亡妻亡兒尚寄淺土近日次兒年二十復喪百苦叢身家貧累重且志荒業廢自顧益無可仗以自立者北上之期未敢卜也兹因吴公便病中裁素一伸情悃吴公真有古循良風居今世而肯如此做人如此做官者絶無㡬世道之薄可嘆而信郡之多賢益可徴矣夏末惟二賢千萬為國家為斯文順時保重是祝寄李宗一書陳憲僉到承恵翰并香枕感感來翰諭及貧病一節詞情頗切清亦適病中念宗一也久忽得此情悰何如也然此事自有宇宙來賢豪君子亦不知是多多少少屈受而無詞矣柰之何哉義命二字正須扵此際有安著䖏耳清賤病已一十年非止今日宗一所素知而始終一貧債負輾轉則雖宗一有未盡知者兹不欲多及也静言思之儒者致用尚欲經理一世康濟羣生而今數口之家生計乃常不辦至數數仰資他人貽憂父母才之踈劣如此亦可自考雖然士之常也今少宰彭公自號從吾居士者素貧也賢者自結自解自愛其身以有待吾一身亦非止今日吾一家所取頼而已也大凡背瘡多是内有憤欝不堪火氣横出肉理所致昔人困此者見扵史傳多矣吾宗一何縁有斯疾也何縁有斯疾也今雖窮不猶愈扵遂死乎自愛自愛清不能為子力也清亦嘗有自解之法即今卧䖏自題云命好徳不好王侯同腐草徳好命不好顔淵任窮殀非敢以徳自居也用以自朂以見貧之外又有在所當念者耳衷情縷縷臨便増切貴恙後氣色果何如注想如在目前又氣體肥厚之人飲食常要甘平味多病後痩减亦然此又養生通法也清每年夏來一日之内常两餐用粥得免焦渇只此一節亦不知是省了多少藥物耶冬亦一餐用之酒最能敗腎且昏神宗一戒之氣體厚者能戒之久後自有一段分外精神今人多不曉也李白王勃素嗜酒未必能助其興然其本原正大聰眀為此汨沒多矣陶元亮亦每自謂嗜酒然料其人决不肯飲至昏醉故能全其真而見之文章者若是其沉欝而光潤不為酒困何有扵我哉此當知聖人之不得已䖏然自不及亂矣又三代以降井牧之制不復又别是一乾坤矣天下之生紛紛董董上之人大槩都不甚照管他號照管者恐亦未盡其道只是任他自貧自富自有自無惟知有田則有租有身則有庸而已田連阡陌由他無卓錐之地亦由他也則夫今之士者上既未得有官者之禄下又不得為農工等事老者欲安少者欲懐如何得全不為一家數口計長逺而徒坐守窮餓朝不謀夕哉許魯齋先生固嘗有言以教學者矣足下且有二弟可令事此但要戒令勤恪不華如清則孑然隻身却有難者耳近日亦頗為此費心非是圖貨財滋植但得免債負能自給斯過望矣借人錢本令的當兄弟或義男營運生理此决不害義但營運要取利少而平穏者是長䇿耳亦恐欲速不達也因便寄去云云與黄徳馨石仲殷書進孫至承來翰及佳恵近所得如何聞㸔中庸序已畢亦見得與大學相表裏乎盖所謂道統之傳者即大學之道也所謂允執其中者亦止至善也仁義禮智之性道心之正也氣質之禀不齊所以人心惟危也精則察夫二者之間而不雜者格物致知也一則守其本心之正而不離者誠意正心修身也以天下之大聖行天下之大事不過如此是乃所以齊家治國而平天下者也盖昔者伏羲神農黄帝堯舜禹湯文武周公以是傳之孔子孔子以是傳曽子而及子思元無二物也區區近來賤體如舊偶閲孟子盡心下一篇纔畢自别後多牽扵俗心緒董董雖曰㸔書得䖏無㡬大扺惟三十年前用工也二友勉旃復李宗一書自古凡未及一面而輙以襟期相付與者其氣味類非人所知而執事以施之清拜賜厚矣然惜執事之誤也清泉南一俗士耳凡百不如人執事不知清敢不自知往者年頗少志頗鋭覽古對聖之時容有分毫不自揆之意今則愧悔滿胸懐矣此其故何也念之可哀領吾林先生手教及味來翰意知執事方擊楫河洛間隠然有收功一原之想壮哉行矣百年易暮若眼前一切亦豈在所掃者離乎此又不足以言真矣盖其最𦂳䖏全在不言中言及此清慙負天地君親慙負師友矣執事自愛不盡所懐一見何日附奉筆四枝墨一板表意耳與黄徳馨書累承來書知所以愛助我意甚厚益友之言豈可多得吾雖未能盡行之然不敢忘也渉世甚難蓄徳宜豫静之一字更須扵動中騐之動而不失其静乃為得力反覆體騐又止是虛而已盖居常一念及静字猶覺有待扵掃去煩囂之意唯念箇虛字則自覺安便目前縱有許多勞擾而裏面條路元自分眀無用多費力而亦自不至懈惰也且静亦須虛方是静本色不然形静而心騖扵外或入扵禪者何限人心本是萬理之府惟虛則無障礙學問工夫大抵只是要去其障礙而已此言吾未能盡行之但彷彿似有一二時襲得此光景者或非意之來應之若頗閒暇至寤寐之際亦覺有甜趣故吾妄意虛之一字就是聖賢成始成終之道今且與足下一私講之試訂其是否人便可書復也此等言語足下只自知之盖吾平生行不掩其言甚多工力未到故態時發則此等言語秪為人作口實笑謔耳今嵗科舉不知足下與仲殷得了此否與周提學書久不覿模範昌勝翹仰兹赴禮闈道三山謂得領片時春風之賜用壮萬里之行至莆乃聞旌斾自漳南返豈天嗇其遇耶竊聞之有識者云仕宦當作提調學校何則以其得専為斯文出氣力為國家生長人才又非其他官比也尤在持重為之耳生既不獲一面􅂓以是一言獻而狂率之嫌不敢避也途次不及致詳幸察與陸憲長書清辱知愛最深感荷何可忘自甲子嵗奉書山東後枯守家林莫能嗣音愧負愧負近至江西得邸報知擢憲吾閩海道一帶千餘里自此當波恬浪静矣且八郡之人至今飽公向日徳政扵今繼之信乎事半而功倍也清到任已數月秪是紛紛度日曽未有絲毫之力扵學校間視公向者一日了數十大公案猶綽乎有餘裕人材相逺何如也願益為國家為蒼生自保重便中特此申意附奉小書數册手帕二方殊不能盡下情寓九江寄宗侍御書自執事以疾乞歸生思仰不能已苦無人便莫知貴恙平復與未後得張元器先生及饒侍御言貴恙久已平復但意堅不欲起盖先生自有見也生非先生謬薦不得供事江西學校愧劣才不勝重任日夕凛凛如蹈春氷恐有孤朝廷任使及吾先生所以論薦之盛意矢心扵天不欲扵紙上縷縷惟先生便間有以教戒之又幸志同先生數時不惜教戒受其恩知同此感佩也適㑹辰州太守陳行且諸生試巻未定造次僅具大畧不盡區區惟順時加重將來當有大為國家宣力之日耳與畏菴朱先生書向者自浙江來知已擢湖廣右方伯繼又聞已轉左公輔之拜想在旦夕正人得路國家之慶生民之福也何庸喋喋清幸不為君子所棄外辱收而置之教導之列銘心刻骨自不能忘奈庸下之資只今居閒猶不免與俗冗相還往且持不願之心以酬酢乎其間得一失百而又力未能自拔而遂去私懐凛凛恐終有負扵大君子之門他日雖欲自新其路無由且大期已迫耳興言及此甚自愧屈也向自南京歸自以家父素康強少計之猶當得十年團圝之樂不意􅃍有今日之事復何言哉今則是永感之人矣又何所不可哉且進既不能有分寸禆益扵當世退又全無以自異扵流俗况且閒居圖自逸扵勢似便且易者而亦未能鄙拙之甚可知以此自知不敢復有厚望扵當世而僕僕為行計也聞吏部近日方嚴起復違限之例清亦不顧矣便中徑述其私𤨏之直如在父兄前語實恃恩鑑不罪餘情陳通判當知其槩與曽侍御書伏在喪次諠寂殊路使節行留傳聞不一自諉契㑹將復有日不欲𤨏𤨏扵書問間塵瀆耳臘月廿一日已奉先祖母及先母之柩至二墳所本卜其日先塟祖母俟先母墳成之日則塟先母不意臨期即有拘礙今改卜正月初五日塟祖母十一日乃塟先母也初三日在先母墳所承本府羅同知遣官至寒家送皂𨽻二名云察院所遺者訝未得詳即以初五日塟事回家過府問故羅乃出院牌見示讀未終竟驚愧汗浃不能已清一顓蒙庸俗人耳若曰頗知分不敢求稱所欲不敢虧負扵人則或庶幾若曰學行云云則豈不自知况本蓬戸蓽門之子孱孱碌碌之人幸際明時得側士大夫末塵自父母而下咸獲霑被恩餘衣食之類視前加厚矣近雖有疾幸頼藥力已就平復二喪且以次第舉塟稍遣目前儘為過分撫心惴惴惟自待之不稱而慙愧天地君親慙愧賢士夫知己耳近者本府縣以執事及諸公俯待之故益加意相遇頗出衆人之上羅同知清慎自持當官絶不聞分毫有所取受而為僕措置治墳之費及分俸米見恵此禮羅歴任七年未曽一施之他人者也隆意所向人情増光知感知自豈特儀物間哉噫僕之負執事多矣豈盡知僕之無所識知無足存録也哉今者院牌又復云云獨自顧何人而敢當衆人之所不能當受衆人之所不能受者哉昔鄭綮為相有自知之言後人以為鄭五才實無取惟自知一節稍可贖愆僕竊是之抑思古人亦有直自擔當者亦有徑行不辭者大抵皆自覺其無沗乃能自安如執事此舉誠非不肖者所能安也僕又非能矯激立名者庸劣之資求同衆人尚懼不克况敢求異扵人哉萬一中有矯意則為重負斯文知己骨肉之情神天當明誅之或暗壊之為人間矯激者作戒矣所以不敢安受者特以自知不任而却冐然利而受之以重傷賢者之明實所不可故同知雖屢遣送終不敢受亦庻幾用此一節贖愆者也且來儀僕雖不受不凡之厚意則固有出扵物外者矣如或者以為執事施禮扵僕而僕却之則為全不知執事與僕相與之際者矣此意非可言盡惟知己虛心鑒諒當終收之度内也使斾北旋應在旬月内外續奉未由在途在朝幸加自玉為國之光為民之庇過蘇郡㑹貴僚王先生乞為申再三意與碧川闕先生書生數年跧伏家林憂故孔多不敢陳瀆然區區懐徳懐教之心雖在多故未能暫忘也恭惟先生碩徳宏望台階在即而乃以㣲恙力求退休上為天子之所眷惜加恩下為中外士夫之所光榮嘆慕令始令終光前振後門下生實不勝慰願之至清去嵗四月至江西供職向自揣孱庸况病疾素多自分槁死林下矣今乃復叨竊此職且此職乃人之所易者生屈扵才反以為難以此乆稽奉問而負愧益深中情益切每一見惟德年兄便覺愧心勃勃且丁寧遇便見報者屢矣而至今乃得扵驛舟中薫沭拜此惶愧惶愧伏惟老先生台斗之明淵海之量必能俯照不肖清而未忍􅃍厭棄之也近者豐城丁監生到亦䝉鼎言存問感激感激向生求髙祖墓表老先生猶惓惓垂念但以清所䟽事已失未及就請不日便當續録申請倘得賜賁尤不世之光也寄梅一之書相别忽一載餘懐仰殊深執事學正而行介區區竊所歎服企慕而未能及也然為賢者願望未涯更望少濟以中和闊逺氣象如何大凡氣之所在理即随之而得夫淺深也恃知愛輙質所見區區凡下之資過悖尤多所兾便中痛指一二使得早救分毫如此往復吾人庶不為虛相遇者嗣續一事雖曰有命然固有大理存隂陽和而後雨澤降夫婦和而後家道成或陽亢隂怯則志意且不相屬生理何從融結亦非造物者所授也區區此言渉鄙䙝知為君子所不韙然天地絪緼男女搆精聖人扵易言之矣執事今日豈厭聞乎文獻通考己承寄到至荷寗永貞得相聞否董汝淳儲静夫王懋學想時相見誠人間樂事也寓九江上秦太宰先生書生自拜違来私門多故非所宜瀆然拳拳戀徳之心未始暫忘也向恩門内艱生僅得拜一慰帖及小奠儀洎後遂不能嗣音罪負自知實頼台慈照宥生違教後亦只如舊日碌碌耳况齒益長學益荒兼才力素劣弱又以是永感之人自甘枯老林下與草木同腐矣乃辱老先生平時齒録當途綆汲使得供事江西學校間第此任甚不輕而不肖生甚弗克負荷旦夕凛凜正自不知将何以報塞朝廷任使之萬分以不負我老先生教愛造就之盛徳耳生今年五十有四而早衰有甚扵六七十者雖曰不忘學然所進其能幾何惟旦夕勉強自清其心自平其氣凡扵學校一切事務一聽扵道理之所役使耳所願務其實而不徇其名要其成而不刻近效不敢以文章為人才之實事而必使學者反復思惟古先聖賢所以著書垂世之意與我國家之所以教人讀書而以文章取之者究竟其意之所歸宿果安在此則生今日之所以汲汲而未敢多語扵人者也老先生恩同父師故敢及之夫民至愚而神也况民間俊秀清敢欺之乎抑能欺之乎清之所以期不得罪扵朝廷期不得罪扵老先生期不得罪扵斯文者槩在此也生恃恩厚偶爾及此不覺繁絮惶恐時序寒煖數易惟吾老先生年尊任重當為國為蒼生倍加保愛至祝與方石謝先生書生曩嵗因叔父睿貢書後即奔母喪到家又遭祖母䘮雖非承重喪門未可即吉故在家日久既復京又失長兒尋改南京數年間憂患奔播少有寧日百事俱廢故雖執事之門亦久失扵問候所恃大賢汪度有以亮之於形迹之外清今乞恩終養者誠以父老身單而子㓜此目前當由之路無容疑者顧發之遲矣發之遲者私心牽之也然雖牽於私而終不能安既而思之凡心之所不安便是天理之所不許不若聽命扵理圖得心安之為利也昔人所謂樂志云者疑亦文過之辭耳愚意但自身處置得是即是為親也又清自知從學失其術垂老不得實用故數年素餐一績不立使復遲一二載或得循資少進尤患所以立也自以公既不能有益扵時私又背棄其親而圖計其外不計其内雖復生世百嵗秪益以負君親故此舉必求成而後已而亦不暇計親之養與其身之已老也適得孫志同書謂執事聞清此舉始有惜清去之意既而亦以歸養為然盖執事之所以然清者非人所能盡知矣此即所以厚清也志同素厚清所厚必以正此舉全頼其成就尤見其不肯俗清也清今既出漢西門心始少安自謂亦求以不負師友之一節也因便輙吐其情用申謝意外此斯文之責天下之事其屬之執事者計自有本末有輕重既到手時必不放過矣小子何知述至人之望扵執事者如此耳與九峯孫先生書奉别益久仰徳益深聞令器從一已冠婚而志行不凡克守先生家法益用慰喜清家城市而心久馳扵溪山巖谷之間然困扵無力至今未能超脱以去自愧自悼百事無成計大期不逺將懐羞入地終無以自白扵世可柰何哉人其亦柰之何哉適漳州進士石腆見過造次附拜因及不肖情事如此所謂貽知己羞者也向者從一加冠清恨不得觀禮扵阼階之下兹附小儀致賀乞勿外久負字説之命以塵心俗筆至今惶恐不能成文愧罪何可當尚期汪度未即加譴也清又念自𢎞治改元得官在職者七年而以事故家居者十年所見朝野之事雖醇疵不可一槩而獨皇上聖徳凝然不動環海大綱萬靈妥帖實有草茅書生一旦得富貴及自負才氣志節之士安恬之久所不能持不能到者居常以告鄉父老及子姪學生輩使知有聖眀之徳覆幬之恩而自慶其有生之幸盖諄諄縷縷言之至為或者所迂不自厭也比忽聞皇上為邉情累勘夫實事乾綱獨運電爍雷轟驚羣蟄扵九地振王靈扵萬國甚盛甚盛快哉快哉可以徴聖徳之涵負可以期生靈之永泰可以卜國祚之綿長鄙人數年所得喜事無此比者而鄉人得扵傳聞亦以信清向者之言為有以也所恨清腐劣之甚不能為眀時展效尺寸如得及早明白自退一意與村學生輩講説人倫物理相勉相勵相與服行而固守之以求不甚愧扵為人不甚負扵君親師友亦庶㡬其可耳而格心贊治脩廢保豐事業則自有當世諸賢哲在便筆及此為愛我者盡不自知其孟浪也静夫希大進之尚質諸先生以造次俱未能致書然拳拳向仰無時忘之倘問及乞為道意否則不必也静夫先生近有書到随當脩報矣清舊有讀中庸私記一部甚冗穢近因諸生之求忙迫稍為塗去其太無謂者而出之名曰蒙引初藁明其未為定説也且今以寄從一目下備㸔正望先生公暇賜一裁教示下乃幸仍乞轉致静夫先生同賜教示也大學亦已完語孟及易經俱有之以欠温故姑俟後圖鄭仲平先生李宗一先生各有子姪讀書倘來取幸次第與之并乞達求教意與都憲吴先生書生自向者南都奉違不久即以侍養歸家尋遭先父大故兼荆婦次兒繼亡家寒而事冗地僻而交踈以故老先生之擢山西擢河南皆久後乃得報惟今都憲之擢四月即得之福州聖朝所倚以為西南一面長城而一方數千里生聚咸所仰哺取給焉其任亦重矣哉况廟廊梁棟需材有日平生所學所負將次第為斯世斯人盡出之此其為慶豈敢止以為鄉邦之光姻戚之榮而已也哉更念盛徳不遺微末生家居嘗两辱江右手教去冬博士張顒歸自河南又得尊賜書儀感荷稠疊殊缺脩謝至負至負兹有禀聞貴祖墳在晉江縣三十二都與寒家石壁山祖墳同鄉且相近二十年前便已承委查訪全然無以復命今嵗二月因附塟亡妻扵家祖墳之左暇以訪之郷老遂得其的即挾與同按故迹令祖墳故址宛然盖有被堙没者亦有掘穵未盡灰土尚可認辨者其本都諸人能為證佐者尚多倘及今不追問恐人事参差嵗久益漫耳清懐此欲陳有日意欲脩書至雲南不擬尚在南都謹特此報計老先生聞之當自有權度矣目今泉郡知府慈谿包民敬名溥亦南道中人似當移文托其用心勘處并立石標界以明大家水源木本所在如更得貴宅舊藏墓誌譜記之類録附公文之末使得一一按實而處之侵者益無辭矣清近試省下三學諸生試巻方閲未畢又值同僚新任及他期㑹旁午造次奉狀情不能盡言不中倫統祈台照海涵不宣謝梁叔厚編脩寄恵陸宣公奏議書敝郷陳先生至張家灣承賜陛宣公奏議二册仰惟一代真佐其精神心術盡在此書㣲執事見愛清何從得此快覩也第愧不肖弗克負荷耳在京時屢欲假片時從容以請教而以疾見阻登途益用憮然便中敬此申意與柴墟儲静夫書戴地官來承惠郷録并手教諄諄所以為不肖計慮者至周且切矣敢不敬佩墳宅一事亦有大理盖人物皆藉氣以生亡者所蔵亦在大氣之内故自墳而言則本骸得氣遺體受䕃自宅而言則風氣虧踈斷無佳産寒家百餘年來世衰一世清雖忝士夫後然百病叢身百事不立子長成者連喪其二家計借助居半凜凜乎名節之傾門户之落疑亦墳宅氣數之衰使然有非區區人事杯水之力所能支持者故不得已因祖墳之水濕及妻子卜塟之未定而僕僕乎風水之求也此情豈容自諱扵吾兄然清即今自斷每成一墳除買地外僅費五七兩之數茍且完固而已不肯同俗作好㸔事此又泉人所共鄙笑者清獨不恤也執事扵此亦可知清用財之槩不然所犯必多異議将滚滚而至矣明年將如來諭受徒講業并可删改舊日書説或有小益扵童䝉所恨只是文字上工夫耳今復何言哉草草申謝餘容續陳又承示所著夏姜二女墓誌銘摹冩深至二公平生曄然在目雖老朽猶覺有懦夫立志之意感佩感佩清扵四書易經草説舊日只謄出大學中庸二部及易上經十卦然尚未得删定餘則蕪穢尤甚未敢示人不意無識者盗抄并以付書肆刋行而差字訛句多不可讀今欲就林下温燖整理又以諸故墳皆失地存亾两不安方請廣信周姓者來為改張而貧窘獨甚或有地而不能得或雖有地而不能成墳岌岌扵懐卒歸於任運而已清北歸他無所恨者平生負君親罪萬萬今謂之何哉因得所示二銘益自悼其枉生耳又病中遇故知某人考滿行謹此奉通信問吾兄過部以來輿論甚服謂敬簡二字俱得之僕得此寤寐亦慰喜也但聞貴體尚薄弱後嗣至今未充此亦當内自謀之要亦有大理也要皆當及時謀之先賢謂人謀孔臧亦可回天命大抵天扵天下善人君子决不能一一顧盼扶䕶得到而使休咎吉凶各得其所也故人當自盡人謀人謀者亦孔子所謂務民之義也人謀盡而終或不得乃歸諸天耳推而言之此孔孟所以欲回三代扵春秋戰國也此南容之不廢盆成括之見禍所以不謂之命也朱子曰濂溪極力説箇㡬字儘有警發人處近則公私邪正逺則廢興存亾只扵此處㸔破便斡轉此是日用第一親切工夫精粗隠顯一時穿透又曰食芹而美甚欲獻之吾君也因便𤨏𤨏及此宋孔時已到莆僕約今冬行縁家父有祖母服未闋闋日將為小兒冠婚乃行耳寄林待用書閣下一舉義聲在宇宙清無庸贊惟閣下益為國自愛舉一事量不至一日廢也竊謂所以永終譽者實在此因張太常便率此奉瀆所恨相去不二百里而不得遂一面引領壺公可勝懐仰之至令尊老先生暨賢昆仲不及别具希引賤名拜意閣下亦尚宜速行乎與畏菴朱先生書今春曽具素書附饒侍御榶便至臨清王思徳憲副處託為申上老先生尊前計其時適有變故或不便扵申達然至今亦未得思徳報也生自去夏至今秋為考試事頗勞􅇵因而得疾自知庸才弱質難以應世成務七月初已懇䟽乞致仕今此待報矣生初未知老先生北行變故所由近得一士夫過南昌略道王太監事當時自巡按以下皆謂不必舉聞惟老先生必欲行之却自多此勞攘云諸公共談者亦多以為然生愚獨不能無疑也夫人主春秋鼎盛豈可令手􅉸扵罪狀不明之人耶刑人扵市與衆棄之今也不然設或出於左右者所矯雖巡撫大臣亦不敢問誰何亦竟不敢以聞此其弊將何所不至謂有忠愛之心者能漠然不為國一計念耶且他日或有究詰其事者守土之臣又將何辭耶竊謂老先生此舉於理與法皆得之而閑邪杜漸忠愛惻怛之意尤可念故雖卒以此賈禍是亦理勢宜然而老先生所以辨者也此外又何足計耶便中特此奉瀆起居踈愚不識時忌惟老先生必能為慎之外附鄊録二册備覽又近者謝洞教諭至承教帖并日書墨刻感佩何量陳寧進士至亦能道尊意且感脚力之賜此清表妹夫也清去嵗十二月塟先父扵南安先母舊墳水濕今徙合塟焉墳去城四十里恨太逺也但其地頗有生氣穴位八尺之内通是五色及黄紫細土牙闗小石亦有五色者私心頗以為慰亡兒存畏亦别塟矣惟先祖考妣舊塟乃過龍之地當亟徙塟而力未能及也姑俟年終為之清今年亦不免教授生徒其富者束脩禮亦受之以助目前之費但舍己田而芸人田其終两失之為愧耳杭州府學生員施恕者有士行其家甚貧能守分清十餘年知己也其身家履歴與方寸事最與不肖清相類其制行嚴宻清不如也與之處甚有益向遇杭時欲言之而未敢今與之别又二年益思其人不能忘便中因道其姓名惜郷舉里選之法不行扵今而此子詞藻之學又不逮人意其終窮矣便中特為好善君子及之渠固外外之求也與劉司空書生自去嵗拜别來任以中途感疾就醫七月稍痊自八月以後一向奔走東西在本司率不過十一二日或僅三五日即復出以此職事之外百凡俱廢惟天下達尊動定安否則未能暫釋扵下懐所恨者迹不及耳未審道體近來萬福如何清謂如老先生者在朝廷多一日則多一日之重在郷邦多一日則多一日之光由此言之人心所祝願扵老先生者寧有厭日乎此間學校事宜儘多生到此槩未能舉行只有應酬目前文具及考試去取而已以少也學不得其術今則過時而扞格故此任雖衆之所易而清乃獨病其難也且病體益衰精神管攝多不及計數月後當别有奉問兹附奉新刋吴康齋先生文集一部備覽外批㸃程文及學政文移附瀆不敢扵所尊所親而自諱其醜也惟矜其不能而無倦教尤荷寄碧川闕先生書向者得告以歸自謂當得盡寸草之心扵慈父不意罪逆深重天實禍之竟乖所願抵家僅六十日而家父棄世雖猶幸得親湯藥及殯殮等事然不孝忘親圖歸不早之罪已萬不可追矣久不得奉狀恩門為負諒在情察前月生已釋服方圖奉狀未發昨郷辦事官歸自南都送至尊賜家集一册綾帕二方椽筆題緘斗光下燭肅衣拜受豈勝慚感銘佩之至清今雖已釋服但先墳未成亡妻未塟及祖墳患水濕而未能遷兼居宅敝壊之甚至無以蔽風雨亦姑用借力修治家寒身單實為勞瘁北上之計尚未有期知必以此招罪然勢不得避也仰憑恩照故敢及此若不肖感德戀教之心久而滋切有不能自狀者非敢文也至於明德日章大拜在目此乃海内善類及蒼生之慶又無庸生喋喋也手帕二方香茶二帖奉表㣲忱髙祖墓表尚乞留尊念更容申謝寄督學邵先生書先生横渠理窟序無一字虚下者向見姚秀夫先生浙西水利書引亦然天地間此等文字盖自有數也二篇清最知玩之使文皆如此何厭於文也又擬謁李旴江祠詩希古慕賢之念出扵肺腑之真者亦自與時文不類適有絆不能盡惟倍為吾道自愛便中更祈無惜教音與雲室廷玉先生書先生三月十七日手書寄劉希範大人來者直至八月廿二日方到即今日也前此生屢拜書想多已達此書又承教誨感刻豈能盡述中有自道為人蠢直老實不能以言貌動人今士之所喜者皆區區之所無倘有議言宜早寄達竊謂先生之徳之學非惟生等親炙日久者欽服戀慕之不暇而上下之知先生者亦自不為少矣且今士之所喜者固先生之所無然先生之所無者正先生之所以為髙扵時人一等者也天下之理誠則形久則徴先生胸中固自有定見有定守而不為一時之士嶢嶢皦皦扵目前者所能動矣今又加之以勤克之以𢎞旦夕所到又豈生輩所能窺量雲南行事聲聞自好大抵是根本上發出英華有識者自能見得其用方林二君子尤見先生之髙盖輸誠用人而不盡用一己之長者此正惟有大地歩者能之中才所得有限者决不能此此節生甚為先生慰願也凡前書已及者今皆不贅復王希文憲愈書承華翰示及動履并新行榜例及臧先生節斾所向非至愛不同恒情鄙夷衰腐者曷由有此感認感認閣下宏才茂徳定價在朝野清不敢喋喋近日王徳華先生特有薦草如徳華實造地位閣下或未盡知也粹夫臨别曽一問及清答云此公吾同榜中三百人似未有出其右者渠復問其詳清又謂其氣度宏逺最鋭志功業然必從本原上做出更詳及其務本實而畧華藻之意渠或未之信清不自知欺也因謝柬及此者正以徳華知公已深或者閣下未與相面恐知徳華者猶未盡耳徳華之薦公正所謂不求識面御史也此忘形率爾之言他更無所為也清初九日至吉安城已考吉安府學及廬陵安福吉水永新諸縣餘猶未及也南贑二府已白臧公許吊考大約五月半間得回總司來人回促急筆弗端統恃情亮又徳華宦業後進未見其比其學亦與時人不類雖在翰苑諸公渠恐亦未多譲盖其正而簡一而詳未易當也復林居魯書清前累拜書期至金華一㑹今則舉為虛詞矣知負知負其時且欲進拜章先生亦竟不及此殆行止非人所能者不盡述也執事不諒乃至以相外責之殆未得清本心耳清以正月二十一日至家前三日過莆得㑹令兄及令婿多荷厚雅自至家塵冗紛紛每神馳扵清源之麓紫㡌之峯而力未能􅃍自拔以往又苦扵多累正恐來日無多而乞歸之計亦徒然耳心事如此又何足為吾人道者承恵王文忠公文集清柰未得詳覽以究尊惠以復雅命偶閲及知學齋記則知此公非止為言語文字之學者視宋太史氣味為真矣此固非後學淺生之所敢輕議然嘗觀宋太史文則覺其枝葉太盛面勢太張波流太靡雖屢屢自辨其非文人静而味之則其􅇧氣及歩驟終似未脱文人之習者况其學亦雜遇老談老遇佛談佛胸中本無主張忒把文詞及博洽當事了嗚呼豈知天地間事尚有大扵區區文詞博洽者夫學不博不能約言不文不能逺固也但其中自有真偽之辨耳真者根扵性率扵道而符於教其偽者性道教外物也宇宙之所以立人物之所以生生不絶者以此性道教三者在耳凡在此三者之中則世所不可無亦自不能無者若出扵外類皆人之私智所為扵世無益而有損盡可一掃除之或摘其近正而實者姑存之而已管見如斯因得髙明者一質焉而亦未能盡其説也與梅一之書戴地官來承華翰及厚惠㳟審太夫人萬福令嗣亦挺挺有立甚慰甚慰清永感之人矣故今日進退無甚係戀者所恨尸素十年無毫髪之效扵公家而平日師友相責望雅意今日悉為終身之愧矣復何言哉家貧時時假貸扵人三子力教以處約之道眀年將受徒自給兒女債今猶未了也清嘗謂士夫當自辦材料在國為國在家為家雖在天者不可必在我者固當自立大要只是養與教两事然綱紀之立為最先家國一也清今益衰病恐力不能終此願耳所言大可笑惟知己者不訝逢便希不吝教幸甚與林允曄柬聞之古人非其義也非其道也一介不以取諸人清以膚淺多累既無以補吾子之萬一而顧辱厚儀焉揆之道義實所未安故敢辭且既以為不可受而辭之則决無復受之理也吾子幸予諒焉又昨承來意勤甚足見吾子䖏心之厚䖏雖然亦不可使清䖏其薄也子如予諒則其所以見愛者尤深矣况君子如水之交初不繫扵是也與楊君謙書去秋承教益最多敬仰敬仰别來所進取當益不可涯量異日斷當為斯文増一光燄矣清嘗竊謂學而主扵平實人固多以易視之然語其理之至當則又不論髙深竒恠之與平實也或者平實之難轉有甚扵髙深竒恠者而難易亦非所論也惟其當而已抑今人之所目前人之髙深竒恠者自理視之似亦一等平實也文章誠學者一事至理所在又非止可以才力就此意惟閣下意嘗及之而愚扵今得因便風繹之以相證耳清今承乏祠祭司司事頗簡念欲及公暇退修一二以豫當世末用者然氣質老矣強力不前柰何柰何吾君謙可及時兼程矣與喬希大書别來又添許多過惡矣自念犬馬齒三十有二去四十五十而無聞者㡬何而一善不進一識不長尚何以自諉扵天地間哉加之百病交攻氣體萎弱正恐終為大明宇内之一棄物無復報恩宣力之日耳如吾希大天分髙爽而信厚加以年富力強甚好學做人也清徒為歆羡而已偶得郷人一便舟次不得盡其所欲言惟清照是祈復楊方正書蜀阜存藁一書當時所存篇數似太多而寫刻亦多訛字近方欲請諸徐公求删去其不甚切要者并正其訛字而重刻之故多用朱筆㸃記尚未就緒今如命奉去惟乞覽閲之際随筆去留更批示大意以扶不肖之不逮則豈惟不肖之幸哉至懇至懇與嚴州諸友書自十一日與諸君江頭一别吾從舟中望諸君諸君亦以岸上注目當是時吾以吾之情知諸君之情矣云云雖然離合亦常事耳吾自有欲言者大抵天下事無甚易亦無甚難凡聖賢所責人為者皆人之所當為亦人之所能為也况舉業一事豈有専心致志於是而不得者葢有之矣是必其資質之甚下也以吾觀諸君則資質又皆非人下者顧用工何如耳而用力節度則區區已常為諸君道之惟諸君力行更以性理大全中論學論科舉篇觀之則區區之言又陋矣江右袁先生倘㑹希為拜意天下讀易者矣如袁先生甚少繫辭傅所論教我多矣復儲静夫書清是月初四日已徙張吉士所居頼叔鳴悉力其間事乃得諧連日修補掃除之役尚未畢承諭在途兩夢僕貎遽豐碩者有其故矣非偶然也覽書感泣此生不知果能不負公否耳與饒侍御書清至今猶未得覿執事一面而執事過聽兩以賤名厠薦書愧不肖何以克當今此供職日夕凛凛惟恐有負君親有負知己為罪不容誅耳陳進士大人至清適有行役造次附謝莫盡下情是亦一負惟俯照不訝是禱令嗣大人他日必能大為國家宣力以踐顯揚之孝私心甚為老先生喜慰欲印一書寄送尚未能及懐仰懐仰與李宗一書鄭典史來送到手書併紬棗之恵祗受之後頓然若忘甚愧甚愧清向至江西未能有一毫樹立報稱而􅃍致仕人或以髙目之可謂不知己者矣清此生永負君親師友無可言者自到家三子令各讀書認字家事不免自勞風俗益偷清宗族中表殊少可托者老色日深大期可量邵子所謂生扵太平年死扵太平日清亦幸一與焉舊有書説數册意欲温故而刪之亦以力貧未暇且皆只是空言浮説何足道哉每見來風韻不凡意當逺到末乃亦有休閒之想豈年來稍向衰邪令器未第想已近除官次者可繼志中間或質不逮便可使力家亦足以怡晚景耳鄭復行冗中援筆百不能一吾人此日通書扵千萬里之外復能幾度邪况清無力尤可念也惟各與諸子道毋忘世好各圖逺業又向有兑粮典史回自南都道執事拳拳乗問意不數日賫書恵者亦到感喜無量清比欲奉書因典史言不久當自來取故遲之清六月間十三府小試已畢以不得與者數千人來鎮廵各衙門求勸續考七月間復多考了三千三百人連日夜㸔巻頗疲勞舊疾復作况平時在此世事亦甚多端却不如在家林蔬食菜羮早眠晏􅁸朝經暮史朋聚友集為自在脱灑也且及物之功惟有考較文字一節得行餘根幹上俱未能及而計亦未必能行也故扵七月初九日發一懇䟽乞致仕以逺隔不得請裁姑據管見行耳期必得之乃穏若復為官所迷再一二年龍鍾甚然後歸所失多矣今在此亦頗為王府所恠怒然官可舍不可輕屈扵人也俟後續具臧瑞周繡衣在此極䝉其相愛信今龔公亦然知皆執事所吹噓也然清不敢不謹江西人最易􅁸謗今始知之然浮言不久亦當自定累承指教知感知感今科所中舉人清所取優等及案首者凡四十八名衆頗以為難清亦以為一幸云淮上與周公載員外書所借來陳石齋先生乞終養䟽及彭方伯所寄來柬昨夕已扵燈下各録出一通盖清自南來所得今世文字未有若此者正氣之英華自是與尋常藻繪者不同新學小生偶從執事得此知賜矣䟽中有云内無攻心之疾則外無從事之難清愚竊以為此語當不止為其一身之事發也意此老年來所以遲回顧惜此一進者其特以此耶然即此隻語儻留聖心則其所關繫補益似亦未可以計量也彭公之書謂國家無負臣下臣下當無負國家此真知念國家者之言抑可為凡百有位之通箴也至謂識得破時三公九卿山夫野老一也噫公惟有此挾負此其所以處進退利害恩怨之間脱灑自在凡百任之傍人窺視未見其隙也清因便聊一奉質扵髙眀惟裁教乃幸唐李文公謂鸞鳯之音自不得不鏗扵燕雀今觀二公之文若此然本二公之素所取重扵天下者元不以文也李公之言扵是益信客舟燈下抄讀之餘掲篷一視惟北有斗其光爛然可仰而不可近也恃知及此不覺狂率寄王懋學書汝淳至備審近来􅁸居休裕無復違和極慰逺想南都百務清簡得以尚友古人之時多矧執事負出羣拔俗之資濟之以三五同志相與金蘭麗澤焉造物者當此時為此布置宜真有意哉一時天地秀氣畀之士類為浮華𤨏碎所耗散者大半矣今得諸君子意見如此他日擔當應有在也心非木石寧不為宇宙元氣一助喜耶聞之善自愛者能以數年而植千百年之業或一日而遺千百年之休儻非收拾得早樹立得早則何以克致此惟愛日自強無若不肖清之蹈後時之悔哉因汝淳回便申此區區與司馬張先生書生近得田嵓主事轉達所賜尊翰􅎇帕并題二扇格言南向再拜又再拜卓然光霽之在目至感至愧之情寔不能自状生不肖之病惟老先生察之悉而憂之深故所藥無不切中病原而養徳之理亦自備扵其中矣今二扇謹寳藏之而各録出三四通置之凡所坐卧之䖏庶幾三年之艾猶得及扵七年之後也若賓客足跡所及之地則不敢以張之而所録者亦不題為某先生之恵誠懼懲艾不力秪為文具則益重吾老先生之愧也長兒存畏幸沗郷舉将来㑹試又將各分一通與之期共努力耳云云寄鄒汝愚書梁叔厚先生來知廣中相知有劉時雍李若虛二公為慰令尊甫此時猶在廣否義命之際量已洞然盖但願其子得做好人便不得兼願富貴矣近時吾輩中如懋學者僕竊心慕之其學識志量果不凡也天瑞在貴州至今聞問間猶未見其多進益處僕非喋喋方人者盖惜其以如此之才識如此之氣力而獨扵助長一病不能少减以其與執事夙相好也故及之執事盖亦好之而知其所未至者也儻書問中亦可自以意及之陳憲僉便奉此草草不盡所欲言與雲室徳緒賢弟書清閏正月十九日自建昌歸南昌又明日晡乃得徳緒賢弟訃告吾先生謝世痛楚柰何慟哭柰何清扵吾先生乃僅止於去嵗之一見而已憶昔先生别不肖扵芋原登轎之時泫然涕下豈吾先生扵時殆亦自疑其不可必復相見邪扵今思之五内如割復可柰何哉清自供職扵此日不暇給小兒此囘出於不期雖父子之别亦不得盡所言今日追至弋陽僅得草此與列位相問前日在南昌匆匆無柰姑附祭文藁見意耳再告徳緒貴溪教諭事方圖為解釋似未足深憂也老先生向亦垂教及此前書道粹夫事姑只自知勿泄扵他渠後來亦頗悔悟也與董遵道書稽勲孫志同文選黄汝脩及太常王廷輔少卿亦舊考功也聞章先生動息皆以奏聞􅁸取為意清謂先生今决無意出矣其聞􅁸取其言非但不入其心亦不欲納諸耳矣非但先生自有牢闗意其弟子之畧知其心者亦力謂當路者不必以此厚先生矣殆必有其説也又其向日同志一二比來復出者俱不得完璧而歸今聽先生一人堅卧林下保全令徳斯亦足壮士風淑士彚而為國家添一人物矣易所謂不變其所守乃所以益上者也况今既未能以不次柄用先生只将以纂脩文墨事取用誠亦不必竟其事矣清又謂七八年前姜仁夫亦力為之辭皆先生所厚者諒非有他也諸公曰章先生之見信扵人如是哉歎息不已蔡清寓北京崇文門外奉寄董遵道賢契知之計諸君若到堂上地位當别有施行今則未敢望也與楊實夫書自南京一别抵家僅六十日而家父棄世自此百願違心百事俱置念外矣髙第尚未及賀亦得一慰親心為喜也繼聞以養病囘家固知賢者所志有在扵一第一官之外者清懐賢之心自不敢遏但北上之計全未及辦而力亦未能辦也近以目病不出户已半年閲古人書頗覺有味而終得為家事世事所奪駸駸衰暮目前事既可自考後來事又未可自保故未敢果扵復進也賢者歸已再年静中所得必多何日獲聆至論以沃我焦枯為此生之快也貴郷楊判簿自南安來過翌早當逺别燈下連寫數書不能伸意心照是頼與江西黄提學書易解節要者生友舉人新淦周同所述序之者曰劉曦永豐學生員也節要主扵發明理數無意文藻而劉生之序鑑評似乎端的詞氣似乎簡雅意皆有沿流遡源之工夫者生竊慕之不知執事曽深知其人否因便録此一序申達盖其嘗用心扵科舉外亦今學者所難量必執事之所樂聞也與倪上舍書不意吾青谿老先生􅃍謝人世朝野衰悼况門下小子素受恩知痛悼可柰何哉以江山阻逺不得躬至柩前一哭弔其負愧又如何兹特脩香一瓣牲醴二項祭文一通帛一疋托為奉致于老先生尊靈前表此情深愧不能盡也又切以老先生之遺勲遺徳今皆在足下一身其所當保重者亦非一言可盡惟賢眀之資素出等夷更望千萬念之勿替與徐方伯書文章在宇宙間支流日益衍矣三代無文士六經無文法者不以文為事也韓栁之徒天才本自挺出可以大有所立終不免扵以文立家者枝葉勝也諸葛公學不事章句當出師倥偬之際援筆上言乃得與伊訓説命相表裏而其梁甫一吟亦春秋筆也此其根本所在為何如哉嗟夫大易之序賁極而剥來中庸之至徳則尚絅為之階吾夫子是以乗除世道而有從先進之思也融堂先生生于蘇黄秦晁文事盛行百巧競出之後而其著述乃皆主扵發其胸中之所自得者而止初不拘拘扵一字一句之工而其道理所在神志所適亦自天然成趣力量百倍非專事文家者可望信乎其自大本大根中流出而可以喚醒學者崇本之念矣此其所闗繫豈細故也哉所謂可與知者道也云云復鄭廷綱提學書累承顧恵感荷殊深昨行又辱華翰并厚儀益増感荷教條一編敬已披閲終巻清之愚扵是開益多矣翰中末段所諭自當體悉來指昨以紙筆不便故稽緩計在情照不備又生清又言清近見士大夫往來書翰有以有道二字相褒稱者清愚未嘗不心為之駭懼或有誤以此二字加清者雖其人甚的清謝書亦不敢以此復之先正嘗謂願士大夫有此名節不願士大夫立此門户今或褒名飾字以相為重便是互相標門别户矣夫君子豐扵實儉於名者非但自待之法亦推心以厚知己之道也况如清者愚下最甚百短之中或得一二僅可䖏誤愛者􅃍借之以美字語云将如後患何故今謝東亦自不欲出此二字回奉非敢畧也固知老先生意在誘進後生輩然此意亦非所以為尊者復也惟希俯諒謝姜太守書清不佞知隣國有韓荆州舊矣塵泥心迹未敢輙以賤姓名通􅁸居之敬扵執事執事何從過聽乃先辱引而置之度内蕭通守公至承賜源流至論盖所以梯其進也而諭民善俗榜文兩集皆鑿鑿乎儒者之實用凡有志經世之士所當預置一本者此其為賜又加厚矣夫儒者之效乆不白扵世公獨汲汲為斯文猛著氣力如此公固自以為分内也公此心何心哉惟堅守此心而力行之不令少雜以他術以終其效扵此一方天果有意斯文當不令公之功用止顯設扵一方而已也清泉南一俗士少䝉父師訓誨偶扵時文常習中窺見一條正路若彷若彿自謂稍知趨向者夫何年來碌碌進則無以藉手固未甘扵脱落夙心以茍且目前而退則尚繫扵𤨏𤨏者乍雅乍俗如狂如癡曩時一㸃壯念幾就消磨矣適閲來賜復覺竦然乃知世固自有典刑在也惟是鄙愚自治不勇他日或叨一命不自知果能執此以往否然長者之賜意豈泛泛者感佩殊深以賤疾去留稽扵布謝負罪未涯瞻拜伏冀為斯文加愛不具與侍御朱茂恭先生書生禀質極愚俗學俗心纒繞深矣向因寗永貞先生得覩顔範及聞盛徳之詳私以為知所嚮往矣嵗月蹉跎猶依然故物近復得拜見扵長安邸舍雖未得朝夕摳侍然辱所以警發而指摘之者甚厚乃知大人君子愛人之心無量也生無似竊以為今日誦孔孟程朱之書者滿天下求如吾先生之宅心制行所以處家䖏郷立朝䖏官處上下真能發越孔孟程朱之言扵一身而不負其為後人開創之力者一世實未能有幾人生輩心茍未即槁木孰能無所感動誠非以道盛徳扵尊前也一念仰止因事輙發而不及計其非盛徳者之所欲聞也生所愧正所謂徒羡人而甘自棄又曰二者無柰何徘徊嵗将暮者自顧凛凛實恐終有負扵賢者之門也惟願先生尚留之度内他日容更有請益而起廢之日耳向承途中寄賜李忠定公行状及手教輿地圖及昨者嚴辦事送到道學傳志同與生已同拜領増感増感志同亦同此渇仰之情數日以小疾在告故未遑脩書生因廖外郎便附此致忱特乞節哀加飯重為吾道保愛斯人将大有頼耳寗先生已蒞鳯陽任必自有書達矣兹不及栁文肅公文集一部附奉備覽寄周汝厚書數日欲作書而牽扵人事及今已迫南歸又怱怱説不盡矣清此行本為應春闈行然静中自顧殊無可以應春闈者况孱弱之軀顧影隻然子嗣一節猶未能上慰親心豈宜切切扵功名富貴恨向日摇扵親朋之議不能堅持夙心而虛此數百里之䟦渉耳故今斷然而歸非能輕功名富貴也鴻鵠之㣲豈能一日而忘其翹然外鶩之心而或漸于干止于棘者力有時而不足翅有時而當戢耳衷臆之私當為吾兄一布也科期迫矣京師之㑹姑且未及如有教恵可訪吾泉人士之逰扵京者授之儻便仍以屬之廬􅁜周伯承兄轉至吾提學先生䖏達焉則所以慰鄙懐者言弗能喻矣與徐大㕘書生以十三日發洪塘今日抵滄峽臨行間極辱教愛感佩何量所歉者克治不勇恐他日見公猶復是故時人爾雖然敢不勉諸承教來途中稍把鄙懐放寛著亦覺有一二意㑹䖏大抵心固主思然思之太迫促亦反為逆其心天之本然而不免迷墜暓扵眼前矣鄭仲平為人果士類中之難得者其志操剛剛故能有立而又安詳不暴清不能及也今之科舉之士志不在温飽而又不汲汲扵名者以生所見或未有過之者也此後又得老先生振作之將來必大段有成就矣又如汀州賴友先者清猶只見其文耳然因其文亦可以占其人品之大畧天地間善類亦不可多得清故私拳拳云托焦侍講書生向進謁不獲遇自後阻病逮今且三月徒抱炯炯耳極知長者厚徳故敢忘踈賤徑托林廷玉代訴養病一節盖生父母年皆六十僅有不肖一身而不肖近來病勢轉􅇵故萬不得已為此决非敢有所矯亦决非能輕外物者伏望憐察此情儻荷仁人一言之利還家調治有瘳不出三二年當復奉顔範矣承命取鄙作不知先生安用此等臭腐哉豈將有意教之耶但知藁已多散亡此出他人所録字多訛繆欲俟録正則病冗未暇姑借此復命惟卒有以教之乃如所願與劉咸栗書自甲寅别後尊府先生竟不及大用而謝世清亦失母南奔兩情摧沮兩地暌隔扵今八年偶㑹節判令兄知擢第後出宰輝縣敬惟執事家學源逺壮行自今萬里壯圖皎然在目所謂象賢濟美之勲自可計日而待唯不忘清心治身為本是期清今年四十八矣碌碌悠悠無一事庶幾可慰意者咎不在今而在壮年兹舉似故人冀用清為戒耳官次擾擾不能盡所言情照是賴奉新淦周先生書生舊嵗九月至京曽附書盛郡錢通守䖏轉送生之行止事畧具矣十月二十八日承乏禮部祠祭司主事百仭之䑓得渉其一級焉君親師友之賜皆不能忘也但心酷嗜書史而氣質已老精神積久病憊扵實事並無所得至扵吏事又尚懵然方以迂腐不堪為愧為恐兹因年友盧君便奉此并香帕表意而已不具寄莆田劉子賢書觀先生所自待斷斷然實地根本工夫一掃却許多煩冗枝葉愚意今日大勢如此匡治之計須是先生輩出身也然雖未即出易之益九二曰利貞弗損益之盖言雖未為時用然其弗損所守如此則所以益扵上者亦既多矣而况又有所謂子弟從之則孝弟忠信者乎小兒存畏今年九嵗矣家父母留在膝下去先生纔百餘里而未能即時遣詣門下以供灑掃途中徒為念之耳前在清湖遇海鹽陸陳二友來莆欲附拜一書而目疾方重至今僅少愈得林待用便謹此屬為轉奉外小意有瀆賢者然此在古之人皆用之幸勿外與周時霖大尹書貴縣典史遣縣吏送到貴瀚及厚恵賢友初履任四壁尚未完而􅃍及此區區受之殊覺愧悚天下惟縣官最難做大抵一則欲仁以及物二則欲智以衛身惟仁上分數多則知上亦省力矣因來瀚云云故及適在家得親見來吏後此恐難遇立報書不詳寄鄭仲平書一别再更寒暑凡百無進獨有懐慕仁賢一念自覺未衰耳向得家書知往掲陽辱過寒舍存問老親及召朂小兒輩感感掲陽與吾閩接壌尊府書問計常不絶又風土相類貴眷從宦當亦無不服習之患庻幾心力清一陶成士類為國儲材矣然久不接一書殊用懸懸黄徳馨曽到掲陽否此友志行近來當益有進仁兄幸更引而上之為斯文成就一箇好人在世間大是好事亦吾輩夙心也第其家素貧正恐心欲來而力未能果儻既到日給之類得不全令費心又善也托周紹立推官書一别四年恒切懐想病懶相仍早不及書為負近因北上以疾留此有一切已事特托居魯大人轉遞以瀆切希留意天順年間紹興府山隂縣或㑹稽縣有鄭姓者任泉州府晉安驛驛丞無子攘得泉州民王姓者㓜子為子本名翰今傳者云名為鄭麟或又傳鄭氏復姓蕭氏未得其的只在紹興城居乃清母舅之子扵清為兄不幸至此今清舅家人與業落盡矣清久欲物色表兄而以力孤未得丙申年曽寄一書去而不見答亦不知此書果達否甲辰年又屬鍾繡衣為訪之終亦未見報兹幸年兄大人當道誠竒便也特此奉懇乞以斯文骨肉見念為清悉心詢訪期扵得之乃荷初間且宜設他詞以來之未可􅃍露此指恐其見處不同有引而逺之意則後難扵踪跡耳其生以庚午年二月十一日申時但鈎得其生甲符合則的然矣便乞急字下報清當有以處之茍吾王氏一爐香火藉此有奉而不遂絶則年兄之徳在清與王氏者豈言語所能叙哉且舅家元非軍匠等籍又聞鄭氏亦自有子此扵去就之間兩為有詞而無負者也書言有涯此懇實大清留此懸懸渇得一報又清之表兄今名為鄭倫向所傳麟字盖音相近而誤也在蕭山縣不在㑹稽山隂故前二姓皆不的一見細認與所聞無一不相符右手末二指傷痕宛然亦能道城邑里居之彷彿握手相慰恍若夢中一則以喜一則以悲遂使吾表兄無祖而有祖清也無表兄而一旦復得之扵數千里之外㣲執事之力不至此此其為厚詎容以恒情論哉謹遣家僮從𨽻人上報清表兄即同來謁謝昨家僮來多擾仍承恵方正學先生文集及佳紙重感重感表兄清終欲得其歸故郷何者鄭氏後來已有子而故宗乏嗣何乃浮寄他郷作箇無根之人以自没其終身哉俟清至京後别具書奉今未能盡與㳺太守書清叨從郷國後塵耳熟執事盛徳有日矣以踈賤晩末兼迹寓彼此不相值末由一挹顔範為歉近敝縣吴大使自紹興來承執事逺垂聲問兼恵良茶祇領此意良深感荷紹興東南大郡也以執事之盛徳而君長之清竊為紹興之民喜得所怙恃矣㑹晤未期惟萬加保重以階逺到為郷邦士類之光實所注望清輙慿郷愛及盛徳有一事禀瀆今蕭山縣民鄭倫者原泉州晉江人王姓清母舅子也扵清為兄外家不幸母舅中年得風疾落魄失心鄭之父時為弊府晉安驛丞無子因誘得倫而子之時盖三嵗矣無何鄭即携去蕭山而以入其籍然鄭既歸後亦自生有子其承家已有人而清之舅妗今皆已喪謝有二表弟亦相次殀亡又無親伯叔王氏之鬼至今棲托傍支焉可念也清知有表兄在紹興而托人詢求者有年矣柰距其去時已将四十年聲跡既濶至名字面貌之類在内外親知亦皆茫然以是前此只泛然求之紹興諸縣之鄭氏是以久未能得最後為𢎞治戊申乃荷吾年兄貴寅周大人為多方物色竟得之扵蕭山吾年兄此恩此力在王氏與清者豈可以恒情論哉在清既得表兄以情以義便當挽歸故郷以嗣其宗不容少緩矣但以目前之勢䖏之外家今消落已盡而清家素寒儒亦朝暮僅給顧未有可以為吾表兄地者是以姑請表兄暫至故郷一酧先世墳墓而未敢遂強之挈家以回竊亦以為且得此一條血脉明白在清茍未先朝露後來尚有為之作計日耳此則又有甚不得已者今者表兄有女年已可議婚而彼間親舊有求者表兄以清向日有言期必歸配泉人以是莫之許而以書達清今以時决之以此言之則其歸計似又不容久緩顧清今日力㣲且相去遼逺實未知所以為之計也清聞人有所當為而力未能為者天每有以相之兹幸吾盛徳郷尊為之大父母扵其所寓之郡如表兄情事如此亦郡中赤子之未得其所者况郷邦之愛斯文骨肉之義皆君子所不廢以是不自揣量私心過望願得執事慨然施徳扵不報之地二三年内為主張成就之令歸其所以續其絶如其未然則一二年間且令得因便至京與清一㑹然後就與圖歸計則斯恩也斯力也毋論生人王氏之鬼有知亦當思結草扵地下矣然清表兄既得謝鄭氏以去則鄭父所遺雖最㣲末亦不宜復有干取當悉以返諸鄭氏不使至累執事之公道而表兄亦頗自解此意矣惟執事更有以教之善區䖏之懇祈莫盡因吴大使回便徑布其私雖至親前語亦不是過矣寄蕭山嫂吾兄不幸忽至扵此清今無可説矣哀苦亦無可柰何矣但願吾嫂片心常念亡者常念王氏祖宗保育㓜孤教訓二女節衣節食避寒避暑勤勿至傷勞其筋骨儉勿至空乏其體膚内所慿恃有吾嫂之父母兄弟外所倚濟有鄭氏之老叔公及叔郎清來年或夏或秋或冬必得相見以圖後事長姪女今年纔十五嵗古人二十而嫁在今世亦多其婚姻候清來年共到泉州議之未晩也深知嫂從前辛苦今又獨撫孤㓜有不勝其艱難者然此實命也命乃天之所造無可逃移之理惟守志義㸔此子兒他日子兒成器則吾嫂之享福亦自然而然矣又筭命者皆謂姪子八字儘好可保養成他日亦必自能做人惟吾嫂保養之保養之王氏一𣲖在泉州者已絶今全靠吾嫂養成此子以繼其絶也吾嫂儻或失顧䕶則王氏宗祀乃吾嫂負之而亡者有知亦不得寧扵地下矣此書幸托令親張秀才為讀説過清只因十年身家舊債未還故至今有欠而無餘然自今以後當益自節用随時附寄些少以助衣食之計今附来細絲銀叄兩備用切不可被人欺謊妄費分毫盖此銀在清亦甚難得者前年兄在時有本銀十兩借人未知今已還未其回京時有本銀五兩借人今就須討起已令克忠扵上司及府縣告状務必本利追完然後􅁸身惟吾嫂以實告之此兩家借銀者量不是好人疑有欺孤弱寡之心當以官府公道斷之也克忠正二月便欲回因清本身去就事未决不意遷延直至扵今有缺書信甚負甚負萬乞情察外有香一束木綿布二疋祭文一帖奉祭兄靈牲酒銀伍錢著克忠臨時備用言不能盡矣惟内外諸親列位前乞一一引名拜意匆􅇵間不能各具書禮寓徐州寄存畏近時浙江左布政何公宜福建福清人也方在娠父以商出公既生母獨鞠育之甫七八嵗自知力學至二十登進士後父子始相見其居在在以公亷著稱若人者豈必皆有父日教督之始能成人哉况汝又幸自有汝父在惟勉之汝身雖不在我傍吾心則常在汝身也古男兒能自強者何限以非目及姑置之何公事則當今人人所知者故特書以寄汝吾且不久取汝來也送園地入縣學柬丁憂南京吏部郎中蔡清係泉州府晉江縣在城人有已置園地一所坐落本縣儒學背後周圍約有六十餘丈四至登載上手契書元有荔枝等果木在内因見本學生徒日衆不足以容如欲増建亦苦無地此地幸與本學接連思得不肖元由本學教養出身基本之地愧無分毫補報情愿送入此地來歴並無分毫不明日後子孫亦决不敢争執今特親筆立此文契并粘帶上手契書一紙敬送本學掌教林先生司訓韓先生劉先生列位伏望采其㣲誠而不之卻至願虛齋集巻二
