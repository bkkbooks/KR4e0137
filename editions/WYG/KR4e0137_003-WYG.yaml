body:
  text: 虚齋集巻三明蔡清撰序送梁先生使安南序大丈夫風度不凡雖其身不離乎几席尋丈之間而其心每行乎四方萬里之外時或縱談古今事則萬里在目前千年猶旦暮其意氣豪逸若不可制而徐考其行已操心則動有紀律其所以為功業本根之地者固自整然也若是者豈非出羣拔萃之士足以重吾國而受寄託於境外者邪若今石溪梁先生其人矣先生戊戌春闈所舉天下第一人也兹以司經局洗馬兼翰林院侍講奉命充冊封安南國使賜一品服以行人或有為先生難之者先生笑曰當今日一統之盛而仗上威徳以臨夷服之邦此特折枝之任耳夫何難者吾思昔者富文忠公使北當呼吸成敗之際而能以剛大之氣理到之言折强敵而安中華無負丈夫七尺軀也顧今日無所事此矣清聞其言益壮之葢其所自處者愈卑而其自負之意愈逺要其胸中之所包羅運用當不計其㡬安南也以是而觀上之所以簡命廷議之所推揚豈偶然哉是行也以一談吐而為安南千百年之名言者在先生以一步趨而為安南千百年之矩度者在先生以一從容進退辭受予奪間而使安南知朝廷有人而益篤其嚴事上國之心者皆在先生矣豈謂今日非富文忠公時而使命不足為國輕重耶然以先生所素養計之當不止假一使節以重國也且先生所慕在文忠文忠所以震當時而光來世者亦不止使北一事其終身事業先生所悉矣四方士友得從先生遊者共圖所以贈先生之行而責言於清清也愚請以先生所慕者之終身事業還以為先生贈而於先生使歸之後次第徴之如何贈龎公陞河南右布政使序吾福建右㕘政天臺龎公原化比奉簡命陞河南右布政使將行客有接公於三山而過泉者以語清云龎公自得報澹然不色喜而自鎮巡三司以下無不惜公之去而之他者清公同年友頗相知也因復於客曰吾固知公之未暇以此一擢為喜也公向在諫垣屢言人所不敢言其視一身之得失何如也既㕘大藩位亦髙矣而其心恒凛凜然汲汲然若自見其不足者今位益髙而其心益小也固宜且公嘗言卓茂魯恭僅以一邑之令長而樹百世之功名在當時若張禹孔光輩其名位非不髙絶百僚也而今也物論以為何如其視二子何如味斯言也則公豈暇以此一擢為得意哉葢内自有所重於此者而不必揚諸頰舌間也若夫諸公之惜其去而之他斯又以見公之在吾福建其所以宜於上下者可徴已然而有不必泥者葢公之不能久於河南殆猶今之於福建也行且見公正色朝端以主張善類而溥其澤於元元則四方人士皆將如家至而日見之矣此其為情顧不尤永乎哉清方以是復於客適公書来告別爰次其言以為公行贈葢前之説所以申公逺大之志而後之説亦以自慰其別離之私也送興化守王君存敬考績序天地生人之權其寄於守令者最近而守得兼乎令葢守賢矣他雖有不良者亦難乎其為容矣故自一郡言但一守得人則一郡無復事自天下言但列郡各得一賢守則天下無復事此皆實理也非虚談也興化非惟為南閩劇郡實天下文獻邦也生齒之繁姑無論縉紳之布列中外者常以數十百計至於英俊待用之士則所在成林人負一識見家樹一議論官於此者治行之美未必便滿人意少有瑕纇有能洞然而疵議我者矣為興化守者亦難哉𢎞治庚戌故大司㓂彭公興化人也以少司㓂進為天官少宰值興化守缺告於冢宰王公曰刑部員外郎王某可王公從之即以請於上夫知官屬者莫若其長况以鑑衡名公而為父母之邦數千萬生人注意於一世斷非偶然者王君人物於是乎可知矣君之莅郡於今五年聞其終日端坐􅈦事剸裁百務率據理以應了無疑滯大獄隠情一訊立辨吏不得與其案良民覈得其實者書一鄉善士四字以旌其門或躬率同列訪之才既不容奸而又風以徳禮於是其民益勸監司行部時或無訟可聽不停車而過嘗修治木蘭陂石隄若干丈其工甚鉅是陂闔郡所食之天也舉此一端可以概其悉心民事厚恤無告之民而更徙惡疾者所居使不溷於齊民舉此一端可以概其仁而知義餘不盡叙也况其律已素嚴而學不為虚文真足以厭服興化人士之心興化於吾泉接壌也清得而與聞焉適興化耆老及義民林淑孟林茂春輩謁文以贈君三年考績之行君在郡已五年而方以考三年績行者前此上司為地方計留君故今始行也清謂君今日官階雖未甚崇而其學已頗行矣君今日於彭公亦庶㡬為不負知己矣君既能有以厭服興化人士之心則將来大事庶㡬無不可為矣是行也聖明逺見萬里儻遂以君都方面之任或以㕘秉樞軸於中朝夫何慊者不然則更借冦君於河内他日亦未必不紀綱於雲臺也然君之胸次豈暇計此者吾知君有日矣君之凛凜然奉持其心而唯恐失之者葢未有巳時也送郡守呉公述職序居上不寛吾何以觀之哉此吾夫子為萬世為人上者立言也而周公亦曰平易近民民必歸之夫二聖人者有經天緯地之規模有存神過化之運用其論治豈不能為髙世超俗之説以聳動天下後世者而乃一則曰寛一則曰平易若故為庸庸之談者何哉二聖人者殆亦見之審矣葢凡職子民者本所以撫字而安輯之必不得已然後威加焉非專使挾威以鞭笞赤子為事也彼專事威治者其心曲底裏所在或不過期於合上意集已事而已寧暇顧小民之利病哉故其民畏之至如神鬼之不可近雖有至情鬱莫敢吐此其令行禁止雖可取快目前然國家之元氣則有為之潛虧暗削於可快之中而不及覺者伊欲仗以感召天和使斯民共躋富夀之域其亦難矣若吾泉郡守弋陽呉公之所以為治者在今日固未宜以厯舉而備頌之然大要居之以寛行之以平易務以安利吾民而不為矯飾之政以此質之人凡有耳目心知者當萬口一詞也於乎居今世為牧守而肯如是把握者㡬何人哉至於梗化之徒公固未嘗不厲威以痛懲之况清慎勤三事在公無一之不至而其宇量又自有過人者兹其所以能上安下順納我七邑之民物於度内而安全生息之也惟世之知徳者希不能一一皆知公之為今世不俗人物耳然下人之戴其徳者則談不容口矣公兹有述職之行父老以告吾二令周君某輩蘄得清之言以為公贈顧公之行何需於父老之贈而清之言又何足為公輕重哉以其情不可已也因為道公之所以安利吾民者如此以其見世固自有能知公者抑因可以諗夫周君輩之凡有子民之責者耳嗟乎彼世之為民牧者皆公其人黎民尚亦有利哉其於我國家之氣豈曰小補之哉贈節推葛侯報政之京序吾泉素稱民淳訟簡昔人至以佛國為之號夫概以佛待泉人固有未然者然即是亦可以諒吾泉舊俗之果厚矣比年以来誰生厲階舊俗浸改訟牒動以數百計或上司行部環遮馬首而譟者絡繹也於是為郡縣者轉苦其難而為節推專刑名者益不得辭其勞矣大抵風俗與時升降雖鄒魯聖賢之鄉不能保其常如昔日之厚要之視難如易反澆為淳則亦存乎其人耳吾觀吾節推葛侯廷錫之治吾郡獄也殆若易易然者旦升堂門内外聴理者霧滃而雲集越數刻視之聴者消釋過半矣且人無後言盖其造理精世故熟故明足以察持已㢘故威足以斷宅心慈仁故雖窮鄉婦人孺子不通正音語者亦得以達其情抑不獨下人怙恃之上之人亦蓍龜之矣值守貳位虚則七邑事悉叢委於其身外郡事有重且難者亦多以屬侯之才具何如也而其識度亦自有過人者未甞以刑罰佐私怒未甞甘於䛕詞而偏其聴訟本以理怨也侯意多在釋之或骨肉相訟則故緩於考訊曰爾曹曲直悉在我心亦悉在爾心其亟自省自改吾将使爾有和好於而家也侯之以刑弼教多此類是豈徒任精神以効一官者所為哉用是闔郡向化清聲四達侍御陸公遂采公議以請於上而旌之嗟夫大丈夫出應世用而能以其名實升聞於朝旦夕沐天書之寵褒且光榮及其親此其視籝金槖帛以歸飾田廬飽妻子之欲者所得何如也侯兹以滿三載當北上報政泉士夫謂侯之徳在吾泉人者深圖所以贈侯行者而責言於清清惟贈言仁者事也顧不肖何言之足為侯贈哉無已則有一焉盖侯於政暇甞與清論學而有味於畏之一字請得而繹之夫畏者心之防也惟大賢以上無所用其防其次概不能無賴於此曾子之所以戰戰兢兢至於啟手足而後知免者也自侯言之三載之前所以能成其令名者殆由此畏心也三載之後所以圖全此名者庸非此畏心乎近而用之一郡者此畏心也他日或進而用於一方以至用於天下者又非此畏心乎夫才行既出人數等而又能守之以畏心焉斯無遺憾矣清故繹侯之言還以贈之行葢所致意者乃終身事業所係非止為此一行而已也然是行也山川萬里寒暄異宜保重之術亦無出於畏之一字者斯又吾泉人士聞侯車馬之音而願侯庶㡬無疾病之心也况畏之為用無適不宜因併以贈送縣尹鄧侯述職序吾晉江以為難治乎古稱民淳訟簡素事詩禮矣以為易治乎今之詞訟一日或投數十百紙民間機事有終莫可究詰其端者矣大抵晉江俗固厚但泰寧日久生聚益繁而浸失舊聞者此雖鄒魯有不能免况晉江獨負郭郡日夕相臨凡百皆所需辦他六縣事又多所經從朝使及監司行部者時或二三或多至五六呼召旁午縣官走集策應無常期而不敢以時寢食者其常事也門闑之内吏之鴈行而待判民之林立而稟决者又日不知其㡬為晉江尹者果不可謂之易也寛則事不集急則民離心或得上歡而賈下怨或下無詛而上多忤自非有其識有其才有其守者鮮不終謂之難清江鄧侯光徳江右之傑也弱冠領鄉薦入太學甚有聲登選之日為冢宰公暨選曹諸君所屬目清時㕘部屬諸君皆以得賢尹為賀自莅任抵今將二載向之所謂難者侯固亦兢兢焉自以為難然人之視之則若易然者夫人謂侯易之而侯實自難之兹其所以得易之稱於人也與盖侯學飽經史洞視古今其識固自不凡而其當官制事也規模先定節目詳明而信以一之有善必嘉有不善必懲故令出而民趨之刑舉而民畏之其才實有非尋常可擬倫者且其獨持氷蘖之操萬事一公此又其所以成始而成終者也侯具此數長以宰吾一縣其果難乎哉實徳既周芳譽四達上官信之重之民事多所咨定郡之城垣樓櫓嵗前值災傾圮者十八九方岳諸公謀修之而督理之任獨難其人環顧庶官惟以屬侯此豈可以力致者又境内有永豐庄畜水斗門所畜灌溉六里之田數千頃頽壊嵗久無能脩復者侯一舉不數月而就此非有庶民子来之遺意者不能畧舉一二可見侯作縣二載間而聲實之孚上下者已如此繼此政績又可量乎兹以述職將行冠帶義民李碧輩請予言為行贈前此十數日民喧傳方岳以侯有修城之托奏免其行葢樂侯之不果行也今侯既卒行碧輩固宜有不忍别其父母之情也抑此亦暫别耳侯之滿腹民情將俟歸日沛然若决江河以盡其澤者尚可跂而待也送惠安張尹述職序意氣磊落之士更事多非其所優其優於此者又往往於大家風韻有欠焉清嘗以是而旁窺今之從政君子其有能越是範圍之外者葢亦有數也已惠安為吾泉劇縣上按藩省而下引郡治及漳汀諸要郡寔公車使節所必經之地外此庶務又不可勝舉然而編民之以里計者纔三十有五而止以三十五里之民而供是公私種種之務誠亦有未易辦者矣浮梁張侯徳威以辛丑名進士出宰是縣至未及期公私庶務了辦如響一縣精神為之煥然一新下至公宇郵舍橋梁道路之類亦皆以次興舉無遺而又知興學校表先哲重人材迄今四載之内成續彬彬焉暇則與二三名勝相與周旋於詩書俎豆之間或登髙眺逺把酒雅歌瀟然若在事外者且夫侯之進士從文字議論間得耳况素磊落若不屑世務者一旦作縣乃綽有餘力若此稚腐書生誠不識其何術也其豈非以磊落之資而兼夫實用之才者邪以故守鎮按節及藩憲諸公每至其境目其規為咸嘖嘖慰喜遇以殊禮而叅會考論一時作縣人物輒以侯居最焉是豈偶然哉今兹當述職北上清辱知素深方將䇿欵段往餞之行以疾未果而泉中諸縉紳與侯交雅者顧命清言以為侯行贈精神忽忽固謝弗獲嗟呼侯於作縣辦矣清兹所言贅矣獨有一説可以為侯是行贈者我國家治平百年萬品滋阜是以上下之間不覺其日趨於巧便侈靡夫巧便侈靡之風行而天下民力將弊此亦君侯輩之憂也以吾徳威之才行器業其駸駸當路而非久為惠安人士所借留者衆舉知之矣病蹇寒生正未知後會果在何日惟侯益加自愛尚思以其所以振一縣之治者進而與天下士大夫審圖之今日要務毋亦在於培養天下富厚之力而於文物之近末者姑少緩乎哉夫天下者一縣之積也卿相事業惟優於作縣者最辦吾知侯將自是升矣故為此贈送南安陳尹入覲序前三年清領薦上京師道聞建徳陳侯以太學生授吾泉之南安令私以為近嵗朝家於縣令一選最重率多用進士充侯乃以太學生得授令是侯非進士執政者固以進士待之矣時則已卜其當有過人者既而行經建徳試詢侯為人則知其為前廣東憲長某公之子學識素優長又操履剛方不茍於是始信宰物之地其所以畀任於人者非偶然也洎清歸自京師侯莅任已嵗餘南安人士時有相過從者道及侯輒嘖嘖稱服以為侯之力量才猷春生秋殺偃然百里諸侯也又清慎而不阿前此寔所未有第謂其稍過嚴難犯耳雖清亦以此一節為侯疑逮今且三年矣適丁入覲之期南安父兄相率来桐城丐清文以送侯行者轉頌侯之徳惠不置惟恐侯之無意復来也問猶傷嚴乎則皆曰否以告者過也我侯性仁不嚴嗚呼嚴豈病仁者哉以清觀之侯果嚴也然其嚴者亦所以為仁耳今夫風雪之厲寔開陽春天道也昔子産相鄭政尚猛輿人曰孰殺子産吾其與之三年更頌之曰子産而死誰其嗣之何者葢其乗人情廢弛之餘非先以嚴無以為寛張本也及子太叔不用子産言惟從寛也治遂不競後乃悔云吾早從夫子不及此且夫子産之嚴始也若厲民矣而卒来輿人之頌太叔改而寛宜其於民永便矣而卒貽後日之悔辨治體者於此亦可以尋其故哉故為政者宅心當一以愛人為主而立法則有時乎尚嚴非終始於嚴也譬之治地然始也芟乂其草莽揮斥其瓦礫繼則當沃以清泠之澤滋以糞壌之利俾遂其生植之天矣吾南安俗固厚民固淳然泰寧日久人情流於懈弛而或玩視其上者雖在鄒魯不能免此侯之治所以始得嚴名而今乃浸以為惠也繼自今規模既定民志既一吾知侯雖欲復嚴亦當無所用其嚴矣述職来歸鳴琴而治可也清故曰風雪之厲實開陽春諸父兄其以是言質之侯侯必欣意會於此此則清之所以為父兄贈侯行者也若夫侯之徳政之實則章章在人耳目且有輿人之頌及諸先生之述作在矣故不贅送按察司楊照磨考滿序至今談我朝清明之治者尚嘖嘖三楊公時之云三楊公者我太宗暨英廟累朝所倚任腹心輔臣也其一為吾閩文敏公榮一為江右文貞公士竒又一為湖南文定公溥三公者俱以學術器業厭服一世而文貞之精粹温宻及所以潤色太平者或又謂其最優清每景仰髙風且念欲一見其子孫而扣之以盡其平生行業之素而末由曩以諸生舉於鄉獲接今按察司照磨泰和楊君明之於三山時予雖頗得君為人猶未知其為文貞公之孫也兹予得告南歸適君秩滿之期某人因以書幣至泉徵言為贈且曰此文貞公之孫也其居官清慎惠愛最得上下心先生宜無靳焉清嘗得文貞公文章讀之見其當時所施之士大夫者往往皆規以公清自靖仁惠及下之言葢非獨當時受其言者以為終身之規今其言播之天下凡得而覧之者大抵皆因之有所感勵而作其自樹之志而况於親為其孫者乎君以清慎惠愛得上下心理固宜然也君行且去此以上績於天曹位任将有加焉則君之所思以紹厥祖之休者當又如何也公昔嘗序送族孫明逺訓導云吾家自元至今殆二百年内自朝著外至郡縣百司之職無不有焉而無一人以不職失其官者明逺必克繼之而後為賢子孫也又曰吾猶冀吾楊氏之子孫皆賢也嗚呼盡之矣若君者其豈不為楊氏賢子孫也乎哉朂其終焉可也送鄭仲平教諭掲陽序吾與仲平相識者二十年相知者十年矣吾之學不如仲平之正吾之行不如仲平之堅吾之制事處家族處鄉黨上下不如仲平之剛以信凡兹數大節目吾皆不如仲平乃僅有中進士作京官一節為先仲平耳吾之所得視仲平不亦末矣哉吾以是自知不可一日無仲平也方幸其舉進士來京師而圖為相依之計冀或藉以少進焉而仲平今乃以乙榜例授教官得廣之掲陽教諭以去吾甚恨失之然仲平之授是職初未甞自以為少也吾意仲平所得者其將於是乎昌哉掲陽士風其將自是益進於昔日之所謂盛者哉是盖人事一機會也文選郎吴公敬昆掲陽人也既得仲平以主其鄉邑之教間以稽諸衆衆多知仲平者盛稱其賢吴公乃喜曰吾庶㡬能為鄉邦得賢師儒矣乎凡吾之為是言者豈固以張吾仲平哉吾誠欲掲陽人士知吾仲平之大概庶㡬其不以尋常為祿仕者見目而當有氣求聲應於舉子常業之外以備吾國家異日為棟梁柱石之用者也吾又欲掲陽人士知吾文選之所為鄉邦模範計者有若此之拳拳庶㡬其感勵之心益有不容少緩焉者也更欲吾仲平自是恒念文選及衆人厚望之意益加凛凛其心期他日大有以慰於文選及衆人者也行矣仲平丈夫生不為將相得為師儒亦可矣且善自待之如安定胡先生之在蘇湖亦止一州學教授耳而教澤被當時餘芳流萬載其不能自愛者雖黒頭公長樂老其浮雲富貴今竟何如哉吾仲平於此固知辨之早矣此則朋友相知之言也送觧元林汝宣赴春闈序鄉舉里選之法既逺有國者取士率專以文藝一科為正途士生斯世茍不能自甘於草木俱腐而欲以功業見者必先以其天所厚我之聰明而費之於此然後於功業之地有階而可致故自唐以来名公鉅人不能舍是以進身所謂豪傑之士由此而出也然謂豪傑出於此則可謂必出於此而後為豪傑則不可謂既得於此而遂為豪傑尤不可也言及此則吾人之責其亦重矣吾泉同安林君汝宣少予一嵗而天資敏甚器宇老成學問之力尤出人㡬倍衆期之髙第也久而屢不得與主司者遇逮丙午秋果舉福建鄉闈第一人且前此數與其同儕較試於郡邑及藩臬諸公汝宣名往往在第一則汝宣之素負可知而是舉也允惬公論有不待贅者矣然則汝宣遂持是以取第春闈而致身於通顯也抑又何嫌何疑而汝宣方且自視若有所未足者爰就所居之傍搆書樓一所日夜藏脩息游於其上如是者又三年盖其所得視前益厚矣乃始治裝辭二親為赴春闈之行其友某書来請予言以贈之予於汝宣故相知其始之未捷也予期之久而未得也予訝之其既得也予喜之然喜其得於秋闈者又未若以其遲於赴春闈而喜之之深也何則三年學不志於糓昔夫子時猶難之况今汝宣文學既成於工夫積久之日而且魁薦於其鄉者乎予意汝宣胸中必有處矣其自待必非以一得於此而遂為豪傑者矣必將由是以進而自臻於豪傑之實地者矣明樓静舎左圖右史披巻厯厯可法可師予不能為汝宣言之而汝宣亦何假於予言哉盖常思之矣我朝自開科以来會元狀元且不能悉數况於解元乎就解元言之在吾閩亦不為少以今而觀其聲迹尚昭昭燭燭於人耳目中者能㡬哉予才不汝宣若也而舉於鄉時名適相同今兹所言草茅所用以私自警省焉者也故於汝宣此行為誦其畧計當無以其詞采之不華而病之乎送凃君體常司訓湯溪序予嘗竊以為丈夫生不為將相得為師儒其可矣何樂乎為將相也夫為將相者茍其道術素具行之以時呼吸進退之間危可安安可久亂可治治可大治以數十年之身而遺數千百年之休何負乎為丈夫也時乎有事將數百萬之衆運籌决機坐使梗化干紀之徒冰消風靡脱吾民於鋒鏑之下又何快也是故君子樂之然古人之名將相可數也其學大抵皆有所受則師儒者凡百人才之所自出是又未可以亞於將相論也宋安定先生亦一學官耳而當時所造士足以供國家數十年之用向令及門者有房杜英衛其人則將相之業雖不及身為之固亦有所遺矣謂師儒所就者狹可乎哉今世師儒之官自國子先生及督學憲臣之外多有不樂就者意者道不足以自尊而世情冷暖之間或不能無所擇耶至於其間有樂又往往出於日暮途逺之計其志未必皆為人才謀也若是者盖視師儒為易為而不知師儒之難為也不知其難為而為之則固未敢以深望矣吾友凃君體常與予相知二十年其徳性最良其在學每上官按試率常居第一予始望其大就也乃竟不得典一第今以貢来試於殿庭及銓曹皆髙等遂受浙之湯溪訓導以行或曰其年猶少盍少待君曰吾自樂之也或曰惜官小不稱其才君曰吾固甚難之不敢小視吾官也吁今之訓導無知童子猶小之不敢自視以為小者僅見吾體常一人士别三日當刮目吾友比来所得者其深乎兹行其將有意於湯溪之人才哉予故首以自古名賢之出於師儒者為言之非以侈君之觀也所以壯君設教之規模也不知君竟以為何如耳送判簿楊君之京序吾泉郡屬有七南安號最難治盖晉江雖巨縣附郭多供應然地稍裕糧稍輕民猶易於趨事自惠安以至永春則縣浸狹民且淳而事益簡惟南安多深山峻嶺或行數十里不聞雞犬聲地可耕者不能三之一而從昔科糧獨重視他縣率一再倍以是其民多貧民多貧則勢屈於有力者往往以不得其平而鳴於上如是則事益繁俗益偷而官之者益難矣雖縣令號得專制猶或難之而况於佐令者乎太興楊君宗震由太學生来主縣簿三年得人和而事無不治且職專財賦民之輸者自以時而退罔有後言此可不謂之才哉才名既著上官之委重於君者益多君常戴星出入或野宿不得歸廨舍者連旬日事之上報者往過而来續無不了辦然則君之才不止優於一簿也今以滿三年將考績之京上官又以闔郡折色糧價萬兩當貢之天府而督運之官實難其人乃因其考績之行而俾督運之京先公而後私亦以重其人也濱行耆民洪文傳環輩相與叙君之績謁清文以為贈顧清豈足以知文哉姑據所叙而道其畧如此盖民素沐君之惠而不忍君之别故為是贈以重君之行而期君之速歸以終其惠於吾南安之民也抑清又有致意者君至京師儻當道故人有問及民俗者幸為言今天下大勢如壯盛之人飲食起居自如也而善醫者察其脉而危之以為病在腹心焉何者民偽日滋也民偽日滋者官為之也官為之者上官之察治不精而刑賞或失經也噫民之病也久矣蒼鷹乳虎日饜膏肉顧得賞而無後災如之何民其不趨於偽哉偽之害其有涯哉此當道者之責也煩為語次一及之賀典幕蔡君承上官奬勵序天下之官惟作縣最難而典縣幕者為尤難作縣而得上官之奬勵者固難至於縣幕而得奬勵者為尤難或莅任二三年而得之者已難至於莅任甫及一年而遂得之者豈不又為益難哉斯可以見人才之優劣矣安溪典幕蔡君某以去嵗十月終抵任今嵗九月郡守吴公即移文於縣俾率所屬官吏耆庶用鼓吹花綬牲酒之類自學宫導送君抵其􅇬舍以奬勵之此安溪百年所僅見者也盖君某邑名家子少穎敏而好學既而以為養故不得就其志乃從事曹掾而得此幕職樹此政聲也聞呉公文移大意若曰某官自抵任以来節操既堅規為又當了積年之逋負於視篆數月之間佐一縣之紀綱於刁風屢作之後此葢摭實之言而奬勵之禮所由舉也葢非蔡君之賢明無以來呉公之奬勵非呉公之奬勵無以顯蔡君之賢明且奬者奬之於既往勵者勵之於將來斯葢期其始終一節而績效益隆也况其所奬勵雖施之於蔡君之一人而其所勵實行於七屬之庶官此為政之所以不可無賞罰也此賞罰之所以為鼔舞人才之具也此蔡君之被上官奬勵所以不可以無術也此安溪士民之所以請予文以為賀而予之所以不辭也贈錦田驛宰丁本茂攝縣事竣序清江丁玉川天下之名畵史也惟其以是一藝名天下故凡人之遇其子若孫者猶有加於尋常之無聞者焉則人豈可不有以自重乎哉玉川之孫本茂為吾泉惠安之錦田驛宰自其始至惠安人士概知其為玉川孫矣其宰錦田也公車使節往來無虚日君處之綽綽焉用是當道者可之檄兼鹽塲事夫鹽之與驛其冗均也君以一身莅二冗間初若不覺其冗者君於輩行中亦可謂能乎哉比者縣尹浮梁張候適欲白事於省時縣事未有所屬顧僚佐咸無在者惟丁君可乃以縣事屬之丁君果能一遵張候約束且秋毫無擾焉凡執役於縣者甚安之迨張候既歸君乃退復厥位夫驛宰天下多矣以他官攝縣事者天下亦多矣盖未有以驛宰而攝縣者而今乃於丁君見之君其果有過人哉試近取譬論之天下事大概亦如畵然何者物有象善畵者惟鑑其象而肖之至於濃淡踈宻之間則在乎布置得其位事有理善處者惟肖其理而行之至於損益輕重之際則在乎措置得其宜審能是以宰驛可也以攝鹽事可也以攝縣亦可也又推而廣之則有不止於治縣者丁君盖亦有得於此乎丁君得玉川家之傳者也其平居亦嘗推類及此乎鄉老陳肅輩介予友孫君恒謙請予言為贈予雖未深知丁君之為人然以其為張侯所屬用又孫君為之請知其果非庸衆人也卧病間為秉燭書之送邵君廷瑞歸淳安序吾邑二尹方侯某造予具道其外叔父廷瑞之賢且曰吾家食時君之遇我厚君兹之來也又與恒情不類盖聞吾為􅎱嫉者所仇事在有司而傍無强近之親恐緩急無能任吾事者故不逺數千里以來既至而吾事幸得直吾事既直而君不可留矣自始至今纔浹旬耳而行期確不可緩吾誠不能為情也顧其平日所重惟徳行文章儻先生幸惠一言以表其行亦少塞主人之缺也嗟夫凡士夫官於他鄉其親戚故人之來官所者大抵非以情即以利耳以利者多見其欣而來怏怏而歸主人則或以怏怏於其來而欣欣於其歸以情者庶㡬反是然始以情來中或遷於利誘而終至於失歡者亦多故士夫當官而患不得於其親戚故人者往往也是豈士夫一得官之日而遂恝然於其親戚故人哉親戚故人之知義者寡矣如邵君於吾二尹其所以處夫去來遲速間者利固不足言而情之説亦未足以盡之盖一於義者也故其來也有戚戚焉而其歸也欣欣焉主人於其來也欣欣有甚焉而於其歸也則戀戀不能釋焉無他一義之所終始也故曰以利交者有時而離以勢交者有時而叛惟以義則自結髪以至白首或窮達夷險之異途皆不失其金蘭風味也如邵君者斯可為薄俗勸矣於是乎書送郭徳孚歸增城序增城郭君徳孚吾郡通守廖公祖母氏之孫於公為兄弟行云夫論兄弟之親固有倍蓰於此者而或相視猶人人也而公之於君乃千里馳書邀必至官所風雨對床無間同胞久之猶不聴其去兹固可以知君為人之素而公於親親賢賢之義亦可即是以占其餘矣適廣中有盜弄兵於潢池者君用是急於歸䕶其家族而公亦有是托於君也君遂行公館秀才楊裕卿輩因請予言為贈人有恒言皆曰親戚云親戚云然徒得其言而不得其所以言者亦多盖親愛也戚憂也人情惟相親愛則相憂戚矣相親於無事之時而相戚於有事之日此親戚之言所由立也或者當無事時各能以親自名酒食相徴言笑歡洽自以終始無間然矣及夫一貴一賤中情乃見至有不得其門而入者又或少有憂虞則相視如途人計利害以為趨就絶不可托矣斯豈親戚之謂哉若公之於君也親雖不甚切而情則甚親盖其疇昔相與道通氣合有在於親戚之外者故今日有此眷戀有此付托耳且公之始邀君也將以同其樂而君今辭之歸也乃有以分其憂是其於道義又各得之矣予聞以勢合者勢衰則離以利合者利盡則疎惟以道義合者亘始終厯夷險而如一日其公與君之謂乎君今歸止罄所心力使兩家門户咸得保全無恙報音至泉公心以慰而吾泉闔郡民庶士夫亦為公而慰心焉則予之言益中矣是為贈永寧衛送别序永寧衛儒者張士昭為予言其衛知事陳君用之之賢曰吾衛中絃誦聲素希自吾二三子者始私習焉用之獨善之而病其孤也訪諸貴胄及戎籍子弟之秀者悉勸使就學或步詣其門諭之曰古人雖在軍旅不忘道藝人間惟此一種味最不可少者且為敦請興化鄉進士陳愈為之師使傳其學既三年得可進者三十人為申白當道乞得如民間俊秀例附充泉州府學以均教育備選舉格於時制不克盡如志然永寧自是文風稍進學者徳之又曰君有學有守在衛幕獲上而信友也凡衛之宿弊巨奸以白當道而誅革之殆盡皆他人所蓄縮不敢任者其事固昭昭然逺近耳目中也今其職滿九載行有日矣吾儕其能恝然乎爰各賦一詩以寫其不忍别之情而未有序之者惟先生念其有勞於吾人也而有以賁之嗟夫今天下事涉斯文者何預於武家雖公侯之尊都閫之重亦無有能任其責者而人亦無得而責之况於衛乎况於衛幕者乎用之之所用意於是乎為不凡矣夫佐衛幕而能慎操履賛籌畫嚴泉貨之出入公獄訟之是非得無咎怨於上下斯亦足矣何暇籌及斯文於疇昔所乏之地哉用之分外事業有如此則於慎操履賛籌畫誅奸革弊之類又何有哉使不制於命位任稍隆得従事於士民之間則其所建立又當何如哉吾是以意天下之尚多遺材也用之今秩滿例得陞矣然吾猶為用之惜也盖平世既用資格鮮有不次之擢固未知掌銓衡者其知用之能如吾輩之悉否也以理揆之兹行或可得令長乎昔卓茂魯恭僅以一令長而樹百世之功名斯亦足伸丈夫之志矣如止以長衛幕耶雖不得其志亦其一衛之幸也盖世有位尊而才不稱者謂之鰥官曠職有材優而位不稱者謂之徳浮於位二者孰得而孰失孰榮而孰辱必有能辨之者用之行矣毋取必於在人者而惟盡其在已者善其終以全其始可也是為序送愛菊軒歸臨川序臨川愛菊軒先生吾郡侯陳公之伯兄也公起布衣擢甲科躋顯宦外忠於國事而内不失其親之養者正以有先生為之兄也先生孝友之行膾炙人人又雅意髙潔不為勢利覊愛菊之號亦可以知先生之概矣某近自京師歸先生適奉髙堂之命來泉視公相遇於逆旅初未知也雍容數語乃知公之有賢兄焉以為從容且有日及抵家不數日而先生已戒道言歸公不能止也晉庠諸先生及士友因命某言以餞夫宇宙間凡百皆外物唯天倫之樂最真先生以卓犖之器而潜徳邱園偕諸仲季上奉百嵗之親使公得以一其心力於為國為民而無内顧之憂今兹之行又非為名利役也其來也念常棣之愛其歸也急椿萱之奉則先生之所以為人子為人兄者於此又可概見矣自古忠臣孝子常苦於不能兩全豈惟以君臣之分殊彼此之情隔盖亦無良昆弟以任其門内之憂耳今公以雙旌五馬之貴二千石祿之富而二親適皆遐齡康豫光膺天寵於華堂之上又得先生為之伯氏以綱紀其一家之政時一往返以通安否此其為樂人間能有㡬哉孟子曰父母俱存兄弟無故一樂也若公者得之已有餘矣雖然此猶未足以盡公之樂也公方欲推其樂以及於人使吾泉闔郡赤子咸得以父父子子兄兄弟弟又欲進而廣之使天下人人親其親長其長寰宇之内同一家人父子之天而後公之願始塞矣乎此則所謂後天下之樂而樂而非止一身一家之事者也故因序先生之别而及之先生其必有以賛於公矣夀蔡孺人九十序友人文選員外郎黄君汝脩甞為清言其外祖母蔡孺人王氏之賢且曰凡婦人識見所不及者獨超詣焉當吾外祖蔡陶公之尹巴東也未及三年且無他介累一旦欲乞致仕歸祖母不色難且賛决焉自是相與周旋林下教子育孫者又三十年外祖夀終九十祖母今亦年九十矣幸尚康强無恙也清為之歎曰兹乃所謂配徳者乎抑其夀亦相配殆天相也兹豈非盛世之人瑞哉未㡬汝脩示清以其所作慶夀圖及其所得於諸縉紳君子所為夀詩曰六月六日吾祖母生辰也將以是申吾情焉願為一言引其端顧清實寡陋不敢當而有不得終辭者嗟夫夀者天之所甚靳者也王公鉅人力能拔山智能竭海而萬方不能攘一夀盖甞以耳目所及考之一鄉數十家或數百家中求年七十者指已不可多屈信人生七十者稀矣若八十者或連數鄉僅一二見至九十者則或闔一邑一郡所無間有之又往往氣息奄奄其無害者又或衣食之不裕或足衣食而乏子孫焉或子孫無良焉又或徳不稱其夀雖夀無足深取焉其在女婦則苦樂由人不能盡如意者尤多曽如孺人者配徳賢大夫耄期偕老孫曾成行况子克世其家物而婿位少司空女封淑人孫行有職天曹者哉司空淑人者汝脩父母也然則孺人之夀之可慶也為何如耶盖不特汝脩之所喜躍有事凡與汝脩有一日之雅者亦皆為之嘖嘖稱慶也况孺人尚康强其夀又未可涯哉雖然孺人之得髙夀固有大道矣洪惟我聖祖再造華夏列聖相承熈洽已百三十年和氣充乎寰宇萬物概得其所故今日往往有髙夀老人在人間為其子孫所慰􅂅焉不然中外多故生人皇皇石壕至有應役備晨炊者其能九十耶吾以是念我國家之徳之在吾民物者深矣此汝脩之所當知也然而天下之太平無事也久矣此又吾輩之所當知者也洛陽送别巻後序右洛陽送别圖一幅詩十數首序文一篇吾晉江士夫為令尹鄧侯子執方歸清江而作者其於斯文骨肉之情天涯南北之感致身青雲之望概盡之矣鄉先輩香山尹劉侯又命清厠一言於其後且曰鄧侯謂蔡子知我者儻於此能不吝鞭䇿駑駘之言又何幸也顧鄧生自是千里良駒而區區百病叢身方自謁醫之不暇而敢以芸人田自許哉然知己之意長者之命皆不可虚辱也甞慨昔人好學而困於貧至或偷隣光囊螢火或借書以讀猶汲汲於其志之就聞鄧氏清江巨室也生席潤屋之餘澤兼祿入之餘貲書籍膏火之類計無有不如意者矣矧富年英質逺到可期此而不好學焉真負此生哉真負乃父師之教育哉亦為負今日諸士友之所以握手丁寧於洛江之上者之雅意哉抑後世之所謂好學與古之所謂學者有不同此又在所當早辨者甞記紫陽夫子之訓云書不記熟讀可記義不精細思可精惟有志不立更無著力處凡今之貪禄利而不貪道義要作貴人而不要作好人者皆是也直須一躍躍出此關不仗作此等人方始有長進處又曰盡讀聖賢之書而不通於心不有於身不能推於人此與書肆何異清之誦味此言久矣噫非知之艱也非知之艱也兹為生及之戚戚若芒刺在背耳意吾鄧侯之所以厚其子者亦當無出此道故以綴於洛陽送别巻之末庶㡬髙材疾足者逺到之一助也系之歌曰送子於洛之陽兮洛水泱泱孔子曰逝者如斯夫兹味一何長願言咀嚼兮當百倍於别酒之嘗洛江浩浩兮無逺弗到孟子曰有本者如是兮應知實道之可靠吾病枝葉誦説之誤吾半生兮不知此於世道也何補於君親兮何效洛陽送别圖詩序順天府秀才武進畢君朝用今親君某衛指揮使公介子而吾泉貳守公同髙祖從弟也朝用從父家京師吾貳守公自始貢至登第之日皆就而家焉故與君恩義之篤一如親昆弟也朝用以去冬來省公公留之不聽其去者數月兹将去既自為詩送之公之館賓鄭世用暨凡與君交雅者亦不能釋然於其去也爰命工繪為洛江送别圖而各詩其下以識意且屬清序之盖洛橋在泉城東二十里許送别而必以是入圖者泉之人凡送别者必至是也盖取其景真事真而詩之發興有以矣嗟夫昔太史公世居西河而南逰江淮上會稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都鄉射鄒嶧暨過梁楚以歸收拾其所得得一部史記焉則大丈夫不可不志四方也明矣今君居京師在天之北而吾泉邈在天南相去八千里君之迢逓而來也所居名山大川多矣所得竒聞壮觀衆矣豈無以觸於耳遇於目而㑹於心者乎吾泉人物雖非齊魯鄒嶧之比然十室之邑必有忠信又豈無足以助君之見聞者乎况貳守公文章政事蔚為一時所雅重君於公之入也可以學問其出也可與觀政所得又不既多乎君兹行信又不為徒行矣雖然子長一部史記固得之於四方而蘇老泉杜門讀書不出户者六年亦卒以成其業予謂君之來也既有類於子長之逰既役役無所得今駸駸入老矣又以百累所牽欲為老泉之守而不能甚矣青春之不再可念也兹固為君拳拳焉若夫區區别離感慨之情則有不暇喋喋者且諸君之倡詠盡矣贈醫士童君某序自愧齒益長學益荒行業益頽落四方故人尚有不忘我者而我之負故人則多矣嘗聞宇宙間三不朽立徳也立功也立言也然是三者固有輕重自古未有能立其徳而無其功與言者雖顔子之窮固自有功於名教零落數語萬世鍾吕設不幸不傳在當時亦必以善言徳行歸之若有功者雖無其言亦自為不虚過一生矣惟能言者最不足恃桞州金陵至今為天下口實况不敢望桞州金陵之萬一者乎是故言不足恃也盖言必出於躬行心得之餘然後其言有味而可珍庶㡬足以信今而傳後不然言者與受其言者俱不足為有無也愚以是深自愧省不欲事此無益之勞久矣曩從都下歸過浙同行二十人病者十有七予疾勢尤殆藩臬為致某縣童君某醫之次第無不起者愚之徳君何如也薄有所酬則不受曰盍贈我以言乎不容卒辭也諾之今四年矣而未克償人之無信如之何哉夫僕非敢忘君也誠以其言之不足為君重耳然而終不可無以償於既諾之餘也抑古之所謂贈言者匪止揚其善而已固将有以進之也是故有請贈之義君兩浙名醫也予也懵於此道其將何以進君哉閒嘗道聴一二似有至理聊為故人晤語及之或有得意外喜而風者徧諸醫厯諸方不効有國醫者直紿之曰趣辦後事不可復為矣於是病者以為必死悲甚而病頓愈盖以憂藥其喜也此豈有方可傳哉又有痢下者一良醫多方療之不止一日偶見作字者持水器注硯指按其上竅則水不下放之乃下因悟曰吾得方矣遂炙其百會穴而痢止此又豈但能傳古方者哉夫醫者意也固此類之謂與凡古方所載計君皆已洞然矣若此之類盖亦君所樂聞而或足以印證君之所得乎君穎悟過人通書史又重義輕利平生活人之蹟盖不可勝計古之所謂立徳立功者固不止如君所就而君之所就要亦不可不謂之徳也要亦不可不謂之功也夫仁亦在乎熟之而已矣愚固於君有愧也賀歐陽生冠帶序南安興賢里歐陽生鎬㓜喪父繼喪其大父且伯叔期功之親亦以次淪謝獨生隻身孑然依大母以為生其天資聰敏仁厚有過人者未弱冠能奮自樹立孝養其大母撫其家人而敦睦其姻戚人皆賢之既而所治貲産日益豐裕非惟先世門閥悉還舊觀而其堂搆之功乃有功於前烈人益賢之比者朝家以邉防事重令民有能出粟助邉者與冠帶榮身生復如例得冠帶焉於是其姻友謝芳輩榮其事而謁予文以為之賀予昔乃交生之大父元之及叔父秩二君皆好學重義有聲士林轉盼數載則皆已隔㝠途盖嘗訪其後事而為之愴然今乃聞有生之振勵能中興其家世故人情云胡不喜聞而樂道也夫物理有盈虚而振作存乎其人以曹翰氏元勲之家而子孫一仆不復起以希文少從母外適矣乃克振范氏之宗而昌大之盖善人宜有後而人力可囬天非偶然也生今年纔二十有六而所立出人已如此茍能如是益衍其先世詩禮之澤律身而教子親親而愛人表裏合一誠壯老堅一心則歐陽氏之祚宜未有涯雖范氏家世之盛理或可㡬也豈止今日親朋所賀者而已哉予雖膚淺猶或能泚筆記之以為為人後者勸也書歐陽行周先生文集序閩人登進士第自歐陽詹始此昌黎韓公之言也夫以一第倡一方此其人物似亦未足多者何至動韓公之紀錄也盖閩自漢武帝徙其民於江淮間而虚其地至唐中世民之生聚猶且無㡬而况於文物乎獨歐陽先生秀出凡民之中早知從事乎周公孔子之道文行蔚然觀察使常公深奨異之至京師受薦陸宣公與韓公及李觀李絳崔羣諸公聫第皆天下之選時稱龍虎榜焉則其視尋常一第者固有間矣謂非一時之豪傑不可也自是閩士始知所向慕儒風日以振起相師不絶迤邐至於楊龜山李延平輩分河洛之𣲖授之朱子而正學大明道統有歸吾閩遂稱海濱鄒魯矣是正有類夫𤓰瓞之勢其蔓不絶至末而益大者謂非先生實為之根柢又不可也先生故有文集十巻行世前輩稱其精於理而切於情可知其非止工於辭者而近世無傳焉今冢宰福郡林先生始自内閣錄出以傳吾師信豐尹荘世平先生得而刻之於梓力未克成吾郡守弋陽呉公克明聞之曰是兹郡中文獻也吾當有以表章之遂捐俸以卒其工而屬清一言顧先生家世履厯行業詳載唐書本傳及李公貽孫之序者已刻其巻端無庸清小子之贅矣兹特揭其所係於斯文一脉者如此使後之人知先生之功在吾閩者不止為進士第破天荒而已也蜀阜存藁序融堂錢先生生丁宋日之暮盖不能改廢繩墨以投時好者閒嘗小試仕途不旋踵輙巻而去之往往棲託於寛閒寂寞之境日與聖賢相賓主與其徒相倡和與風月溪山禽魚花木相朝暮而其神之所適盖自東極之東西極之西南極之南北極之北千萬載之上千萬載之下皆在其所鞭駕覧厯之内也嗚呼亦振世之人豪哉其言曰人間之樂動中見之天地自然之樂静中見之又曰坐閱羣經觀其規模制作如四時錯行如日月代明無一不與我心相應者又曰大包宇宙元無際微起藩籬即未純嗚呼先生之所自得者如此以此而見於詩見於文又豈區區愚生俗子所庸置其品題也哉惜其遺藁今不盡傳是編名蜀阜存藁則今吾閩右布政使梅軒徐公所收集於散落之餘而校定焉者也公将行之梓命門生蔡清覆校而序之且曰其詩文皆自大本大根中流出與尋常枝葉者不同清因以此意求之而得其大致若此嗚呼先生沒於淳祐間去今二百餘年而其遺藁乃始得吾徐公表章之是大類昌黎集之見認於二百年後之歐陽公者矣斯文之顯晦豈自有其時哉先生名時字子是其學得之慈湖楊先生簡敬仲行業詳載宋史浙之淳安人也徐公名貫字原一亦淳安人中州音韻序盡六合所有者既莫不各有其字矣然生民之初未有其字先有其聲聲雖出於人之口其實皆氣機之自動天籟之自鳴究其微有毫髪非人所能為者後之哲人乃用六法以制其字而舍其聲故聲本於氣氣有隂陽五行聲有清濁五音天人一也惟氣之界分不同故五方殊稟而聲亦随之然天然自有之中則不容有二也盖天地之中氣在中國中國之中氣在中州氣得其中則聲得其正而四方皆當以是為的焉此元髙安周徳清先生之中州音韻所以為人間不可無之書也思昔先王之世書必同文文同則聲同其必有以中天下之不中者矣秦漢而下王者不考文及江左音倡而天下無正聲因循千有餘載而我太祖髙皇帝始命儒臣大釐正之名曰洪武正韻信有以追先王考文之典而為萬世不刋之書矣然人知正韻出於當時儒臣承詔之所編定而不知其有得於中州音韻之書者宜多也何以言之虞文靖公一代名儒也嘗愛徳清先生之書而序之深許其得音之正而序中所謂呉楚傷於輕浮燕蘇失於重濁云云者今正韻凡例中純用之則是當時諸儒之采用其書初無損於諸儒之自得而適足以見其能集衆美以成一代之盛典為可嘉而徳清先生之功亦於是乎為不可掩矣顧其書雖為識者所賞而未及顯行於世况更物以來蠧蝕湮晦復百餘年呉興王文璧先生隠居樂道沉潜書史而不廢音韻之學今年九十矣乃能取家藏故本大加訂正視故本為益精且詳以吾閩憲僉張公某其甥也屬為梓行之適漳守羅侯某及龍溪尹姚君某獲見其書遂請於公以成其事俾清識一言於其端嗟乎是固天地間之中氣正聲所在而我朝一代盛典所開先者也充其用則被之絃歌可使大樂與天地同和而天下化中者亦未必不於此有取也其可使無傳乎文璧先生以九十之老而留情於此其庶㡬漢伏生之風乎而張公輩樂成之是皆能為斯文出一氣力者也題䝉引初藁序國家以經術造士其法正矣第士之所以自求於經者淺也盖不務實造於理而徒務取給於文文雖工術不正而行與業随之矣舉子業之關於世道也有如此清之始業是也承父師之教指自謂頗知所用心者故有三年不作課而無三日不㸔書間以其所窺見一二語諸同儕要亦未能脱時文氣味也然或已訝為迂逺而厭聴之矣清乃多筆之以備切磋久之積成巻帙庚子赴京已收置於行囊既而因冗翻自遺之逮至京檢覔不得意其失之途中矣時方温故輒復有錄更三閱嵗故錄乃復得之家中㕘會前後所錄詞意重復者過半又有前後異見至一句而三其説者皆無暇刪次也祿仕多年故紙宛然而比日後生輩求之頗切欲終棄置則一得之見或有資於童䝉欲俟刪正則温故之功又非旬時可辦姑畧會而次之先􅂗去其最冗穢無謂者其諸凡近似有理之言皆且存之以俟他日温故之餘得加汰削乃就有道而正焉名曰䝉引初稿明非定説也四書及易經諸巻皆有之今已謄出大學中庸二部及乾坤二卦張國信輩借抄因為之道其故以引其端云刋精選程文序今之舉業之文非古也而其理則猶古也惟其所求於理者有未瑩故其命於詞者不能發夫理而反以障夫理於是其文之去古也益逺矣夫舉業在今不可廢也欲變舉業而古之在今亦未易也孔子之論治道曰齊一變至於魯魯一變至於道夫孔子獨不欲齊之一變至於道哉勢有所不可躐也此雖非所宜援然其理有相彷彿者予釋褐時鄉子弟有從予請業是者予弗暇也乃為選取四書程文中之優等者數十篇畧加批㸃以指示之使其不至於純乎架屋疊床浮花浪蕋之習也其亦進於古之一階乎嗟乎古云古云文詞云乎哉而况於舉業之文云乎哉予之亡是有年矣乃今奉命視學江右見士子之業是而不得其方者多因檢出此以為之式諸生遂錄布諸梓予適見之為書此以道其故尚欲徧選諸經及論表䇿判等文之優者而批㸃之使各有所式而時文悉趨於正亦清今日分内一細事也古文苑後序右古文苑一編相傳以為唐人得之一佛寺經龕中盖皆昭明文選所不錄者然不錄於彼而悉集之於此則其取舍之間亦不能無辨也宋章升道為之考訂訓註遂以行世逮更世以來其傳在人間者㡬絶矣今侍御寳應張公世用得抄本焉按節吾閩暇日因出以示清且曰吾嘗以厯代文章氣韻求之及㕘以前輩二三君子之論是編雖未及純乎古固亦近乎古者而世之學者之不及見亦久矣吾今將以播之梓盍為我識一言邪清以膚淺固辭不得於戯斯文一脉至我朝盛矣自六籍四書而下諸子百氏及諸傳記凡人間昔所未有者往往以次而出至於文章之集若文選及文粹文鑑文類之屬所以供學者之玩者又不知其㡬然猶未得見古文苑也今張公復為梓行之使學者復得增許多見聞學者之生斯世何其幸哉故是編之傳愚以為益足以徴我朝文物之盛也然公於是編特以其近古而好之耳近古者猶好之而况於純乎其古者乎文辭之古者公猶且好之如此而况於古之所以為古者乎故是編之傳愚又竊以為公喜而其所以喜者則又在於刋書之外也江湖勝覧後序清漳楊氏文脩性警敏而慷慨不羈常遨逰江湖間厯覧江湖之勝以自適且所至輒訪名勝士而從之逰以求聞所未聞用是士林諸公多竒之有江湖勝覧之詩贈焉積而成帙因來泉介吾友呉君士際携之以詣予予不容無一言也姑掇諸公所未及者而為之告曰子好逰乎吾語子逰有在外之逰有在内之逰水行地中流為江瀦為湖蓬於是楫於是挹月露之清光盼水天之一色者在外之江湖也固勝覧也然人心自有源頭活水積之則為鑑湖之萬頃放之則為長江之浩流其中風景仰接天光俯羅萬象以遨以逰不事外求而樂在其中者此在内之江湖也尤勝覧也文脩於在外之江湖則覧之熟矣且諸公為文脩道之悉矣第未審於在内之江湖亦嘗有聞乎否亦嘗經逰乎否故予之説將使文脩自是反其在外之逰而為在内之逰内外交脩則天地間不可限量好人物任吾子為之矣豈止江湖一逰人而已哉孟子曰子歸而求之有餘師君子之告人固如此願吾子其思之幸毋謂予儒者類多迂談闊論也清玩冊序予適有行役過杭而疾新淦周君某時客杭念其為伯氏虚白先生門人也屢為謁醫視之疾頼以瘳乃邀予逰西湖予以病加於小愈辭君從之既而挈其所集古今名畫一冊題曰清玩者示予曰閱此殆亦不逰之逰而其中景物又有非西湖所能盡者予笑曰是名清玩固清之所宜玩也次第而閱之有升空之日漾波之月夏峯之雲冬嶺之雪而觀夫竹樹離披掀動之勢又可以知風之所在也則天之文於此而可玩者矣或連峯叠嶂如五老九疑或一碧萬頃如洞庭彭蠡又或峭壁幽巖平原曲澗清泉白石草亭釣磯在在成趣斯又地理之可玩者也其間庶物則草木花果以至羽毛鱗介之屬随地而見種種不乏茍能觀其妙則戾天之鳶躍淵之魚濓溪之窓草横渠之鳴驢概皆不外乎是至於人品則携琴者執巻者漁者樵者牧者行者坐者或在竹林或在松隂或在山隈水涯又或坦腹跌坐而神馳於雲物之表或張㠶鼓棹方泛泛乎濤浪之間而又或烏紗在首金帶在腰而清坐泉石瀟然若在事外者兹又不知其為何人也嗚呼予於是乎有感矣彼泛泛乎濤浪之間者其意趣所在固未可知而其馳神於雲物之表者殆能超世累以為髙者乎然或徒以此為髙而不屑意世務亦非中庸之道也若夫以軒冕之貴而得兼夫林泉之樂者兹毋乃昔嘗奔走王事而今也功成名遂而身退盖所謂先天下之憂而憂後天下之樂而樂者乎所謂金馬玉堂三學士清風明月兩閑人者乎兹豈非吾人之至願者哉然而必有其具焉非可以幸致也而亦有命焉不可以必得也命雖不可以必得而其具則固在我之所當脩者也凡集中人品皆惟人之所為而吾之所慕者在是則又愧於其具之不稱也披閱之餘感慨興焉因為之序以歸於君君有二子方讀書勵行有用世之志其閱是也將無同予所慕乎尚勉之哉宜毋同予之愧也凌雲葉氏族譜序葉之先本楚同姓春秋時沈諸梁其後也食采於葉號葉公子孫因以為氏今其字同而音異者猶韓移為何邾訛為朱之類也葉之得姓始此自是支流散漫四方不能悉究其巔末已吾泉南安凌雲葉氏其先唐時有諱諶者居雍州諶七世孫孜宋盛時徙光州孜子炎曽官至光祿大夫以渡江之變徙處州麗水之感徳鄉孜曽孫清為興化軍之莆田縣尉因徙仙逰之古瀬又十四世至學諭迅始徙南安之龍卧山未㡬徙凌雲迄今傳十有九世上泝諶為四十世凡千四百四十三人登仕版者百五十五人其出於凌雲者三十人中間顯者或史傳所載或郡誌所書或功業昭於國家或節行重於里閭既皆燦然炳然於譜傳中矣先是其譜之著於荆湖緫幹明矣僅托始於學諭公而不得其上世所自盖其去仙逰之日既逺一時未遑於旁詢或詢之而不得故也至是明之八世孫真保乃追而求之得其同姓仙逰公美所藏先世國學生雍及徽猷大監棠所著譜而印証之學諭公之諱字及生卒甲子彼此不㑹而同君以為水木本源的然在此無庸復疑即命其子邑庠生昭按其本而錄以足之分其帙為四類一序引之文舉大端也而先世之誥勑事􅃺詩記等附之文之屬也次宗支圖以著其世親親之序也又次仕宦總目親親之中有賢賢貴貴之義也終之以譜傳歸於親親也無間賢否貴賤一也既成以求予序夫家之有譜猶國之有史也是盖人之所以為人者也何以言之人生天地間有聚焉聚之大者為國小者為家雖與羣物同一生育於天地之間同一歸盡於大化之内然迹往而聲存事過而情係自有不至與羣物類者此國之所以有史家之所以有譜也國有史則可以昭監戒維世道家有譜則可以序昭穆厚人倫小大雖殊理則一也况夫家人之聚也世更一世有不能常其聚者以不能常其聚之故而思所以係屬之使不至於遂畔渙無統以相忘如路人者微譜則何以哉此固人之所以為異於羣物者也此先民於宗法既廢之後所以倡為譜牒之制於以扶植人道於不墜者夫人道之所立既有在於此今或蠢然而生荒然而死一身之外漫不復省念則夫所以上承乎其先中遇乎其屬而下啟乎其後者皆不言可知而又果何以為人而異於羣物也哉嗚呼薄於其親者一身之外若有餘篤於其親者心逰乎累世之上而不足如真保之所存所謂心逰乎累世之上而不足者非邪推是心以往所謂一孝立而萬善從之矣為葉氏之族人以及其子孫茍能體是心而勿替引之吾見葉氏之澤其將彌逺彌光而未可涯也新淦周氏重脩族譜序吾虚白先生既致陜西憲副事家居取故族譜重脩之首凡例次圖志次先塋表又次文翰巻數不一視故族譜詳且宻矣於是板而傳之凡族人無老少各畀一冊使藏之又寓一冊於其門下生清而使之綴一言於後嗟乎清之負先生甚矣先生猶不忍外而猥使有事於其門内之譜哉清念始為弟子員時先生適僉憲吾閩邂逅考試閔其愚昧而乏師授也指引之使學於雲室林先生之門又以其貧而助之薪米筆扎之類既又進之家塾使與其子共席硯而朝夕躬指授課督之猶其子也嗟乎世寧復有斯人哉抑先生􅆒厯中外二十餘年其他徳善播在人人者何限顧非今者所宜縷縷耳大抵先生心事真所謂民吾同胞物吾與也而况於所謂其初一人之身者乎君子善推其所為必自親者始此先生於族譜之脩所以愈加詳宻而不容已也先生此心使得進而廣之可以澤天下壯皇猷而限於其位年纔五十二而乞休用未究其藴此朝野之知先生者之所為深惜者也然以其餘力用之一家如是譜之脩以至祖塋之究祭田之復家傳之著宗法之舉可以尊祖焉可以睦族焉可以貽後焉可以敦俗焉固所謂是亦為政者也使先生之子孫及族人能引是心而不替則随其窮達崇卑仁孝之澤皆有不可勝用者矣清自得遇先生以來已三十矣犬馬齒四十又八矣僅能藉乎先生之賜以改其身外之物色而已外此則皆三十年前故物也仰惟先生徳業在世足以重周氏之譜而老門生樹立不類不能為寒族之重而徒以貽師門之愧故因先生之譜及之以告周之後人盖一勸而一戒也若周氏世徳之深厚支𣲖之繁衍與其遷徙始末見於前人所序及先生父子之所自述者悉矣皆不贅安平柯氏族譜序吾晉江八都安平里有柯氏清少時往往聞鄉人道柯富户名者盖自洪武永樂間柯氏以貲雄一縣有司舉富戸實京師至今其子孫世丁富戸役清圵逰時嘗主於其家且宿與其族之彦曰綱字朝舉者同習舉子業於縣庠朝舉今以年過五十棄舉子業不事清雖階此得祿仕然亦五十無聞矣朝舉兹以其族譜序為屬清愧無聞而義不克終辭也盖亦閱其譜故有鄉耆序之曰柯姓本吴仲雍八世孫柯廬之後逺孫述宋時居縣之水溝頭登劉輝榜進士厯官龍圖閣學士卒祀於學宫述之孫翰字國材紹興間徙安平此言若有徴者而繼之曰兵革後失其譜牒今不敢追遡其上惟斷自十郎始按譜所稱十郎者距朝舉僅五世其上已莫考則所謂柯廬之後及龍圖之居水溝頭者概莫之詳矣惟柯氏實安平大姓而柯西埭之田至今尚有屬柯氏則國材之為其逺祖理為近之然其世數亦已不可以夢卜而知矣大抵譜之設特以繫親而已若先代之顯晦世次之逺近門族之盛衰皆所不論也抑亦有不足論者顔子淵簞瓢陋巷而有輕萬乗之良貴存焉袁氏四世五公非不賢且貴也而紹與術終不得借以盖其不忠不孝之罪禹以聖徳神功為天子則郊祀鯀以配天矣親之所在豈可擇賢邪信矣夫譜之不必名人華胄之援也一有所援則罪不容誅矣清是以不敢襲前序之文也及閱朝舉所自撰次則渾無他意其世首十郎次致政其名字尚缺以不可强也又次曰長孫曰天乞輩乃有名字詳其所可知也傳至朝舉一行計存役凡若干人朝舉今且見孫矣其孫行上距十郎為七世夀妖不一又得若干人而皆未有顯者然要之亦皆不失為太平之良民也且其圖列明備昭穆秩繫親親之義具存已為得譜之本指矣况有祠堂圖有世系緫圖有大宗圖有先塋圖有先世畫像前後本傳各以類又有凡例數條冠其端家範二篇殿其末其所以衍先澤而垂後規者尤為切實懇至家範最後引唐栁玭戒子孫之言曰惟孝慈友弟忠信篤敬此乃食之醯醤不可以一日無者嗚呼盡之矣使柯氏子孫信能是雖無龍圖學士等名公為之逺祖不為缺典抑又安知如學士等名公者不自此而有作乎是朝舉之所譜初無過於今人而其所譜之意固自不後於古人也吾以是取之恩命褒崇詩後序恩命褒崇詩一冊吾福建憲僉呉興張公拜受其知荆門州時旌異誥命而藩臬諸公及士林諸先生為之志其喜者也間屬清綴一言於其後清惟我國家之所以勵臣工而勸忠孝者至厚且周矣京官七品以上三載考稱則錫誥勑封其身而又推恩封贈其父母及妻有差若外官則必至於九載秩滿考稱然後授以是恩焉盖重内也然使一拘此制則外官之治行超等者其将何以别之故於其超等者惟覈其實則三載之餘即以授之謂之旌異此則公今日之所得者也公由戊戌進士知寳應縣服闋改上髙已而陞荆門尋陞同知福州府進拜憲僉僉憲之日旌異誥命始至盖自入仕迄今二十餘年然後二親室家始得被恩易號公之喜可知己夫一身之貴名猶未足為甚喜惟二親及室家皆以吾善名故得被天語之褒命服之錫此於臣子之心何如哉清聞公自入仕㢘明謹慎視民如子視官事如家事而始終如一日當其為縣日巡撫大臣及觀風使者以其政績卓異請旌於朝者凡四次為州之日又得二次至於凡當道之以繒帛牲酒奨勸者不計焉積其後蹟效以有今日之恩命亦可謂之難哉况外官之得恩命難於京官而外官之以旌異得之尤難於尋常之僅以稱職故而得之者也夫惟其得之甚難故在已為可喜而在人之聲其喜以賀之也良宜向使公為州之日所操或少變於為縣或為郡之日少損於為州則功虧一簣而此事或參差矣由是言之公今日之得此其亦良可自慰哉矧今既位方岳之重而其治行方益隆望實方益大将來所得恩命又宜有進進於此者矣所恨者太宜人早世先大夫亦僅及見其登仕而不得一享今日之光在公之心殆不免於悲喜之交集耳然及親而仕而忠孝之得兼致其力者此人之願也亦人之幸也其不幸而岵屺之望已絶所謂雖欲孝誰為孝則惟畢力於忠即所以為篤於孝矣此固公今日之所以夙興夜寐者乎嗚呼忠孝之途逺矣哉載玩諸公之作其所以致望於公者亦皆未有涯也題寵褒錄後序右封贈誥勑凡十道今福建左㕘議泰和徐公積其向為南京兵部主事及署郎中時所得者也盖贈其二親者誥勑各二道封其身及妻并贈前妻者各三道公之積而錄之豈徒然哉豈徒以榮君恩而已哉盖迹雖類於榮君恩者而意則實在於不忘乎君恩而思益有以貽親之光也嗟夫臣子心事於是乎有可以自知而不能以語人者矣清公之同年友且同事於南都者有日自謂頗知公者然公固自有定價於當世而無俟於清之縷縷也故太子少保南京兵部尚書華亭張公道徳功業名一世於人物最少許可其所薦南都縉紳士凡三人而公居其一未知公者亦可以得公為人之概矣惜其當日薦揚之語今不能詳惟往嵗巡按御史陸公疏公治行於朝而請旌之其詞可記者云清慎立心而貪者懼公勤處事而廢者興斯實錄也然亦自其宦業一端而言耳若公學識之精明志氣之堅正宇量之宏愽則皆有未暇及者然則公他日事業之所至其可量哉故誥辭有之云尚加毖慎以俟登庸夫以公之實徳升聞至䝉天語之褒許有如此夫安得不念念不忘羮墻如見益有味於毖慎之㫖而為是錄以自随以自規而自䇿勵也哉信非徒以榮君恩而已也清以是又知公後日所得恩命之有進進於此者矣夀王太夫人序今秋當大比而興化守王君存敬當以夏考績之京師按節及藩臬諸公以君學行才猷之優也留使㕘紀綱於塲屋間俟訖事而行君以二親俱垂白在堂久擬便道以省而七月七日又太夫人初度之晨計日數程形留而心往矣固請如期行諸公重違其情也竟許之既戒日貳守朱君某輩以書抵清曰吾王君雖委質明時而常得伸所願於其親其始尹溧水也父確齋先生判和州相去僅數舍問安之使源源視在膝下不相逺逮確齋致仕君以刑部副郎援例歸省者嬴一年既有興化之命復得便道以拜家慶值確齋年登七十時與君相好者咸有述作以為夀日稱觴之侑今兹之行太夫人年六十有九俟既上績過家亦適七十矣吾輩亦願假子一言以侑太夫人夀日之觴不可乎嗚呼嘗讀詩至王事靡盬不遑將父又曰不遑將母而知人子一委質於國則不得兼伸所願於親者自古然也如王君之於其親屢得幸會如此豈其獨多得適然之便耶抑其孝心獨至自有潜孚黙祐之理耶是所謂人所深願而不可必得者信可賀也已然清謂君之善養其親者又自有在也君起家進士厯官中外凡四轉階所在皆盛有聲稱故一時士大夫語學識者必及王存敬語操行者亦必及存敬語才具之可大任者亦必及存敬焉是君之所以致養於其親者視他人固自加一等矣豈止夫二千石之祿養與夫間時乗便之一省侍而已哉是重可為髙堂夀也已抑又有當為君盡其説者清嘗謂天地爐炭也古今旦暮也人子心非木石其誰無椿萱同春不老之願耶而黙計理数之將然則知昔人所謂愛日者其味良苦盖有未深經咀嚼者而今之所謂具慶上夀云者有時而境變於外情變於内矣嗚呼其可奈何哉其可奈何哉吾竊羨夫自古賢哲之能立大功名於天下者至今其親得與之俱不死或不幸事功不大就而名節之克完者亦為有以不死其親而同歸於仁孝之域則是人子夀親之計於萬不可奈何之中又自有可以深長思者耳嗚呼言及此清益為慙負天地君親矣然此亦豈宜與不知者道哉自不知者觀之將謂吾以夀親行而彼以吾親之不諱日為計何左耶王君當不謂然而獨有味於吾言也送柯節推考滿序成化辛丑冬十二月吾泉節推潮陽柯公以九載秩滿先是吾泉士民計公秩且滿不得以久其惠也相率詣當道者乞轉以聞之於上而留之而格於法不克至是公且行矣士民咸依依不忍其去念無以致其意者乃相與謁諸縉紳先生或為序或為頌又或為詩為歌以道其行而鄉之致政諸公亦皆戀戀於其去也復命清小子序之嗟乎清於是有感矣何則世之吏於土者某見亦多矣方其始至之時大率人皆歡迎而謹事之無不敬且愛者然久之或左所望則退有後言其心惟欲其速去一旦去則路人視之甚者排而去之則路人之不如矣此豈惟在人之不厚要亦其有以取之耳由是而言則公之徳在人者不言可知况公之為政素非有厚於諸公而諸公亦非有利於公者而其所以戀戀於公之去何哉某以是益知徳之感人有不期然而然者矣故凡以智御物者物終不親以力制人者人終不服以利自厚者利終以賈禍大抵天下惟好人好做而愚也稽之古徴之今斷斷乎其未有不然者也故特因是發之以告夫世之吏於土者若夫公之盛徳之實與其世徳所自發身所由及上下屬望之意已見於諸先生所述者則皆不贅八桂聮芳詩序盈天地間皆氣也盈天地間人物皆氣之凝而成焉者也氣有精有粗粗者勿論矣其精者大概亦有兩端一鮮明一沉篤鮮明者文勝文勝者其美外揚在人如子張子華王褒劉栁之徒在物則為鳥之鶡雀獸之文豹花之牡丹芍藥木之嫩栁夭桃之類是也沉篤者質勝質勝而積之厚則美充於中暢於外韻於逺文在其中矣在人如囘之愚而足發參之魯而傳道黯之戇而社稷臣在物則為獸之麝如鳥之鶴如花之蘭􅊉木之桂與栢之屬是也然栢之屬雖與桂類而不能花桂則又能於風霜揺落之餘而發其英華清芬所被逺不可禦至有香聞十里之號是尤所謂充於中暢於外而韻於逺者矣乎自有科目以來每以文塲得雋為折桂枝香者予猶未得究其所以意者其有取諸此乎夫果取諸此於桂無憾也抑未盡取諸此歟桂之潜徳似亦欠發揮哉嗟夫郄林之一枝乃竟落莫於偽朝燕山之五枝始稍昌明於宋室故求桂之桂則深巖茂嶺時可一遇求人中之桂則士林文苑厥惟艱哉洪惟我朝列聖相承凡所取辦以整頓宇宙者率於學校焉養之而於科目乎收之於是廣西蒼梧李氏一門父子昆弟相繼登桂籍者至八人焉八人之中曰棨字某者今以賜進士出宰龍溪清始未知其為人近侍御某公少㕘某公巡厯自漳返吾泉咸為清道侯之美且曰使凡作縣者皆若人焉庶事其康哉黎民尚亦有利哉而吾友鄉進士龍溪陳朝佩亦亟稱之盖實大者聲宏理自然也兹非所謂充於中暢於外而韻於逺者乎然則是固亦人中之一桂矣其餘七人者清未及識也然一本連枝意其風味亦當不相逺矣適故上龍溪掌教曾某先生馳書介至泉屬予為作諸縉紳所詠八桂聮芳詩序且疏八人名字履厯之詳俾志之清以為此在諸公之賦咏述作已詳可無用贅為也獨桂之所以為桂其精實所在則有不容以不白者故畧發管見如此盖將使凡李氏聮芳之士咸取類比徳於終身而非僅以文塲之一捷為便足尚友於桂也嗚呼自有天地即有菊至晉陶淵明出而後菊之名始彰自有天地即有蓮至宋子周子出而後蓮之徳始顯物固以人重也且自古人才之出於一門者在唐虞有八元八愷在周有八士在漢有八龍既皆樹實徳於當世流餘芳於來代矣區區之意尚兾李氏八桂有以上接夫荀氏之八龍俾載籍自此添一故事而非徒寄聲價於一時士夫之唱咏而已耳惟李氏聮芳之士尚采其意而畧其辭之不華哉是為序龍江吳氏族譜序譜牒亦近世人間一故紙耳而天地生物之心與人之所以異於物者皆在焉何者天地以生物為心而所生之物因各得夫天地生物之心以為心其在人則為仁固人之所以為人而貴於物者也然仁主於愛愛莫大於親親祖宗親之至尊者也族屬親之至近者也夫上戴天下履地中含心而為人而於其親之至尊至近血脉精神實相貫通者乃或迷於時局於勢而不得以展其情焉天地精英之在斯人者其能終無介然者乎是以雖當王政既熄宗法久廢之後而譜牒之制創出於近代仁賢胸中之天理不能自已者遂為來世永永不刋之成憲嗚呼兹豈獨人為之巧所及哉人心之所以不死者天也故凡知祖前賢以譜其族者要皆仁人孝子之徒而或尚不知為此者則未免於其天者猶為有蔽也吾泉南安之吳氏自其始祖三十五府君肇基於黄龍江南厯今八世環江之南北連簷接棟皆吳氏其子孫盖二百人矣且夫此二百人者其初一人之身也夫自一人之身分而至於為二百人枝幹益繁而去本根日益逺則譜其可以緩且畧乎哉緩且畧焉將或至於忘其身之所自出而視其同宗為路人者矣譜其可以緩且畧乎哉先是其五世有曰繼祖者肇為之譜至六世信宜教諭爵者繼修之然缺畧尚多至是爵之從弟睿乃命其二子鳯鵾旁搜逺訪於凡其有可考者悉采而錄之以足夫前人之欠至於其終莫可考者則仍舊缺之盖其缺者所以傳疑而其所及詳以足夫前人之欠者大抵皆實錄也嗚呼天地生物之心與人之所以異於物者寧不於吳氏有徴也哉余故本其出於人心之不容已與其不可已者告之庶吳氏之後人及凡得觀吾文者其於親親之情亦皆有所不能自已者焉耳送陳大和先生撤館歸莆序人非學不得其所以為人學非師不得其所以為學師也者導之學而造其所以為人者也自有生人以來不容一日無焉者也第今之學者其所請業於師者不能一一與古人同雖然今所業者本經四書及諸子史古聖神及諸賢哲之精藴在焉天地人之道悉備雖使古人復生亦不能舍此以為學彼識之不逮者其窮年矻矻固不免僅資之以為應舉之用文具之需中間有識之士固將於今世法度之内探遡古人用意所在而取其精藴以自淑而亦以淑夫人初亦不害於科舉也莆中陳大和先生有聲莆庠舊矣今年春南安庠生黄天保輩禮致於九日山而設帳焉予以多病故少所接遇尚未及一挹其丰采然聞之士友皆言其學素博以詩經名家而識精行脩凡與諸生講議文字間往往必求古人精意所在不至淺淺然徒渉其流而已用是諸生咸有所啟發勸勉勃勃乎其有生意焉兹將撤館以歸黄生輩徳之介吾徒傅浚請言為贈予故為道今時之學猶可以不戾於古人而大和之教有得於古人之意者如此嗚呼古學之不講久矣盖學之名是而學之實則非也使為師者皆知所以教為弟子者皆知所以學則何患今日之無聖賢世之不唐虞三代也哉甚可慨也送邱教諭任滿啟行序丈夫生不為將相其為守令乎不為守令為師儒可矣古之聞人其為將相者發謀出慮動為天下囬生起廢或折衝千萬里之外不負男兒七尺身也是故君子欲之然位甚髙責甚重才亦甚難於負荷守令雖位望少卑據其職守得以子其所部之民民亦從而父母之如龔黄卓魯政使位不至公卿財不供旦夕然死有餘榮矣守令視古邦君其位亦未易至也茍學問充備操履端方得後生俊秀而以其所得者分之如胡安定諸老先生其所養育造就可以供國家累世棟梁榱桷之用此其視為將相者抑亦何歉乎哉今之欲為守令者既不可必致至於師儒之職又往往有不願為而出於强抑者嗟乎師儒古君子之所樂為也今使持其不願為之心以為之則其所以為教者概可知而當路之人固强抑之亦獨何哉豈以教之所繫者末乎且其所以不願為者或者以有司多不之重而與之相響應耶則亦勢使之然耳此又有可論者也海陽邱某先生成化丁酉舉廣東鄉闈戊戌試春官居乙榜授吾泉之惠安掌教方是時先生春秋尚富使復少待後舉未為滯也而先生一舉即就盖其所樂為也故其至之日教條一新士類嚮服又得浮梁張侯徳威為之尹動輒響應政教相為流通以是學校精神視昔加數倍丙午鄉闈一薦得三人焉惠安前此所未有也謂出於偶然可乎由是言之先生之教惠安亦既有成績矣兹先生秩滿將奏績之京惠安人士咸不能釋然於其去張侯因合諸人士之意使來桐城屬清言為之别清故首為舉師儒之可為者論之於以見師儒之職本無負於士夫惟士夫當求所以無負於師儒如邱先生者乃庶乎其可然則先生自此升矣仙逰張氏族譜序甚哉譜系之有闗於人倫不細也今夫一人之身分而至於為途人而喜不慶憂不弔甚而相凌相奪之恬不相恤者亦無怪其然矣源逺𣲖别世復一世懵不知其有骨肉之連而親愛之心無自生耳又安得人人皆長者能溥其同胞一視之仁也哉予客京師無日不與人接也忽其間有云某鄉人也則欣然迎揖而與之語矣又或云某即某之某於子有㜕則又加敬愛而禮際行焉或緩急為之奔走不辭矣向使初不知其為誰則亦泛然遇之而已耳夫人情不甚相逺也况同宗之親天性之愛誰則無之世固亦有視其至親如途人者是又非可以人道之常論也故曰譜系有闗於人倫不細為能使人各知其所親故也而譜系之修不修則又存乎其人焉吾閩仙逰之張氏其先廣之惠州人宋紹興間有曰升者為仙逰縣丞卒於官子孫不能歸因𦵏之楓溪嶺而家於蜈虹山前又傳六世號謹齋者亡其名遷澄滄又三世曰記者與其兄某弟某凡三人改卜象峯下至於今三支之子孫若干咸不改舊觀記之孫定有文學而重行謂先澤寢逺子孫分徙不一且前乎此者以無譜故欲詳考既不可得失今不為後之視今將復有如今之視昔者乃逺考旁詢於凡可知者生卒娶𦵏之類悉就脩纂各以行第相從其有逺而不可知者則以傳疑之義而缺焉間以貢來京師㑹予於旅邸因求序之嗚呼據定之所脩者如是後之子孫其將慿是得以老其老㓜其㓜昭爾昭穆爾穆而不至相視為途人矣若定者其可謂能世其先者乎嗚呼凡為張之後人者其尚思所以世定之為乎抑子孫之所以世其先者又不止修譜一事張氏世居文獻之邦當有所從受矣兹不喋喋聊舉其端云送莊先生尹信豐序清受業師曰遯庵莊先生有宋少師藻齋公為之逺祖有國朝廣西僉事松崖公為之父有徳慶州判官世範公為之兄又諸父有為兵科給事中者有為雷州知府者可謂閥閱之門矣而家則素貧用則素約盖不獨未仕時為然前此既尹於陸川六年矣而貧約如故也則吾先生之所以為人者可知兹以考績至京改任信豐信豐江西小邑也而吾先生大才也以大才任小邑當道者獨無所用其鑑衡乎盖先生始以例授逺方任得廣西之陸川今九年之秩未滿也故改任例僅得此當道者不欲以伸一人故而改令固勢然也夫才與命不能相謀自古豪傑負有為之志而展轉下僚不得大伸其志者何限吾先生於是乎可以命自遣矣且命在天者也而又有在我者存吾先生愽學髙志少年聲光馳八閩閱世益深抱負益壯所養益不凡其所施為不以官之崇卑地之廣狹限者又豈區區門下小子所容喙哉出崇文門而南望天髙日朗萬里極目無障於是而拜送吾先生之别先生之意氣何如哉老當益壯窮當益堅漢伏波之言吾先生之素志也虚齋集巻三
