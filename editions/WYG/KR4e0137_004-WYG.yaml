body:
  text: 虚齋集巻四明蔡清撰字說靜之字說周王儀賓開封黄侯澄朝京師將歸其舅河南解元李君宗一吾友也以其未字屬為字而說之曰將借子之言以寄予意也宗一之意我知之矣殆不止區區一别間也蓋侯本開封儒生以才俊學行選授兹寵自常情計之侯自是皆貴艶光景儒生故味勢恐不能不浸薄矣故宗一之為此意者使侯定其心源而不汨於時波雖貴為皇家懿親而常敦孔氏家法也宗一之意其在是哉是其意真得親愛之道哉吾聞之水以澄而清夫水本清也初何濁之可澄惟動而撓之或自流動而所之者非其地於是乎有濁耳然使濁者復得片時之靜則濁滓自沈而還歸於清矣用是而觀澄之之方其無出於靜之者乎故字之曰靜之嗚呼靜之時義大矣哉貫三才皆主於靜也水特附於地者之一物耳在人則方寸之間亦有源頭活水焉茍失於主靜則勢利之來自外者既得以動而撓之而情慾之發於中者又自動而失其所之於是乎源頭濁矣源頭既濁尚何有清流之可味也哉我思古人居天下之廣居立天下之正位行天下之大道富貴不能淫貧賤不能移威武不能屈事物變故雖千態萬狀交至遝來於吾前而吾之本真瑩然者處之常有餘地應之常有餘味殊若不見其孰為可喜孰為可悲孰為可厭孰為可慕者無他靜而已矣此則所謂孔氏家法而侯所當益讀書親友以求焉者也或曰動靜相生若子之說將遂無動矣乎曰非也以靜而動動而主於靜焉夫主於靜而動則動而無動矣是說也吾得諸易然吾愧吾言多矣何日從容尚與吾宗一共說盡其所以然宗序宗一字說清一日謁吾約軒洪先生先生曰吾方念一見子若有姪曰倫曰朔者俱冠而未字子其為我裁之承命沈思久之未能得先生曰倫可字宗序朔可字宗一乎於是清及同侍者咸應聲贊善二字遂以定先生曰然則子其以吾命字之意載之文吾將寓歸俾二子朝夕省焉亦庶幾成人之一助也清素膚淺且屬有行事匆匆固謝而不得命乃退而以先生所謂命字之意求之大抵盈天地間皆物也人亦物也夫人亦物也而乃獨有以貴於凡物而充其量則至於與天地參而凡萬物又皆在其度内者獨何也嗚呼豈非以其有倫也與哉夫倫也者序也序惡在舉其大父子以親序君臣以義序夫婦以别序長幼以禮序朋友以信序此則人之所以為人者也故人必得其所謂序者而後可稱為人不然鹿豕共聚馬牛而衿裾耳人也哉倫乎倫乎其可不知所宗乎先生之所以字倫為宗序意者其出於此耶政使其不出於此然而成人之道毋亦不外乎此耶若夫朔也者一月之最初一日也故取義於一嗚呼一之時義大矣哉天向一中分造化天此一也人従心上起經綸人心亦此一也天下之達道五所以行之者一也一所以成已也凡為天下國家有九經所以行之者一也一又所以成物也自古聖賢論學其要不出乎敬之一字而究其所以為敬者無他亦惟主一而已耳書曰德惟一動罔不吉德二三動罔不凶而人鬼之闗於是乎判矣朔乎朔乎其又可不知所宗乎先生之所以字朔為宗一愚又意其出於此也政使其不出於此然而成人之道毋亦不外乎此耶間以質之先生先生曰得之矣盍為我書之嗟夫天下之道知之非艱行之惟艱言之非難行之惟難如何而為序如何而為一如何而為人如何而為非人清也窓下十載亦既知之矣亦既能言之矣然反而考之吾一身之間則其所謂序所謂一者竟何如矣噫尚何以信於二子哉其不為負吾先生哉昔人謂誠自不妄語人而不妄語三字力行之直至七年而始成顧清也力行之功能幾而乃時時剽取古人之道德仁義云者於紙筆間玩弄之謂非妄語吾誰欺故兹雖以先生之命不敢終辭而實筆下之言皆胷中之愧也故既書其大意而復綴此以識吾愧且因以警夫二子者庶幾顧名思義敏行踐言而無或蹈不肖清之愧則於成人之道自不待清贅矣林潮字履信說潮天地間之最信者也余襄公以為月臨夘酉則水張乎東西月臨子午則潮平乎南北蓋月與水皆隂也從其類也故今濱海三尺童子亦能指日刻期而得潮汐之候者以其最信也嗟夫潮天地間之最信者也信人道中之最要者也子曰人而無信不知其可也大車無輗小車無軏其何以行之哉夫人而無信則無往而可行如其信則將無往而不可行矣然則信之於人道其亦所謂一言而可以終身行之者乎而成人之道槩在此矣且人道不外乎四端四端之信猶五行之土仁不得信則仁非其仁義不得信則義非其義禮智皆然愚故曰信之於人道其亦所謂一言而可以終身行之者也故友鄉進士林順吉之従弟曰潮既冠字之者曰履信履信二字出易大傳於此取之者以潮之信而期林生之履其信也昔唐福建觀察使王潮亦字信夫蓋一理所在古今舉莫之能易也抑予於此又有所附說云始順吉既孤其家用之需京師往來之費皆出生父孟愷甫隨取而給有人情所難能者亦可謂信於義之士矣聞林生質美且知學誠使能近取善於其父而逺取善於古人推而充之則於成人理似可期者其友黄時達郭文博為請其字說於予予多病與筆硯疎乆矣勉為草草詹寶字世重說世之所重者寶也而其所謂寶者大抵皆指金玉之類言嗟乎金玉信寳矣予亦惡得以金玉為非寶也哉顧天下之寶有重於金玉萬萬者世或未之知耳我思古人莫貧於顔淵莫困於齊夷陋巷四壁之中首陽荒山之下簞瓢薇蕨之外無餘物金玉安在哉然計其所得則有塵視金玉薄一切勢利而不屑者矣故去之千嵗之下一聞夷齊子淵之名者雖庸人孺子亦知聳慕興起焉至於王公鉅人家累萬金而日食萬錢者蓋不知其幾千萬計自非其勲德才猷有足與其名位相當者則皆與春花朝露同一泯滅澌盡而無聞矣其有聞者又或穢名在世人所指罵而唾詈焉者也用是論之世人所重者果安在哉果安在哉安溪詹生寶信厚而知所向者昔嘗從清遊近以事至三山謁見吾雲室林先生先生因錫之字曰世重而命清為繹其意先生之意清竊有以知其在此而不在彼矣敬如命為生發之惟生思之思而得之則雖貧如顔淵困如夷齊亦且樂為之矣而况未必皆貧且困乎士器字說清溪謝生𢎞興國貳守公之子也性敏而能用其敏於學公以是愛之予亦以是器之門請予為之字及其說焉予謂士以器識為先而曽子曰士不可以不𢎞毅是則士之器貴乎𢎞而𢎞乃士器也宜以士器字然而士之器豈易言哉夫士之器非尋常器也其本然之量斂之則不盈一掬放之則包乎六合自外而實之則累千萬不見其有餘自内而出之則累千萬不見其不足大哉器也顧人或自小之耳是故有斗筲之器有瑚璉之器而又有不器之器生也將安居乎且九合諸侯一匡天下管氏以蓋世之功名固已自許於伊周之右而俯視乎百世之下矣而其器乃為夫子所小何哉是必有說矣生敏者也其思之思而得之則不待予說之竟而所以自居其器者自不容以不大矣嗟夫士君子以藐然之軀而欲磊磊落落於天地間不把第一等事讓與他人做者直以有是器耳而乃自小其器則其所就能幾許哉予常以是自勵以生可與言也兹欲為生言之生也尚其朂哉珍重哉女器也王生泰字士亨說世治曰泰亂曰否易以乾下坤上之卦為泰者天位乎上者也而下交於地地位乎下者也而上交於天天地交二氣通而世道隨之所以為泰也泰則内君子外小人小人道消而君子道長士之亨固然矣否則反是故文王繫泰之彖曰小往大來吉亨正主士君子言也某部某官某君之子泰冠賔字之曰士亨而某君請予為之說予故為本諸易以復之如此蓋古人之成說實不易之定論也抑予又有所附說焉孔子曰不患無位患所以立故士不患其不亨患無可亨之具耳使其無可亨之具則雖值世之泰可以亨而何以為亨也故曰邦有道貧且賤焉恥也苟其有可亨之具矣設不幸而時與我違其具固在我也則身雖否而道亨矣夫泰亦亨否亦亨泰則物我俱亨否則我亦不自失其為亨所謂由來豪傑士世世皆時雍者也信可以為士矣亦可以為成人矣惟士亨圖之哉鳳崘字瑞周說百鳥並生育于兩間也而惟鳯為世之瑞百王並宰制乎六合也而惟周為得是瑞周以前僅一見於軒轅氏之和鳴再見於有虞氏之來儀周以下則絶無聞矣漢宣帝所得者鶡雀耳由此觀之鳳之為瑞至周而止可不謂之重哉周詩有云鳳凰鳴矣于彼髙岡此之謂也安溪髙氏實其邑之名族某字甫之子曰鳳崘崘亦岡類也而賓者字之曰瑞周其従兄鳯峑儀叔為請其說於予予因為解鳳崘之所以字瑞周者如此雖然鳯之瑞以其聲容人之瑞以其才行才行果不羣於衆人則庶幾所謂鳳凰之於飛鳥者實與聲符也如徒名曰鳳字曰瑞而考其實乃僅與碌碌庸庸者伍而已則鳳兮鳳兮何德之衰又何有於瑞哉顧名思義此在瑞周正不可忽李愉字順夫說司吾泉安溪之教事博羅李先生之子愉字順夫者今年以易學句讀來證於予其將歸也求予為繹其字之義以為終身規予不得辭大抵人子之順乎其親者必有和氣有和氣者必有愉色生名愉而字順夫命字者之意吾以是㑹之當不逺矣然而順云順云色愉云乎哉謂色愉非順者非也謂順止於色愉者亦非也噫凡為人子者言及此不覺慚負天地尚能强顔為生譊譊耶雖然生且歸矣不得不為生一言然亦不暇詳也惟昔者夫子之告曽子曰身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也只此二語順親之道無餘藴矣而順夫之義亦無餘說矣順夫歸其以予言質之尊甫先生以為何如惠夫字說惠夫東廣博羅李生􅤷字也生之尊甫某先生為吾泉安溪司訓而其兄順夫於予亦嘗有相切磨之義其冠而字也其友某輩因請予為之說焉按韻書􅤷愛也撫也夫愛而撫之非惠而何此􅤷之所以字惠夫也嗟夫天下之道仁而已仁之用愛而已愛之行惠而已君子學道則愛人惠則足以使人故自親親而仁民自仁民而愛物者一皆此惠之流行而貫通也惠云惠云片善云乎哉充惠之一字亦可以為成人矣雖然惠者仁之用也天下未有體不立而用獨行者故昔者朱子解仁之義云仁者心之德愛之理心之德以體言愛之理以用言必先言心之德而後言愛之理者體立而後用有以行也則惠夫於此其又可不知所先務乎哉此雖亦昔人之成論然理之所在萬古不易理既如此予之筆亦不能不惟理之命矣惟惠夫勉旃是為說宋子紹字說宋子紹名傳字之者其外舅吾泉掌教馬某先生也子紹始成童従馬先生來泉予數接之於先生所愛其惇信恭謹視瞻顒然知其必名家子也詢諸其友又知其能隆於師友而志學不怠心竊器之洎至京師其尊甫今刑部主事景暘君時適與予同事南省一見莫逆遂定交焉又四年予復自京師歸則子紹已魁然成人且抱子矣嗚呼人生真能幾何彼之少者日以壯則吾之壯者日以老又將何疑詩曰及時當勉勵嵗月不待人予於子紹有感矣子紹之友栁廷信林思正皆予舊知為請解其字之義夫開道名義以奬進後生者亦父執事也予聞子紹世家浙之開化開化宋氏最為名族其先有曰某者為兵部侍郎曰某者為刑科給事中又前後之為郡守者二人為縣令者三人典教郡縣者五六人方今領薦書及游膠序者又八人而主事君又方顯用于時駸駸髙位是其簪纓世美科第聯芳一門之盛環浙江東西蓋亦鮮有其儷者而為之後人者正宜思以繼紹傳述於不替也語云莫為之前雖美弗彰莫為之後雖盛弗傳馬先生所以命字之意與主事君所以命名之初意或者其皆在此矣此亦所謂三字符者也子紹其念之哉雖然予又有說焉昔在東京袁楊二族皆累世公卿論門地者蓋莫得而軒輊然袁氏清德不及後竟以奢僭墜惟楊氏能守其家風四世如一日為海内所宗仰逺非袁比夫論衣冠之盛則袁楊並稱兼論世德之懿則獨歸楊氏此可以見宇宙間所貴又自有出乎軒冕閥閱之外者誠不以富亦祇以異不其然哉推此義也夫茍能種學勵行無忝爾所生則雖終身不沾一命亦足為克紹前休而况子紹又方著鞭雲路期以益昌其家世者哉予不及識宋氏之先及其他父兄子姪所知者主事君為人守文執義垂老而彌堅其言行氣象酷與吾馬先生類而子紹之德性可愛又如此能致隆師友以進所業又如此然則子紹子紹子宜知所紹也已矣傅浚字汝源說南安傅生名浚字汝源蓋取諸恒言所謂浚其源者乎此其尊甫地官員外郎時舉公所自裁者也生之冠也公屬予為閱文公冠禮行之予因用其字以命之漳郡黄伯馨吾郡田景瞻郭文博輩咸在㑹既而請予為發其字之義惟生之才質可愛可期人多能道之者然予之所期於生者又不止學問文章一技耳學問文章亦流也亦源也夫源在汝汝而源之斯汝源矣不然源非汝源且并其流而失之矣孟子云源泉混混不舍晝夜盈科而後進放乎四海有本者如是此之為汝源朱子云半畝方塘一鑑開天光雲影共徘徊問渠那得清如許惟有源頭活水來亦所謂汝源也顧二夫子之言皆引而不發予也何人又安能為喋喋聊為生一舉舊聞誦之耳况生素志非止涉其流者乃父所以命名擬字之意噫當毋負矣雜説解友人漢太傅卓茂初為密令上下皆嗤其不能河南郡至為置守令茂不為嫌治事自若數年治行大著尋遷京部丞及王莽居攝以病免歸光武即位首訪求茂詔曰夫名冠天下當受天下重賞遂以為太傅愚謂良賈深藏若虛發遲者聲宏一茂之身始而上下皆嗤其不能者此人也終而名冠天下以明天子為知己者亦此人也則吾徒亦勉其在我者而已又何必計區區者於旦夕間哉警念天下未有無根之木未有無源之水未有無祖宗父母之人人身不能頃刻而離乎祖宗父母人心不可頃刻而忘乎祖宗父母心而忘乎祖宗父母是木之斷其根水之絶其源者也縦不旦夕死滅亦禽獸中之頑賊者矣天下未有忘祖宗父母而能趨生路者也未有不忘祖宗父母而肯置其身不善者也自箴昔之君子能使人之未見也有翹然願見之心其既見也有戀然願留之心至其不可留而去也則有憮然恨失之心是果何修而得此哉大抵才既充行又髙而一將之以至誠而已矣嗚呼李膺黄憲明道温公一時人望萬載髙風床頂銘寡慾之人德業日新氣正而神全故也多慾之子嬰疾必死神荒而内槁故也施勉仁贈畫梅友人古杭施恕勉仁所贈其詞云此花風操先生以之更願先生大行所學如此花之實為用於鼎鼐也自愧凡品不足當勉仁之贈然良友勉進之意其何可忘爰筆其意張之坐隅題畫龍天地間陽物皆健龍其純陽至健者乎純陽至健則輕清之極矣惟輕清之極則神盛而有以舉其形故能伸縮變化於天淵之間而莫之或測也然吾意其未也神亦當微神微則形重而不能舉矣故今山谷中往往有死龍骨本草亦具載之蓋終是數内物也近見學士才人題龍者多贊其靈而不及發其所以靈其有畫龍一軸索予題因及此嗟夫龍雖靈不靈於人心人心之靈也可以雨八荒而澤萬世不窮也此人所以為萬物之靈而龍猶不免囿於禽獸之類也夫題林謹夫吳江雪舟巻父未有不慈者知教者難知所以教者尤難子未有不欲孝者知立身以顯親者難知所以立身顯親者尤難近者從鄭君仲平遊仲平每為清提撕此意適觀石湖先生示子之詩與其子謹夫之自叙而益信其然因書以識其大意題王時用思親巻仁人孝子白頭終養且猶終身慕而不能置時用少小失怙恃今有妻子之奉田廬園林之樂矣而無所致其孝誠焉如之何而不思如之何而不思嗟夫往者不可作矣思之且奈何昔人云將為善思貽父母令名必果將為不善思貽父母羞辱必不果斯又庶乎所謂事死如事生者使九原有知又何啻坐享一日三牲之養也題雙輓巻後侍御張君廷用裒其二親出𦵏時所得諸名士夫哀輓之詩為一帙而屬清一言于其後惟人子之於親也生則欲致其養焉沒則欲致其思焉既久而又欲有以傳其名行於來者庶幾其不朽焉嗟乎人子愛親之心夫豈有窮己哉清聞侍御君律己嚴待人恕牧民有惠愛而侍憲有風采循是而進其所以思貽父母令名者又綽綽乎有餘地矣因書此以贊之蓋其所致力固有在於文字之外者也為史少參題朝貴送行手巻清自退休家林所接縉紳士夫能以道心相照映且實能以所學推之有政者得今少參史公文鑑一人因記前十年㑹今都憲儲公靜夫憲副王公懋學於京師二公天下士也皆嘗為清道史之賢時清己心傾向而以宦迹西東未及有請乃今得償所願其慰藉何如也傾蓋之餘因得覩其初出參四川日諸朝紳所贈詩一巻并外巻文數首又知世之名德知公者固多也嗟夫天下惟知己為最難遇惟受人之知為最難任謝安早為王茂𢎞所器許他日淝水之役宗社實賴焉富彦國為范希文識拔於釋褐之初卒能與戮力輔成慶厯之治丈夫之不負知己有如此清觀諸公之所以期許於公者皆不凡事業也諸公豈虛施哉計公之所以期報於諸公者又豈當居古人下哉如清不肖平日負知己良多今則杜門待盡之人矣復何言哉責人則明尚於斯巻有感也題方正思萱册葉嗚呼慈母之恩無窮而慈母之年有限孝子之養有限而孝子之思無窮然藉此無窮之思可以為不朽之計焉可以為不死其親之地焉嗚呼斯其無窮之理又未可以有限之言盡也惟吾方正悉之矣不肖清亦嘗辱方正為引其端矣又何言哉顧不肖清亦喪母之人也中所慚愧可勝言哉惟方正尚有以教之題松滋王世子靜庵巻三才一太極也太極一動靜也而動又主於靜者也自天子至於庶人未有不主靜而能善其動者也嗚呼靜之時義大矣哉松滋世子以此名庵庵之取義大矣哉然主靜必由寡欲而入此皆清所得於先賢緒論而衆之所以襲聞者也然卒無以易於此也載觀諸彦所述大㫖要亦不出乎此題烏情巻烏之為物以色不如鷴以音不如百舌得人之喜不如鵲得人之竒愛不如鸚鵡而其所以得重名於人間至使白樂天旌表之以為鳥中之曽參者無他以其返哺哀慕之情有不羣於凡鳥者耳予友邑博范某自喪其大父某齋公三十餘年而其哀哀追慕之心恨不能少延以致其禄養之願者此其視慈烏亦可謂之異類而同情也已推是心亦可不愧於為人師也已故吾廷玉先生為題烏情二字而鄉士夫又多為詠歌之蓋欲以永其所思而充大之非許其所己能而已也題林世祥教授及古十詠巻後嗚呼自公卿至于庶職其地可以恩德人者何限然卒能使人恩之德之至於生而祠之者甚鮮矣而吾世祥先生有焉又以其所為得罪於人心之天至不見容於時人者亦有之矣而吾世祥先生乃致有及古十詠之評焉且聞之者不為疑與之者不為過先生何以得此於人哉嗚呼先生縦復終老寒氊亦不為不達矣由是言之世固有都髙爵厚禄而反為窮者顧人未之察耶跋月湖集月湖先生詩文純正而精切其於雅道譬如齊人之必為齊語君子雖醉寐訛言不作市井聲氣也尤善鑑别物情含𢎞委曲以規人於正蓋誠之不可掩如此此豈可以尋常文章家例待哉清此行後期不論矣惟得此而時展玩之如先生日提其耳而教戒之也抑先生之所以與進清又有在於文字之外者思之惴惴若不自容耳讀愛蓮說菊曰隠逸所謂隠者為髙也牡丹曰富貴所謂仕者為通也蓮曰君子則所謂君子哉蘧伯玉邦有道則仕邦無道則可巻而懷之者也後賢註此皆未有得周子命辭之意者故特發之格言有跋慎言語以養其德節飲食以養其體不以脾胃熟生物煖冷物欲心一萌當思義理以勝之斯可矣夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可以見外誘之不足惡而於道思過半矣惟省思慮屏嗜慾時起居調飲食使不至過甚則可矣能於病中移其心如對君父畏之謹之靜久自愈病後服藥不若預防自身有病自心知身病還將心自醫心境靜時身亦靜心生還是病生時此清舊堂尊南京大司馬華亭張先生惠扇所題右格言以藥清之病者也嗚呼先生盛德君子也其愛人之無已有如此清於是寶藏其扇而別録出此詞置之室中常所坐卧之處而不敢以揭於外人耳目所及之地者誠懼懲艾不力不能副先生之教而飾文具為益重不肖之罪也跋月孤子㑹通四教論老氏一端也佛氏一端也如月孤子所従又一端也且抑儒為四而㑹通之是又一端也夫道一而已矣羲黄堯舜所樹正派所謂繼天者也天亦一而已矣試近取譬之萬古此天地萬古此生靈使天下生靈盡衣服盡禮樂父子則真父子夫婦則正夫婦如今日諸倫理之類者萬古不能易也如使天下生靈盡削髪而秃顛盡槁形而灰心盡滅夫婦盡贋父子盡裸體而親土以𦵏可能一日安乎雖百秦皇吾知其不能遏天下之不心非矣其有自外而安之者所謂末如之何耳夫理義人心所同然至於人心之所不安者天之所不與也而猶以為吾將以事天何哉然則亦安在其為與儒㑹也若要其立體之清虛處則容有與儒類者此非月孤子亦識不到此但曰貫體用合内外則不敢知耳月孤子最名好道持此論請評訂者再閱年矣未有以復之而其請益勤令人起敬心焉屬有行草草大畧月孤子試更思之以為如何尚有以見復可也題一路到白頭畫有張芳洲先生跋右跋出吳興張寧蓋芳洲先生也所謂僉憲宋公則不知誰何此為杭士翁謙所得以惠予嗟夫何哉世所謂一路到白頭者昔衛武公年至九十猶懷抑戒不愧屋漏顔魯公自入仕忠義震天下屢斥屢廢卒以八十之年為國死難如此輩人真可謂之一路到白頭者也若夫為漢帝師患夫詭言誤其國以保其身之寵禄將相累朝名義不顧自號長樂老而世亦榮之者止可謂之富貴到白頭耳遽謂之一生暗昧到白頭亦可其於千載尤不明因私識之且以諭吾後人探符之妄更始時赤眉樊崇等擁衆百萬病無稱號恐不能久乃求漢家子孫在軍中者得三人曰茂曰盆子一曰孝為三札置笥中令以年次探符盆子最後得之衆遂稱臣環拜立以為帝盆子時年十五敝衣赭汗見衆拜恐畏欲啼茂其兄也謂曰善藏符盆子即齧拆棄之猶朝夕拜其故牧主劉俠卿時欲出従牧兒戲俠卿怒止之崇等亦不復候視也愚謂崇等欲建大功而議所立不先盡人謀别賢否而一聴諸神謂探符為至公如此者萬無不敗之理今人用探札定嫌疑者尚多此其監矣噫光武按赤伏符以王梁為大司空又欲以䜟文用孫咸行大司馬亦曰殆哉草書愚謂草書正起於真書之欲急而已故法欲近真而可認辨近世工草者多恣筆勢以為竒或襲前人之繆而不知反詭恠百出至今日弊極矣愚雖有意反正而筆力不及也奈何隠帖士必有巻舒風雲之志包括宇宙之學黙㑹神聖之識然後造化為徒百事可做處俗而不累於俗脫俗而不絶俗矣答友人近時東垣十書出識者以為醫家之王道有志當世者宜識此意題三教一圖三人者一曰孔子一曰老子一曰釋迦其邂逅徜徉事之有無無庸論矣然觀其畫意亦似有二三其趨而不盡同者豈畫之有意乎開元僧某持此圖請題為舉吾書中所有者應之云孔子曰三人行必有我師焉擇其善者而従之孟子曰自生民以來未有孔子也示兒同里某人有五男其四皆於夏月急症死術者多言其宅地不善勸徙之後有識者曰此地法不敗何以有四子之厄也蓋君屋太矮而門前有池清澈又有喬木十數章當暑月君之子必常浴於池而風于樹之下故其死先後同症也其父哭曰是已是已乃填其池以杜其害云噫快心事過必為殃豈惟池樹之能殺人哉孝子以類推之可也因筆之以示兒曹答不筭命論命我也信一半我命也自知一半更有一半不可知在人為人事舛兮天機微人力至兮天意囘我非强不信命兮信所當信疑所當疑題白巖巻後自有天地即有太行自有太行即有白巖白巖之名晦於始而顯於今者以吾希大也然則能使白巖之名終古常新而不泯者又不在希大邪吾嘗思之天地一洪爐萬形俱有弊惟山岳巖岫之屬能閱世長存而不老實天地間之最壽者也然山岳能自壽而不能自顯五岳諸鎮山之外大槩皆以人顯如傅巖以說顯首陽以夷齊顯之類若人雖不能得數外之壽而能有以自顯茍有以自顯則雖亡而有不亡者存壽亦無涯矣故得志如說輩不得志如夷齊輩至今厯數千百年聲實未嘗一日絶於人之口耳其生氣常赫然浩然於天地之間雖謂之真不死可也使神仙度世之說果不妄吾知其不能以彼易此矣希大今日西北之第一流人物也其學其識其行業其風度斷未可以一時功名之士待之也吾謂希大今日之借名白巖猶以為人而附於山也他日希大事成則白巖又將永有附於希大矣此理在吾輩皆所當深味而及時以自䇿勵焉者也王應韶之贊希大云學以古為的仕以道為事雖不求名而名隨之噫盡之矣清也不類無能為役聊引此意而期相與黙識之不敢向多人呶呶也民情四條答當路一福建多山路山路多險隘如今浦城縣仙霞等嶺及福清縣常思嶺上官常所經行猶或詫為險峻抑不知此猶通衢大路也其險甚處上有懸崖峭壁百十仞下則有不測之坑谷泉㵼其中聲如震雷而僅以盈尺之板或半腐木枝架其上以度甚可危也又或林木蒙翳披一罅而入數十百步不見天日與探虎穴無異其出也木葉草刺粘帶滿襟裳當時平無事行者無讙呼追迫之聲猶若未甚害不幸如去年漳賊温文進倡亂不三四日抵安溪縣縣民匆卒委棄貲産奔入泉城欲従陸行則恐賊伺其隘萬無一生姑投溪舟而人衆利先溪舟小不足多任載胥及溺皆無辜之民也可勝痛哉夫橋梁道路亦王政一事諸葛公倉皇立國於蜀日不暇給猶以此為務今職方内地皇風清穆百餘年而此等事有司猶視為度外設使温文進輩稍有黠䑕之智不離穴以即平地則官軍雖數十萬其如不得方軌不得成列之徑路何恐亦未能𠞰絶如此之易也况雖幸無虞而行旅之出於其路者犯涉艱危亦有官君子所當留心者竊意可於嵗事稍豐之日令有司督諭當地大姓或照里甲圖分相地勢所便以次分治之非必大動工力大抵皆有成蹊如傍崖之徑元用木度則去其腐且小者易以堅且闊者或架方橋于其上又善矣其木石則取之左右無窮也若林木叢翳處則刋之焚之使獸蹄稍逺行人不至卒與虎狼遇也今之大姓家有餘資而濫費於淫祀何限此等在在有之若令舍彼為此督諭有方蓋未必不幡然樂趨也未必皆勞鞭箠也如民力不足雖佐以官錢亦可也其於有事之日兵民尤為大助一福建僻在海隅去京師近萬里民間所貢方物如白糖樟腦荔枝龍眼之類是其本土所有近京去處所無者有司科民當地買辦貢上天府自是不易之制也亦有如牛皮雜皮生鐵肥猪鵞之類若悉辦本色則路費靡矣是以有司例科銀兩僉付解户入京買辦逺方之民乍一到京四無知識莫知所從於是京中有一種名攬户者就而與交其主家舖家亦皆通情有素欺其單弱多方誘誤將銀權買貨物稽期圖利者有之貨物失意或酒色蕩盡却轉誘他人那補此負重復誑誤者有之甚至有誆逃無所追究者解户之害或破家或亡身更貽累親屬仍及有司耳目所及可以指數願為申請諸朝改立定規自今但近京所有色物只令所在有司科解銀兩交納内府此等物民既可以就京買辦官有見銀亦不難為措置矣庶幾奸民無所滋其惡良民不至受其害有司亦易以了公事且省無名之費増備有用之需以此法斟酌通行之天下或者其可一福建屬郡人民自永樂宣德以後多有田巳盡丁巳絶而其粮猶在者名為無徵洒派小民夫何故時事推移田産潛入於豪右上下欺蔽有司莫為之分明嵗復一嵗遂不可柰何又有一種恒産奸民元田不失一段顧乗造冊之勢買囑里書飛入絶户妄指無徵又在灑派富家則厚享無名之利貧民則虚受不根之害此何理哉又有自傾墜其先業者妄減元田粮數冀以粮輕易售逮其漸次賣盡寸土無存而虚粮在户多者不下數十石此其人固不足恤為其子孫者亦云艱哉至於生存無計挈家逃亡里書又作實無徵造報矣如此等弊蔕固根連若不大為芟正民俗實無由清愚意丈量田畝之法終在所宜行也但得人為難耳抑聞此弊今日在在有之天下豈有終不可清之敝事哉一天下僧田之多福建為最舉福建又以泉州為最多者數千畝少者不下數百以無君無父之人兼飽食煖衣之奉何所不至而吾良民旦夕疲筋骨曽無卓錐之産者何限各處無徵田粮灑派貧民者又何限其僧田為豪右巧計僭據者又何限經云君子裒多益寡稱物平施若以今富僧與貧民較之可謂不均之甚矣且古有限民名田之議况於僧道今日當道君子盍請諸朝量減寺院多餘田畝分給貧民為業亦古者授民以田之意或以補貱無徵粮田亦所謂截長補短之意此其所大利者民也官也其謂不利者特僧道耳而終莫决意舉行不知其所顧惜者何居其餘已嘗面論者兹不及記讀蜀阜存藁私記竊惟先天地而始後天地而終一道耳道一則其說不容有二宋理學大明至朱子與陸子俱祖孔孟而其門户乃不盡同先生之學則出自慈湖楊先生敬仲而宗陸氏者也其議論有曰毫分縷析較便宜若个便宜總不知總是自家家裏事十分明白十分疑此先生之學也正所謂尊德性工夫居多者也故其論詩曰詩成正自不因題看取風人發興時語到口頭無可柰未須搜擾苦吟詩則先生之詩可知其髙矣其論文則曰不為世態酣濡不受古人繩束巻舒出沒如朝霏暮雲始筆下有自然風味則先生之文可知其髙矣嗚呼亦一世之人豪哉蓋其在萬山中玩心髙明有日是以其言論槩以六經為吾心註脚每有引而不發之意而其興之所適軒然霄漢之上俯視萬有若無一足嬰其懷者此可以見陸學之未盡符於大中至正之矩使當日得究其用恐於開物成務之實終必有疎處茍其疎也則其所自受用亦恐其不覺而近於佛老此朱子之於陸氏所以每欲周旋以補其欠而不得苟同焉者也噫千聖相傳家法類皆自博之約而一敬以成其始終陸學固不可謂不主敬者而稍墜於徑約既失之徑約則其心宜不周於細微而其弊容可遏乎自古髙明之士往往有此在孔門則曽㸃之徒是已夫子所以欲歸而裁之也載觀集中亦屢屢以夫子欲無言之類為說先生固亦知夫子斯言為子貢多言設矣然愚以為又安知其非發於子貢多學而識之後學將有得之日乎故嘗謂自其次致曲以下無仰鑽瞻忽之勞則卓爾之見或非真無隨事精察力行之功則一貫之命必不泛及考之先生所自敘亦未始不自博中得之也夫道也者萬世無弊考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑平平正正使髙明者不得以獨騖而其下者可以企及然後為中庸而可以主張乎皇極詎容一毫有我於其間哉故曰聖人之言逺如天近如地逺如天逺之至也近如地近之至也能逺者不能近能近者不能逺能逺而又能近能近而又能逺此所以為中也此所以為極也此吾道正統所以卒獨歸之朱子而陸氏所就猶未免為偏安之業也細推其故陸氏母亦有激於朱氏門下一二之支離文義而不知反躬以踐其實者邪第激於此墜於彼而或者為之危其流之亂真耳嗚呼天地有常經萬世有定論一蜀阜存藁而其闗涉得失有如此者竊懼髙明之士或又激於文義之弊耽其味而殉之并其所長而失之也故不得不一私記之御史吳公利民一事記御史吳公利民一事云者吳公之巡按吾福建其利民之事固多也利民之事多而此獨記其一事者吾漁民也自記其所利於吾漁民者之一事耳他非所能悉也蓋自𢎞治五年以前漁民課米每石本色五斗揆本府所屬入倉所費用銀五錢折色五斗則徵銀三錢五分類解本布政司入庫嵗有定額也然江海之利無常而人事之變不一間有死絶者有逃者有孤寡而貧難者有業去而産存者而故額之徵於官者固不容有毫釐之殺也不免以敷派同甲之人分償之而漁民之贍足者正無幾既竭其脂膏以輸已之課矣乃復令代償他人之課甚者稱貸於人至盡貨所有或棄妻鬻子以求免於箠楚囚禁之害亦可哀矣哉吳公深悉其病也乃因省災陳言以請於上乞更其制凡漁民課米每石通徵折色銀三錢五分解庫更不復徵本色又乞令通省十年一次攢造漁課冊如庶民黄冊例其死絶逃移等無徵者得以開除新造船網之未及報與夫舊有漏報者皆得以公道舉收而補之通融消息務使上不虧國課而下不虧民力焉上以其言下户部户部行布按二司覈得其實遂請㫖悉依行之於今永為定制矣計吾澚中請申所免陪貱之數已若干則舉吾同安一縣若干澚中所免者能幾何舉吾泉一府七縣所免又當幾何以至福建一省八府一州五十三縣所免又何知其幾何矣吾漁民之受惠可勝計哉此實吳公利民一事也吳公其真能仰體吾聖皇仁恤小民之意哉吾屬年來自輸已課外所以能無他徵擾而得於父父子子夫夫婦婦安居而樂業者皆我吳公達下情宣上德之賜也夫食人之賜而忘之此與草木之有生而無知禽獸之有知而無義者等也非民之秉彛也故共立此石刻以傳之後人使世世無忘吳公之賜云吳公名一貫字道夫廣東潮州海陽縣人具慶堂記今雲南憲副雲室林先生成化初以進士家居八閩士慕先生德學執經藝而就正于門牆下者甚衆清與焉先生同氣七人次為廷美先生又次為廷重廷圭廷玉廷瓚廷温先生時廷瓚廷温已不禄廷圭領鄉薦亦蚤世清僅得其聲聞所及親侍者惟廷美以下三先生無何廷美亦下世今所存惟廷重廷玉而廷玉繼登進士為御史近奉勅督學政于南畿將行語清云吾兄弟今止三人吾與伯兄俱繫官于外其在故里守先祀支撑門户使吾二人無内顧憂者獨廷重家兄一人耳諸子文煥輩嘗别搆一堂于故居之左以便侍養扁曰具慶吾適奉使過家見諸子婦曰侍吾兄吾嫂於是堂而樂之斯文故相知者又皆以詩賀之吾尚欲得子一言以記之吾兄初度之晨在邇吾將順南便附歸子弟之情庶皆于此乎有寓也清承命不敢辭清憶在門下日方總角見四先生皆盛年五色和氣藹然雖已不得為兄弟無故猶為樂兄弟之有人也嵗月如流存沒復間有異清已四十無聞而雲室先生音問時至已不覺有林泉之思今廷重先生行年亦已五十有六子婦羣然能孝能敬孫行亦皆森然輩立少者壯壯者老老又見壯與少者之衮衮迫人後在師友間感舊昔時之情每有怛然於中而不能自已者而况於文煥輩人子愛日之心乎此具慶堂之所以有作也此廷玉先生之所拳拳然有為文煥輩助慶之心也清因是竊念之天地爐炭古今旦暮人子心非木石誰無椿萱不老之願而默計理數終不能免一朝不諱之憂則所謂愛日者其味良苦蓋有未深經咀嚼者而所謂具慶者慮不可長矣然則人子壽親之計又將何出而始為長筭哉自古賢哲以勲業名世者至今其親得與之俱不死間有隠德不禄仕先正亦謂其能以善為養俱馨聞百世同歸于仁孝之道清蓋嘗中夜興思及此而不肖負教力莫能與也如之何哉吾先生一門德星攸聚文煥輩於此義聞之當熟矣惟温舊聞長新知篤踐履出則勵青雲之操以繩前休處者亦務循理安分以無改夫德門之習使吾先生家學永永有光在文煥諸君勉之耳而壽親之術宜無有逺且大於此者此其餘慶無涯又豈特今日具慶之樂而已哉是或可以充吾文煥愛日之心而進之也敬以復于廷玉先生而敬請教焉逸樂㑹記誌書載吾泉風俗淳厚人樂為善自昔謂之佛國夫以佛國號吾泉其指固有未盡然者然即是亦可占吾泉之風俗果趨於善矣宋時人物最盛其出而樹勲業播聲實於當世者固已班班可考其在林泉意亦當有髙人逸士志節風流之可以表世而範俗者而未之有紀也入我朝百餘年來治教休明人物復熾然以盛矣然前此之仕而歸休與夫不仕而既老者率亦多匆匆竟日擾擾卒嵗而已鮮有能自取樂於逸者間有之而尤未能倡為是㑹以同於衆也孟子告齊宣云獨樂樂與人樂樂孰樂曰不若與人與少樂樂與衆樂樂孰樂曰不若與衆此今日逸樂之所以有㑹也其曰逸樂者以逸而樂耳蓋視九老耆英之遺意而不敢盡同也在㑹凡十七人以齒序則家君為之長爵尊而兼齒者通政使致仕張公也次則封主事黄公暨循齋黄先生怡齋賀先生三陳先生史吳包翁留顧董林楊列位先生皆鄉之望也文行表表出等夷而悉萃為一㑹於戲亦盛矣哉其亦吾泉之一勝事哉㑹之言曰凡我在㑹之人幸際昇平之世得入桑榆之鄉或賦歸來辭或玩盤谷序慨浮生之能幾宜逸樂之及時登髙眺逺賞花玩月酌酒賦詩今日分内事也又曰朋友者五倫之一道義者百行之根凡我在㑹之人有善相勸有過相規有疑事則相質其有憂患亦相與為力也豈徒逸樂云乎哉又曰㑹之位惟尚齒㑹之儀不尚豐月必再㑹不疎不數也或於所居或於所遊之地惟其所宜也蓋始於𢎞治辛亥四月望至于今十有一年矣而未嘗有一㑹之曠惟值水旱或凶歉則暫輟此又與衆庶同其憂而不膠於逸樂也邇者家君以諗諸公曰古人謂天地者萬物之逆旅又曰夕陽無限好只是近黄昏又曰明年此㑹知誰健此言蓋雖未能釋然於始終之際而實造物消息之感於人情者也則吾人之㑹又安得長如今日之整然乎日月不居世事陵谷行且人陳迹陳并姓名亦或不復有記憶而子孫或不相知其為昔日之通家者矣然則其終付之莫可如何耶夫人可陳迹可陳而此情終無有已時也况吾人之㑹所以敘天倫之樂事而亦有三益之遺規存焉不可無以傳之後生輩也乃合衆議請張公記之將各録一通置之座隅以遺之後人而張公辭曰此正後生輩所宜用心者適清以侍養歸在京師張公乃屬家君命清為之家君遂授清以其事意如此噫後之覽者亦將有感於斯文王右軍之言蓋千古如一日也清小子其何知家君與諸公之意永矢弗諼併列諸公名字于左張公名苗字世英黄公名齊字欽齊黄先生名續字永連賀先生名騰字仕髙陳先生一位名政字懋德一位名襲字孔𦙍一位名淮字茂濟史先生名隲字茂仁吳先生名珤字顯德包先生名哲字舜華翁先生名裕字惟欽留先生名昆字茂明顧先生名美字孟璽董先生名鳳儀字秉儀林先生名澤字仕悅楊先生名溥字細行家君名觀慧字允元亦封主事云掬清軒記清姑夫掬清居士洪公世居南安英溪之上篤尚詩禮而備嘗世味嘗以為盡人間所有皆不如吾溪中一味之清之耐於咀嚼也故其軒居名掬清而人亦遂以掬清居士目之公遊京師留數月將南旋語清云京塵亦覺厭人吾且歸而掬清矣子昔者許吾為軒之記今盍以贈吾行清早有溪山之癖雖家居闤闠而心每馳於泉石間向以計偕道建溪溪之傍多磊磈巨石時季秋日既夕乃令舟者停棹登石一趺坐仰觀天宇空闊無際光映溪流溪流泱泱其源逺其派長而其清徹底獨黙焉有思巢由洗耳之髙既非所敢慕曽㸃浴沂之樂又非所敢同目送逝者之如斯心懷水哉之有負徘徊眷戀不能舍去而益起敬心焉濯足不可也濯纓不暇也聊取數掬而行亦自覺清入肌骨矣自入仕來世故紛紛傷嵗月之如流所立之未就囘念向日掬清時光景又有非今日可得者則於公之索記其將何以為詞然嘗聞之心迹異境清濁殊味世有混迹世俗之中而其心超越乎塵埃之表者亦有著迹幽閑之境而心未免役於聲利之塲者顧其趣味之所在何如未可泥其迹而論也惟公詩禮在躬故雖久居京塵何損於清况四海英賢之所萃聲名文物之所都皆乾坤清氣之所寓也旬月之内其得於見聞者宜多豈無足増吾胷中之浩浩者乎於是而歸就掬清焉菽粟飲水盡親之歡則和靖母之所謂以善為養者其清也何如詩禮一派貽孫翼子則龎德公之所謂遺子以安韋長孺之所謂教子一經者其清又何如推之其他但不失吾道揆之正則雖日與紛紛者相應酬其清不溷也異時子孫中有英俊者出舉是一掬之澤尚可以霖雨蒼生汛掃海宇又將不嫌其隠顯之異致而體用之一源亦庶幾可驗矣是為記獨善山房記予少有山水之癖雖家居闤闠而心未嘗不日往來于泉石間嘗一棲雲谷矣未幾以累挽歸念之輒悵然每登髙以望雲谷隠隠在東山之隈舊日之松竹杳靄猶依有迎人意北顧清源巍乎髙哉先民之景行猶在目睫也南瞻紫帽金粟飛仙之事不知有無西望九日山庶幾猶有秦隠君子乎恨不得載琴書而從之遊既而靜言思之是亦隘也已丈夫生世蓋自有許多分内事在所當經營者柰何直踽踽然山間水涯自諉為宇宙一閑人而已哉彼海濵之老商山之翁大抵皆非其夙心之所期者此何時也而可引以自况耶用是不自揆其愚不肖猶時與一二士友竊論當世事適友人武榮歐陽時察來致其尊甫元之君之命屬予為作獨善山房記噫嘻予方讀岳陽樓記而有味也君乃索子盤谷序何哉世有登山而採玉者亦有入海而採珠者予以是又私喜向日之好又有與予同者則亦未為全非也且古之君子達則兼善於人窮則獨善其身二者固不同矣然兼善善也獨善亦善也君子亦善而已何必同洪君汝言武榮之望也予往見其所為壽君一序備述君隠居豊山之下孝友而善教又能推其餘以賑人之乏者大為士論所歸則君之善固已章章在人耳目而於獨善之義果不負矣予復何言故於此獨詳予區區衷臆之見始與君同而終則有不盡同者非惟以廣君之意亦因以為時察告而相與勉之也王晉公不云乎吾雖不做吾子二郎必做以予觀君之種德如此而時察又穎敏出羣而忠信仁厚能不失其世守然則歐陽氏豈終獨善者哉是為記至若山房之形勝規模則時察當自能記之矣予之記姑借以寄其意也輞川橋記輞川海之一支也在惠安縣治東三十里岸川而居者數百家皆業海之利以其利之所在也逺近足跡於是輻輳焉且為某所某社之要衝而岸行有一水之隔舊因循以舟渡值風暴水漲或人衆爭先則常有覆溺之虞成化癸卯秋某月縣尹張侯適以公事至其地見爭渡者而病之因相其隘處東有盤石其西積土如阜不受水齧勢可橋也乃召耆老何迪易等諭之咸曰民有此願久矣事苟有主當悉力以趨命侯歸即呼匠計工約其費銀千兩自捐俸以為之倡而令其里之人驗丁出銀四百兩又為疏引俾僧福旺耆老陳思遜蔡廷敬等八人分募錢穀以佐之始工於是年之冬十二月某日間因嵗歉中輟未就逮嵗頗稔復令柯宏珍者往督其成遂以丁未之春三月某日落焉由基及梁皆石為之長三十有二丈廣丈有四尺為間十有五各衛以欄坦夷端直堅固完好凡跡斯地者去舟之危即橋之安皆知為侯德所濟矣迪易等乃相率來泉城請予為之記其實焉嗟夫自有此水未有此橋也利曠於昔而興於今曠於昔者不知其幾千百年而興於今者從容為之不過三二年而已利之興於今者纔三二年而其垂於後則又不知其當幾何年矣甚矣侯之知所以勞其民也知所以逸其民也昔人有言天地之雷電草木人不能為之人之陶冶車舟天地亦不能為之於此見人事之功用有可以補助化工之不及者橋梁之利視陶冶舟車尤為不動而及物一成而永賴自孟子談王道則既以是為為政者之首務矣諸葛公一時王佐於此實汲汲焉柰何世或至弊精於簿書期㑹之間以僅得免責為能事至視此等利民之舉槩以為非朝令所徵上司所督而置之得己之地於是民間之利病往往以有付之無可柰何者耳目所及感慨隨之於是侯之賢為不可掩而是記之作為不可已矣侯名桓字德威江西浮梁人由辛丑進士授今職他績業尚多蓋各自有記存兹不及修海岸長橋記出泉城南許折而東行二十里曰陳江由陳江復東厯玉瀾波至于龜湖蓋又十五六里此海濱地也海濱之地鹹流浸潤不可田昔人因築大堤以止其流而内畜澗水以溉田殆千餘頃傍隄之邊駕石以便行者計七百七十餘間通名海岸長橋中有亭有庵以為憩息祈賽之所其工最鉅其利最博矣據故老遺文所傳橋成於宋乾道間主其事者曰陳君亢今亦未詳何許人也是後脩治之功莫考入本朝成化間橋有圮者𢎞治乙卯蓮江林孔彰崙後吳懷荆桐城吳則敬王田詹勤立承天寺僧智鏡各捨銀兩合而修之督工者吳茂實蔡成端也於是圮者以完至𢎞治乙丑值洪水衝決之圮視前為甚而前人之樂善事者多已淪謝久不克修行者病焉時惟懷荆在顧無與共功者而孔彰之子時學力獨裕懷荆勸時學繼先志戮力以底功復各捨銀一十兩以為衆倡於是則敬及余某王某吳某張某姚某靈源室僧體照或助以力或督以工而余某所助獨厚與懷荆時學等於是橋復完而功視昔為固矣時正德丁卯也諸里人無長少咸壯其功不可無紀載以示來者遂相率詣予請記惟古人有言莫為之前雖美弗彰莫為之後雖盛弗傳此一事也使有乾道之創而無𢎞治之修則先功將自成化末年而隳矣有𢎞治之修而無正德之續則前功又將自今日而隳矣今日之修者嵗久不能無圮設當其時而莫之修則併今日之功舉隳矣且修之貴乎及其時或小圮不修馴至於圮之甚然後圖之則為害已多而亦難乎其為功矣此皆所謂莫為之後者也此皆後人之所當念也然則是記之作豈但以既往之續亦將以為來者之規也介庵記太子太保吏部尚書三原王公家食時嘗命其所居為介庵以見所志及其第進士厯官内外所在為麟為鳳為長城為底柱者四十年其於介之一字蓋未始頃步而不與之相周旋也既以南京兵部尚書致仕家居矣天下之望終不舍也今天子連詔起之復居今位則仍用是以命其燕居之所適清觀政吏部也命之記清庸士也其何足以窺公盛德之所至而發越所以命庵之意哉顧方今人物在清素所思慕而喜談者獨於公為甚則於公之是屬也其敢虛辱乎哉清竊嘗思之矣自古之有大建立於天下國家者其人物類皆雄渾闊達吞吐不凡往往身不離乎齋軒几席間而心常行於四方萬里之逺其意度若是乎其逺且大也夫常志乎逺大則宜於其近者容有疎畧而不能拘拘屑屑者矣此固中人以上者所或不免而今也併考其細行所在乃又皆辨别明白把握堅固其介截然有不可混者是獨何也論者咸謂其出於資禀之髙加以學力之精到自有非可以庸衆人之情而測量之者是固然矣然以理言之志於萬里者必不肯畧於跬步亘古未有躭利肥已茍且摸稜之人而能為天下國家計者蓋有之矣必不為君子所滿而其所建立必亦有所不完也往迹班班皆不待稱引而可知己由此言之則其致謹於細微者乃正所以為逺大之器也故曰人有不為也而後可以有為蓋非獨其窮之所養可以占其達之所施如其達之日一變塞焉則為達而離道矣又將何以立事功而慰人望哉故栁下惠不以三公易其介者非薄乎三公也以介一移焉雖三公亦無用之虚器也愚意介之一字公所以願終身守之而不間於窮達老壯者此也雖然介之為字從人從行行形兩岐意蓋以象人事之判然兩端而不容以相混焉者也此意所該自廣惜六書之法今不盡傳無以證愚言耳蓋天下無無對之物凡物理所仗皆有兩岐如是非善惡得失吉凶之類雖一動息一語黙之微皆有之其大則如人才之一消一長紀綱之一弛一張家國天下之一理一亂一安一危兩者蓋常對立焉於是兩者之間誠皆知所决擇取舍而不使或昧之毫釐以致千里之謬焉則介之在我者無不得而天下之能事畢矣所以光明吾君阜成吾民而鞏固吾皇圖者又豈假求之一介之外也哉是為記若夫是庵之建置規模之類非大義所闗亦非公意所重也皆不書永春縣重修文廟記道原於天賦於物具於人盡於聖人而集大成於夫子夫子之功不見於治而見於教教行而治舉矣是故六經未作之前一世得一聖人而僅足六經既作之後萬世得一聖人而有餘此後世之教者所以一宗乎夫子而天下學校所以通祀乎夫子而無間也吾泉永春邑於萬山間其樸俗可愛秀民可教者多考誌宋世登進士第及特奏名者七十餘人不可謂其地不生材矣中間如留公正莊公夏黄公偉輩其所樹立又不止一邑之望也而二百年來寥哉闊焉豈其氣運之往而未復歟抑亦司教者與學者之未盡其道也學宫故在縣治西五里之官田市其興修因改始末前誌備矣厯年既久撓敗殊甚間或時有所修治者又僅知急於師生之所居止至於大聖人及羣賢所棲神之地吾人所日夜瞻依以萃其敬心者顧乃視以為後焉嗚呼是獨可後也乎哉𢎞治某年武進周侯魯以名進士來為宰顧廟貌敝甚慨然曰夫子者吾人所天也其不嚴如是何以聳風教耶亟捐俸以倡其士民為更新之計士民戴侯之仁而樂趨之選延耆老顔朝督其工遂改建大成殿五間髙深各四十尺而廣倍之建兩廡各五間視殿制髙减十尺深减十五尺而廣减其四十有一尺㦸門髙廣與兩廡並櫺星門髙二十尺而廣與㦸門並殿中從俗塑夫子像四配十哲次於傍各以其封爵之服兩廡諸賢止置木主自夫子以下主皆侯盥潔親書之殿下堦庭甃以石中為正道櫺星門外闢舊小道而廣之門之内東建景賢堂三間以祀鄉先生及名宦西建省牲所及庖厨亦三間自殿及堂咸彰五采焉又改制神案及香爐各十有五籩豆簠簋牲匣帛箱之類各如數爵以銅鑄凢百三十有八衆手偕作始於甲寅嵗之五月至乙卯嵗臘月而成侯乃盛禮樂以落之永春文廟之規模於是乎一新噐數於是乎大備觀聴於是乎改嚴聖道於是乎増輝士心於是乎益振起而周侯之所以崇聖道作人士之志亦於是乎其少伸矣教諭吳君某等以書囑清為之記且述侯之言曰此吾職分内一事耳然吾之所以得就是者實督學憲副韋公分守少叅熊公郡太守李公主張維持力也不然軄所當為心所欲為而以掣肘不得為者天下何限也噫當為欲為而不得為者諉之人可矣若夫學者之事則有欲為而必得為且上之人常懸賞以勸其為者而顧或不為焉亦何以學聖人為哉此盖周侯所以拳拳廟學之本指歸趣所在也併以諗吾鄉諸俊彦云虛齋集巻四
