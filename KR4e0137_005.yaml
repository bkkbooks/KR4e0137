body:
  text: 虛齋集卷五明蔡清撰哀辭哀詹鼎辛丑之秋豫自京師歸以疾留嚴陵嚴陵之士有就豫館問所疑者詹生鼎與焉生穎悟不甚出人而重厚信義視他人或過之别來三數年常往來豫懷也兹過嚴陵問之則死矣嗚呼我愛詹生厚我念詹生深生無出羣才生有不俗心方今重文學俊才動成林豈乏鏗鏘韻所希古淡音詹生永已矣吾獨撫吾琴哀林生允昱辭有序允昱為人懇篤而周愼其居家最得父兄心與人交初不甚歡久而有味其問學亦駸駸有近裏著已意其質雖若稍不逮其所志則固不隨人後也其言若不能出諸口其中則自有條理至義所當為者卒亦未易以利害回也豫嘗辱其以一日之長見推愛其為人以為假以歲月涵養有成當必有見於世者今年春遭其父及祖母喪其居去城餘五十里不得數相見六月二十二日始以喪事至城過豫艾庵不半日辭去期以閲月復相見至二十九日則已為古人矣噫人生之不可期如此哉天乎如允昱者胡不遂其成而奪之亟也其配蔡於其將殯也哭謂其諸兄云渠生平於喪事最重棺斂今日亦宜以此待之已而獨撫其小弱女而泣語言間微有屬家人意家人方匆匆莫覺也允昱蓋棺蔡即入室自縊嗟乎其死之之早豫且未暇論然豫年三十矣人間此事始一見之吾允昱之得此豈偶然哉此非惟可以風女兒曹凡豫輩於允昱亦當有感耳豫久厭紙筆於此不能以無辭嗚呼允昱兮吾意子之必將為天地間磊磊落落之丈夫何五日之不見兮遽幽明之殊途已乎允昱兮命矣夫已乎允昱兮其猶可以自慰夫雖百未一就兮刑于之化已孚嗚呼感此女兒兮乃知馮道范質輩皆弱婦人也此真丈夫此真丈夫哀洪良偉汝以去年十月别我南歸吾訝其久無書也今年正月以疾報四月竟以死聞嗚呼復安得性資朴厚志學懇篤如吾良偉者哉病與冗相仍久不得申一哀負吾良偉矣茲將有逺行南望揮涕寄此一瓣香也良偉汝有知其鑒之題三鳯林氏太安人挽詩册葉後周有八士兮宣父所奇閩中三鳯兮近古其稀吁嗟三鳯兮此母産之今其逝矣凡百君子夫烏得不為之哀悼而寄聲詩題人求父母挽詩卷後將為善思貽父母令名必果將為不善思貽父母羞辱必不果此則父沒觀其行事死如事生孝之至者也若夫墓表挽詩之類冀以善其親於身後者抑其次矣祭文白鹿洞書院告夫子文維正德丙寅八月二十四日巡視學校江西按察司副使蔡清兹詣白鹿洞書院敬謁先聖孔夫子之靈而不能已於言曰未有夫子之前則有太極而後有天地有人物有羣聖賢也既有夫子之後則有夫子而後有天地有人物有羣聖賢也夫子之道塞乎兩間兹山有廟亦固宜然惟夫子之靈兮逺而求之六合之內六合之外近而求之隨求而在即其所在聖靈惟真嗚呼圓顱方趾夫孰非人夫孰非知有吾夫子之人尚饗白鹿洞書院告周朱二先生文有天地萬物矣可無羣聖人乎有羣聖人矣可無吾孔子乎自孔子沒千有餘年之後又可無吾周子乎吾周子程子之後又可無吾朱子乎鳴呼有周以降元數潛移時生聖哲間必有虧故我二夫子輩皆不得一伸其志乃泄其藴以貽來世以衍孔子之澤以壽生民之紀非必造化之有心其亦所遭之定理嗚呼不肖清乃今吾知二夫子在天之靈兮蓋有以洞易道之始終而信渾沌之不死尚饗謁白鹿主李先生告文兹洞之勝惟公所基基則厚矣風節是儀前王褒錫曰惟好德聿來真儒有事人極大發山靈光輝無射譬彼瓜瓞未大而昌根柢所在其何可忘有祠翼翼來今永式羣彥從之悉飲公澤尚饗有從祀諸賢告祠堂文維成化某年月日孝玄孫蔡觀慧謹以牲醴庶品告祭于高祖考妣某稱號曽祖考妣某稱號祖考妣某稱號考妣某稱號之神曰惟我列世考妣締造積纍艱難勞瘁以有今日兒孫罔極之恩夫奚容言今皆以次謝去人世雖曰神聚于堂而遺形則各相依于荒山野水之間兒孫省掃歲能幾度生人此痛亦寧可言茲惟中元節序所臨實增感愴且慧將以歲貢赴京清亦以進士病痊將赴部聽用當暫違去墳墓慧是用昭告于列位先神即以明日至十六日率諸弟姪以序而有事于各墓域間就令睿與清辭焉嗚呼不去墳墓者孝也去墳墓而能成名於身效忠於國宜上宜下以有光於祖宗而歸拜于墳墓者亦孝也此我先世之遺訓兒孫所當佩服而勿墜者因敬申之以詔行者尚饗告墓域土地文維成化某年月日泉城西隅民人蔡觀慧敢昭告于某山土地之神曰慧之某考妣遺骸托藏兹山有年矣仰資神祐不敢有虞凡我生人慰感無量兹以中元節臨有事松楸敬專牲酒茶果祗薦于神且報且祈惟永佑是賴下情不勝懇惻之至尚饗祭朱都憲文代三司作惟公山川間氣文武兼資天下之望學者之師夙教蒲庠文化覃敷士曰休哉安定在湖繼司風紀烈烈有聲人曰偉哉李勉在廷按節湖南爰及嶺表濁者以清秋風一掃擢參晉藩尋掌政要寒者以溫春風一道惟彼北敵牧馬我疆邊吏夜呼邊民皇皇公承閫寄徐而驅之乃踰木葉乃越燕支惟彼雁關西門鎖鑰任匪其人塵起沙漠公一指揮境內貼然如虎在山如龍在淵事定功成功成名遂明哲保身急流勇退角巾私第優遊餘齡桑榆日霽松菊風清嗚呼自光嶽氣分士罕全節方者易員員者易缺惟公不然大而用之則大其效小而用之效亦不少嗚呼自太極既判人品不同隱者為高仕者為通惟公不然進希三傑退希二疏進退時耳吾何心乎嗚呼茫茫宇內如公者幾八十八春了一夢耳國亡元老鄉喪達尊輝失山嶽哀動縉紳訃音上聞帝亦咨嗟曰葬曰祭恩寵有加生榮死哀何修而得惟帝念功惟公種德某等生後飫公德音九原不作悠悠我心有鬱佳城慶雲之里合誠一酬高山仰止遣祭傅文穆公文維正德某年月日門下生江西按察司副使晉江蔡清適有事于臨江恭懷故太宗伯傅文穆公之德教而不得至新喻謁公家廟一展下情乃敬具牲醴蔬果屬臨江府儒學教授謝理為致祭于公神位前曰惟公名德在天下事業在史官文章在士林而其行義之著於家庭族里間者至今臨江之人亦翕然頌之無間言嗚呼若公者真可謂之有學有德有體有用有華有實在邦無怨在家無怨者矣豈非一世之偉人而後學之師表也哉不肖清昔侍春官雖僅彌月而德教在懷十年如渴乃今迹名賢之故邦慨親依之路絶宰木何如寸心徒切馳瓣香以寫吾懷兮恍台儀之形于目睫尚饗祭邱國老文維𢎞治某年月日門生晉江蔡清謹具香幣牲醴南向哭祭于故恩師瓊臺邱先生之靈嗚呼先生之學博極羣書如巨海之吞吐百川含𢎞無際矣先生之才華國名世者四十年晚際聖明登之台輔付之爐錘且取其所著書於大內用以廣益聰明權衡百度矣先生之道尊為國師門生學子遍天下天下人誦其文家有其書雖庸人孺子亦皆知其名而仰其下風矣先生之業其亦非常矣哉蓋自有瓊崖以來其所鍾人物未有如今日先生之盛者嗚呼其不為虛生也已清閩泉凡子也先生之教國學清得厠四方之士以沾教澤於科條之下辱閔其暗而與進策勵之頗出衆人之上此恩之重曷克副之徒守空言於世無補慚負師門歲益云邁方以母喪在殯而聞先生之訃曰親曰師痛割交慘不得撫柩一慟瓣香遙致寸心附焉嗚呼想瓊山之巍峩與南海之浩波懷先生兮不可復見嗟門生亦老矣向之所受云何尚饗祭三原王先生文維正德某年月日門下生致仕江西按察司副使晉江蔡清聞宫保太宰介庵先生三原王公之喪謹就家為位哭奠而告以文曰公自三十登仕至八十而致政所在為麟為鳯為長城為砥柱者蓋五十年其望實之在天下後世者舉無庸門下生小子之喋喋矣况小子無狀嘗辱恩教而尸素十載全無一毫樹立於世今則杜門待盡之人矣雖有言亦奚足為公重輕哉然由前所言則哲人之萎固可為天下慟由後所言則不肖愧負恩教又不勝師門永訣之痛也嗚呼噫嘻尚饗祭萬國老文代作嗚呼昔之君子有負致君康國之術者或鬱於下僚困於疑沮而終不得以一施又有以忠義結知於人主者衆方望其將有大庇於斯人而天乃折而奪之又有當功名垂滿之際忽飛蠅之點染而趙璧遂不得以完歸此有志之士所以為之失聲而太息飲恨而深悲者也惟公亶英秀之資際熙洽之時一舉而近天子之清光于以備顧問職論思自是出入館閣厯膺柄用卒致位夫帝師蓋昔人所謂朝廷清明天下無事享其榮名祿位者若干年謂非公之才德果有過於人則何以臻兹與而况晝錦焜耀於無恙之日天恩頻仍於蓋棺之餘兹誠人臣之極寵而今古之幾希者也嗚呼公之遭遇何如哉某等哀故老之云謝想峨眉之失輝爰合詞以侑奠嗟人生兮真薤露之易晞尚饗祭吏部尚書耿公文嗚呼清始為進士觀政吏曹公位少宰即辱與進吹噓若以為可教者逮清備員禮曹公位宗伯承事左右自當竭胼胝之力乃於有事太廟之日誤事獲罪惟公俯諒其情於罪之之中而有培之植之之意用能不失舊物今日猶得有詞以白於吾親也此其恩真所謂與生我者等矣顧不肖豈知所以為報哉洎清改官吏曹公亦旋位冢宰猶以昔嘗受教之故所以勉進而提撕之者益至益周清失所怙南奔公哀之慰之且命諸僚友有數外之待顧不肖又曷足以當我公之厚此意亦所謂淺九淵而輕九鼎者不肖清又豈知所以為報哉嗚呼公之事業在朝廷德學在斯文聲名在天下而其恩之在清一人之微者亦不可限量如此公之騎箕其關係國家與士民者夫豈細故哉北向一慟形留神往何日見公宇宙茫茫尚饗祭倪冢宰文嗚呼清昔供事公之門下自揆不肖僅得不見斥辱於公足矣及公北蒞銓衡則聞之北來士夫公時有器我之言既而過古杭見一長者云太宰公最知子者而子乃急於歸養何哉然公竟從子志斯又以見公之知子有非尋常相知者倫矣嗚呼向使公當時不即從清之請清之歸不及吾父之存則公平日之厚清者果謂何哉故嘗謂清乞歸之遲其罪在清而猶得及吾父之存則其恩在公公之恩我者如此今公云亡悠悠千古無復見公日矣清之痛何如哉清之痛何如哉况我公之宏才博識厚德雅量真足以壯觀天朝而鎮壓海內者求之公卿間恐亦無幾而乃年甫過五十掌銓衡亦僅一載其所藴未克究於上下而遽云亡斯其為痛又豈可勝言哉嗚呼如清之不肖真為負公矣顧世之偉人能如公之納不肖清於度內者能幾哉面東一慟公之恩不能忘也尚饗祭楊侍郎文代九卿作惟公英敏之資聲發自幼奮自賢科在帝左右東觀石渠吾不知其幾書收入胸中不見有餘盈箱纍牘吾不知其幾作流出胸中不見不足嗚呼文哉可以名家可以華國豈惟華國行亦拔俗有義有仁愛君愛親愛及姻友篤于弟昆垂老翰林退然如遁或諷之少通則曰嫠婦皺矣焉事脂粉晚值聖門擢贊銓衡或小不如意則曰臣不能事事矣間局是榮嗚呼公之請間才幾何日倐焉告終殆其先識惟帝念哉錫葬與祭洎加以諡是曰文懿嗚呼公位三品未為貴壽鄰七十未為希惟文懿之名千載有輝千載有輝曰惟明主之知而况生前之撰述議論往往可以訂既往而開後人而其所造就之子弟門生又羣然不替於青雲有生如此亦何憾云所可哀者在吾斯文嗚呼公事畢矣歸葬有日合辭矢哀此情惟一尚饗祭彭司寇文維𢎞治某年月日鄉生蔡清謹以香帛牲醴致祭于故大司寇從吾彭先生之靈嗚呼先生德行風節政事文章後生輩難乎其為繼也已矣嗚呼亦可為天下慟也已矣嗚呼仁者必有後此則責之天也已矣尚饗祭福州林侍御文嗚呼清早得以不肖之身托之吾雲室先生陶冶中惟先生雲室愛弟也克體雲室之心申雲室之教循循善誘使不肖於理道亦獲窺見一二至於江山萬里之跋涉京國十年之遊寓凡百動止槩惟吾二先生是依今雲室先生副憲雲南方有名遂身退之請咸謂先生年冨望重廷議嘗有公輔之薦意將得以大行所學為斯人斯文之慶者豈謂遽止於今日也哉嗚呼此訃一至雲南吾雲室先生之痛慘當何如哉清自奔母喪南來一别四年先生適亦有行過家相望三百里省問之心旦夜東馳而以疾患纒綿阻未獲遂方聞九月初三日發程北上不知以何日至浦城而奄有此事矣嗚呼痛哉痛哉清實苦哉苦哉惟先生之學之行修於家浹於鄉信於士林聞於四方而見重於朝廷肆奉命為江南北學者之宗主大為士類所依歸生既無愧沒亦何虧唯是門下小子銜恩深重依戴未涯而天遽奪其庇痛苦何堪東向號哭形在心荒嗚呼茫茫宇內知我者幾人肯我憐而教斥我者又能幾人而先生則既作古人矣顧此不肖之身曾莫能自為主宰所謂芝蘭種不榮荆棘剪不去二者無奈何徘徊歲將暮者不自知畢竟當作何等人耳嗚呼吾思吾先生之心豈能以語言盡哉報德有道未能自信瓣香樽酒人情之常來春上道乃當一哭柩前或墓所也尚饗祭龍溪吳侍御文惟子懷奮迹孤寒致身賢路分符佐郡者五閲載進而峩豸冠握王度而考其所以自待及所以待人者曾不少改其儒生之素此固衆之所共知而非吾鄉邦之所私譽者也嗚呼吾聞貴而不易其素者逺到之器也而謂子懷乃僅止於是乎而况無父無母無子無姪無伯叔之親無姑姊之戚所遺者僅一寡室及一幼族弟形影凄凄吾猶憂其孤弱貧悴之無以自植也天之於善人其果能一一顧視而為之力乎哀哉哀哉某等哀子懷不幸之甚而無以寄其哀為賻為贈力有限而情無涯合一觴而致訣慨天道之莫猜尚饗祭陳都運文嗚呼先生起家進士主秋官事厯副郎正郎而擢守吾郡改福郡尋擢河東都運在在皆有聲光而在吾泉則其施於人者久且博固吾泉人之所詳也嗚呼先生之心端正平易先生之政慈祥愷悌至其操法之際則凛乎風霜之厲凡所施為類不求悅於衆人一時之耳目而常有久後去思之利蓋明而不察寬而有制兹誠為民牧者之表儀而吾泉人之所以懷感於沒世者也天之福善亦既不渝鳯雛雙飛高拂天衢聞餘子姓亦敦詩書種而食之其可涯歟清實庸愚早辱知遇冀公百年以永終譽忽幽明之永隔羈官守之莫赴聊寄一哀用表𠂻素尚饗祭新淦周虛白憲副公文維正德某年月日門生蔡清聞恩師虛白先生周公之訃以身羈于官不得奔赴喪次謹就官舍為位哭奠而告以文曰嗚呼先生昔僉憲吾閩清年十七先生實與進而教督之至年二十而别先生閲三十四年清年已五十有四乃得復見先生於新淦之里第見未竟日而别又十日再見移時而别未一日而先生不起矣嗚呼清於先生也何其幸而猶得兩見於一别三十四年之後何其不幸而於三十四年之後僅得兩見而已也痛哉痛哉不意旬浹之間幽明永隔門生職分曠若罔聞西向長號形留神往謂之何哉謂之何哉惟先生學識之精博德行之深純才猷器識之卓偉一一足為吾人軌範其憲副陜西也年五十三以念母老懇疏致仕兵民至揮涕乞留而不可得今太宰馬公之為夏官常采公論奏起之而格於例厥後以去就光明恩詔自中順大夫進而為亞中大夫再進而為嘉議大夫皆致仕之日也斯亦可見公論之不可誣也先生之賢為何如哉清比以上命供事先生之鄉意得時時供杖屨於先生之厠以終其承教之願而今也無及矣痛哉痛哉憶庚戌之冬清如官于朝嘗繪慶壽圖屬朝紳賦詩以為先生壽計明年先生壽登八十亦方豫為此圖而屬藩臬羣僚詩之以再致其祝願之意而今也亦無及矣痛哉痛哉嗚呼西江之水渺渺無涯我懷先生實與之俱惟古之懷德者期於必報而清之所以期報於先生者亦自有在而未敢言也然亦未易與時人言也瓣香樽酒姑寄此懷而附以此詞英爽如在尚克祐之嗚呼尚饗祭戴少參文維正德某年月日門生晉江蔡清寓南昌聞座主致政少參萬安戴公之喪既為位哭臨乃具香帛牲醴屬萬安縣儒學教諭王謐代詣靈柩前一奠而侑以辭云惟公才識之雄富風節之剛方政治之優長博觀斯世要豈可以多得哉方成化丁酉公以侍御出按吾閩也適大比取士之秋如清不肖實蒙奬拔念公當日之所期待與清之所自期待者云何去今三十餘年公既已作古人矣如清於向所期待者猶皆杳然如寄稍改於其舊者僅身外之物色而已嗚呼何足道哉兹聞公訃中益慚負而疾弗及侍棺未及撫既負公生又負公死嗚呼如之何哉如之何哉尚饗祭秦太宰太夫人文惟清生平無由一望吾太夫人懿範而受吾太宰公之德受吾太宰公之教恩同父師則視吾太夫人其大母行也太夫人之喪乃不得匍匐一赴哭焉其為哀且愧何如也嗚呼吾太宰公為國柱石為世鳯麟北堂有變回我陶鈞斯其為戚又豈惟一人一家之故而已哉然而風霜凄切元陽不滅吾太宰公之所以為其親不朽圖者蓋未涯也又何莫而非吾太夫人之遺哉北望悽愴惟可自諭伏惟尚饗祭林都憲尊甫文維正德某年月日晉江蔡清道過莆田謹具牲醴致祭于詔加中順大夫菊莊先生林公之靈曰公平生行善徴於令子以都憲內艱服闋朝命徴起者再璽書特起者又再而競不起至以疾乞致仕海內方訝都憲之介也然不數月而公之訃聞乃知終天之恨雖所不免而愛日之誠已獲庶幾都憲向之所以堅不起者良有其道而孝子之門果有忠臣在焉豈止區區成就一節之士而已哉公有子如此所以報國之勳綽有餘地而其纍被寵命之褒加也亦冝矣况諸子或以文雅克家或以儒官典教皆森然拔俗之英公為善之報又不於是乎可徴哉清獲登德門侍顏範已三十年忽聞兹訃悲愴不勝適道所經謹具瓣香牲醴少致鄙情嗚呼哀哉尚饗祭朱侍御母文𢎞治某年月日通家子吏部員外郎晉江蔡清謹具香幣牲醴東向四拜奉祭于邵武朱母太夫人之靈嗚呼清仰令子憲副先生學行而受教愛也有日矣視太夫人猶母也登堂之拜素切于懷而未獲遂忽聞謝世之訃痛如之何乃以身病道阻不克躬赴哭弔負愧又何如也特修薄儀奉薦靈筵言不能文意不能達伏惟尊靈鑒饗嗚呼痛哉祭丁指揮文嗚呼清竊嘗評人物於一時如公者真不易得哉其武也文其文也質孰謂武辨中乃有此人物哉嗚呼今其已矣春秋僅四十計其平生英雄慷慨奔走王事曾不遑啓居而卒以不夀內無期功強近之親諸子又方煢煢在幼天之所以報公者一何其薄也念之使人失聲直欲上詰老天而無由哀哉然而德在軍士功在邊陲名在縉紳公雖不夀而有夀者存矣况後事又得所托劉子羽劉勉之豈負韋齋翁者哉九泉之下計應可以少慰也顧清無似辱知有素兹聞公訃相去不二百里而屬有采薪之憂不得匍匐一弔死生之際負公多矣臨風一涕端為正人灑也區區鄙辭何足以達意哀哉尚饗祭陳提學亮之文嗚呼先生何其才之富行之篤器業之臧也而何其壽之嗇也嶺南之士沐教方新又何其不幸而弗克卒所業也國家得一碩才焉方駸駸而進之冀收其效而又何其競不得底于大用也此吾人於先生之喪所以不能已於哀也抑以顏路之暮齡而哭子淵之喪以子由之至性而狀子瞻之行此情又何可堪也此吾人於先生之喪所以尤不能已於哀也尚饗祭林雲室師母文嗚呼唯吾師雲室先生之所以成其學成其德成其功名者固出於所自樹而吾師母內助之力亦不可誣也且吾師揚厯中外二十年去家或數千里或萬里家衆數十口家事且如毛而悉以付吾師母曾不以一毫縈于念慮者謂非藉吾師母之賢固不可也吾師近以動勇退之志門下小子輩咸意齊眉偕老教子弄孫為日方長而吾師母忽爾訃至嗚呼痛哉痛哉某以羈官守于數千里外獨不得匍匐至門下一哭南向涕零可勝愴情一樽逺致聊薦微誠伏惟尚饗祭都臺林太夫人文嗚呼孰不有子而貴子亦豈少哉惟夫人之子名節重天下聲光壯本朝計其所就貴足道也有子如此母之賢又豈庸云云哉令子方受長城之寄於大江之右期奠江右之民以寬聖皇南顧之憂而忽以夫人之故輟璽書所付者而奔就苫塊焉斯其為戚又豈惟一人一家之事哉清早辱令子教愛嘗獲展登堂之拜而今而後請拜無期矣凡為人子者於此其能無所感傷乎噫清實人子之不肖者也於夫人之卒也重有感焉而不能言也傷哉尚饗祭朱侍御乃尊文某等在令子交遊中逺者十七八年近者五六年矣斯文相與之至情既等之骨肉則於公雖未獲一接平生而其傾想頌願之心實有不能自己者往者令子杖節二廣得便道以拜家慶某輩亦為之一樂焉逮還期之伊邇蓋方引領閩嶠之雲而屈指於親庭之日而公則已不待矣人子之痛可奈何哉可奈何哉某等相哀之心其又能以自已哉雖然公之生也有善名在里閭而公之子又有賢名在朝野人孰無死有如公之所得者能幾哉嗚呼論至此公之死所以益使人不能漠然者也薄奠寄哀聊以伸吾人之懷尚饗祭蘭溪章先生乃尊文昔者令子暗齋僉憲吾閩清為諸生實得觀感竦動於治教之下於時固已知慶門種德之有自也無何暗齋以公垂白在堂早乞歸休侍養寂然與世不相聞者垂三十年天倫之樂道腴之甘蓋有未易窺者雖朝命及門數四而確不可奪斯又以見公之能安於善養而所責望其子者有不在區區功名富貴間也夫有是父有是子宜乎天下士之為暗齋致私願於公者無異於其親戚故人或有類孫曾之於王父者也此豈不足以驗在人好德之同心也哉而公今則已棄孝養長逝矣凡昔之為暗齋喜慰者今其能不為痛恨哉清適乞歸便道仁里方期一展牀下之拜退將次第有請於暗齋而入門之際公之像設已在堂暗齋已扶杖在傍矣我之生也何事之與心期乖者之獨多耶且清已五十無聞矣此行又不得遇於公之門則其所以哭公者豈特尋常知識之情而已哉生芻一束蓋不得及公之生以展其誠猶願冥冥之中有以鑑其來意之非泛泛也嗚呼尚饗祭王府經文嗚呼君吾太宰介庵公之適嗣也介庵公著勳績於朝野者四十餘年而在公常有忘家之適私門絶無毫髮之牽者此固盛德刑家之化而亦主器得人之克相其完也洎沐國恩兩贊元戎清聲四達益愼以恭上下嘖嘖庶幾肖公夫何一疾俄傾云終嗚呼直牀下春秋高矣此痛其何可言况兒女之成行者多未了之債而清白吏之子孫固乏負郭之田也靈車北引遙遙三千善人之報然乎不然清出公門下且辱君知慨幽明之永隔重念公而增悲一觴薄酹不禁涕洟尚饗祭王侍御尊甫文嗚呼清數從吳中過得公之鄉行於吳中賢士大夫稔矣既而獲與令子御史君同朝竊見御史君器業表表班行中觀風所至凛然如秋霜霈然如時雨上下敬嘆畏愛無間言信為能行公之教者於是始信公種德之報而有子之慶又不止尋常之以子貴故得一推封之榮者而已也清既有慕於公而又辱知令子兹行借便計程謂當得一遂登堂之拜矣逮至近郊訪之則公近者已作古人矣嗚呼未見君子憂心沖沖我之謂矣既見君子我心則降我無日矣惜哉傷哉况聞令子廣南之節將旋蓋方屈指於親庭之日近而公已不待人子之痛又可奈何哉令子之痛吾輩尤為痛之也行邊觴豆草草莫盡豫情尚饗祭洪氏姑母文吾家族庶不一惟吾姑之父與吾祖同胞至親且同德相與之日最久吾姑之少也又嘗學女事於吾母動止相依更歲年猶記吾姑德性醇厚幽靜或半日不出一語而勤愼弗懈又大有度量一歸英溪逮四十年清父子以地逺力薄雖信介時馳而音儀希接十數年來吾祖吾父母暨吾祖叔父母俱已相繼而歸冥途甫葬吾父未十日而遽哭吾姑嗚呼昔之少者壯矣壯者老矣老者死矣亦有未老而已死者感今懷昔人生骨肉之間恩義之際其相與歡然者能幾日而會少别多會短别長其將如之何哉清今始迹英溪而不能及吾姑之存其痛又可奈何哉吾姑夫吾表弟清固無辭以解其哀也尚饗祭表弟黃于鼎文吾年十有九子年僅十有五即從豫遊豫領鄉薦未行子復從豫或棲巖谷寓招提而不相舍者又數年豫既登進士官于朝子亦領薦上京師遊太學無何亦登第而同朝矣計其在家鄉在京國相聚之日恆多間或相逺率不厯歲移時即復聚世之親友從事功名之途得如吾二人相從之久而相聚之密者蓋不能什一也而今也一别則萬萬斯年不可復聚矣嗚呼痛哉載念吾二人者之自少力貧讀書同也其學有不逐時好其言行不敢越常度不能為世之能人又同也自登第入官至今或十年或二十年而其貧猶昔其內乃皆若他有所慕而未克酬者又同也然豫亦衰矣抑豫雖衰而殘喘尚少延子猶少且壯乃倐爾而先終身事業僅止於此親老子幼皆不能恤矣嗚呼吾其如之何哉痛哉痛哉尚饗祭黃汝亨文成化某年月日友生晉江蔡清謹用隻雞樽酒告祭于故友行人司行人莆田黃君汝亨之靈曰嗚呼始海上之報至道路洶洶朋舊歔欷豫心獨迷且驚且疑蓋以為有則於理若在所無然以為無則於數又有所不可知者用是含哀展轉者凡厯幾旬時嗚呼今果然矣謂之何哉愧豫與君總角相聞逮君既壯而登第豫始得一見於君之門自是信問不絶情誼彌敦或同榻夜話於金臺之客邸或合席聚論於吾晉江之濆逺托帝霸之遺事而近究程朱之緒言蓋有我之所是而君以為非亦有君之所道即我之所云者言議雖未必盡合意趣亦近於同羣靜言思之猶厯厯昨日事耳豈謂桐城南十里亭之别乃遂為此生之永訣也哉嗚呼當十里亭之别也豫舉酒屬君曰壯哉兹行得以遊司馬子長之所不能遊者矣抑又豈知胸中之壯氣尚未及收於史記而魚腹之英魂遽已同歸於汨羅者哉哀哉痛哉孤弱子之失怙負慈親於暮齡况又與愛弟而偕行使賢季父增倍其愴情者哉哀哉痛哉雖然君以王事行也凡事之以義行而卒與禍會者謂之命儒者平生談論曰有義有命矣今日又何言哉又何言哉嗚呼惟天地之無窮兮哀人生之長勤往者吾弗及兮來者吾弗聞已而已而尚饗祭外父母文成化某年月日女壻蔡清始祇謁吾外父義民胡公外母李氏之墓爰具牲醴庶品以祭而敘其情曰清念我外父外母鍾愛厥女不以與所親近之冨家郎而獨以屬之疏逺貧寒之孺子此其待我者不為近且淺矣清之感德何如也奈清不才年來力困於一經翅垂於兩舉上不能顯其親下不能榮蔭其家之人孤我外父母所望其負愧又何如也乃今幸藉神明之祐叨居鄉薦之首丈夫萬里程僅得一舉武而外父母則既謝世矣嗚呼清之得舉也其亦幸而祖父母及父母之俱存其亦不幸而外父母之俱亡也興言及此莫寫我悲然受人之德妻人之女既負其生忍忘其死兹具一奠之儀少敘久負之意而追報之效百未能一二也念哉痛哉尚饗祭王表兄文維𢎞治某年月日表弟蔡清寓京師謹具香帛牲醴遣義子克忠奉祭于亡表兄蕭山寓士王君之靈嗚呼吾兄生三歲而寄身於鄭氏六歲而永辭墳墓從鄭氏於浙矣清生五六歲始知有兄在外二十三歲始能求之多方不遇至兄三十有九清年三十六始緣周侍御之力物色而得之於蕭山水濱之行人杭城一會恍若夢中嗚呼我外祖之嗣歇矣遺脈一線飄零僅在誓將奉挈還歸故鄉庶以噓一爐香火之寒灰而燃之不至遂隕其先世煌煌奕葉之門户耳嗚呼豈知吾兄之年乃僅止於四十有三而已哉苦事哉苦事哉茫昧者天曽豈知人間有恩義大願而哀念成全之也哉去夏别京邸期以明年秋會蕭山即同歸泉南而今也寄骨於何人之地矣想吾兄垂絶之際亦將謂清莫可奈何矣然吾兄之姓氏今則分明矣吾兄後事今在清矣清之貧窘固兄所知抑諺云一飯兩分可飽二人此清之心也明年夏秋清得以例歸省便當過蕭山一哭吾兄而弔吾嫂與孤姪并舉兄之遺骨以偕南清且有父有母有子當不令兄之後事失所矣或者剝後見復我祖一脈又將由是而復昌也嗚呼客燈之下淚與筆俱我此微身半自王氏茍無王氏安有我母茍無我母又安有我今王氏衰落至此我其不思為王氏一籌哉兄如有知宜悉此情而勿憂後事也尚饗代莊某祭翁義民嗚呼無好人三字信非所冝道矣然世變既降好人固不可多得爾嗟惟翁公六行悉備內無間言外無異議求之今人誠鮮公比謂之義民真義民矣天胡不信六帙而上嗚呼自公之喪我痛弗置父子受知實銘肝肺一隔冥途再期何地無以報公惟有清涕嗚呼如此好人世復能幾尚饗墓志銘欽進亞中大夫雲南按察司副使致仕雲室先生林公墓志銘吾雲室先生以雲南按察司副使致仕家居八年卒卒之明年子文中等將奉柩葬于某縣某山之原先期遣人以書狀授清於江右官所而屬之志清先生門人也始自丱角以臨江周虛白先生教命得登先生之門而受業焉抵今蓋三十有餘年矣念先生之所以教育而造就我者自始至終恩同罔極而疾不得侍斂不得親今其葬也又不能如古人之負土以成其役東望揮涕此情何如則於是志之屬也其將何辭惟是荒落負教之甚今且駸駸晚暮矣於分內實事曽無一毫成立是豈足以知吾先生者勉強執筆亦僅能得粗迹而已先生諱某字廷珍姓林氏世家福州之候官以所居之鄉名雲程别號雲室山人而學者稱為雲室先生云高祖比元時為某衙門鎮撫紅巾之亂抗敵而死舉家就戮遺曾祖陽文身避獲全生祖某煢煢自立故居在城西關至是始遷雲程考秀號質齋性厚朴而心向道禮延名師以教子姪不計資力故先生兄弟七人先生既以魁天下為顯官曰瑭亦登進士第為御史提學南畿曰玠與姪某俱鄉貢進士第孫文瓚亦繼登第他子姪負經術有名士林者又數十人一門之盛有由然也妣周氏稱合德焉七子皆其所生而先生為之長自幼穎敏出羣而沉篤嗜學夜讀率至夜分又能以身體之以心驗之最得聖賢意趣其紬繹遺言襯貼之義以開發學者則清平日所見知少有其似者也自閩中及兩京以至浙江之士及門受業者殆不可數計而領薦登第位列中外者常不乏人其始薦於鄉也以景泰癸酉年才十有九至天順丁丑會試不第入太學癸未會闈災移試八月揭榜居第三為易經魁甲申三月殿試賜同進士出身觀政戶部是年秋以疾乞恩歸治時方具慶先生侍奉不稍離天倫之樂蓋優優乎其自足而無所慕於外也四方來學者此時尤衆里舍至不能容今閩中易學獨盛於東南視他經倍蓰焉蓋先生倡明之功居多也成化甲午大比江西聘主文衡辭不赴以進士侍親家居十有七年既終大事辛丑乃至京除南京刑部山西司主事先生律己素嚴其讞獄明恕而有執司寇金陵張公亟稱之且語人曰如吾林主事學行要當居春坊職輔導乃稱耳乙巳考三年滿勑加承德郎贈考如其官妣及正室薛氏為安人繼室朱氏封安人丙午升本部某司署員外郎丁未升浙江按察司僉事奉勑提督銀場𢎞治庚戌景寧賊吳大兒嘯聚千餘徒恣摽掠傍及福建政和浦城諸縣兩省患之勑浙江鎮巡等官勦捕諸公以事屬先生先生發諸屬縣兵快先分據要害以防其奔逸乃以精鋭千二百人進臨其穴賊出拒破之賊棄穴橫奔至福建松溪之渠口據高險隘我衆難之先生曰賊勢已蹙前途皆非道我嚴其令攻之必克一鼓遂獲其渠魁戮數百人餘走慶元及從間道竄景寧先生復節制諸巡捕官就取之戮死外又獲三百餘人支黨散匿山谷官屬請乘殱之先生曰彼無能為也恐濫及無辜亟出告示令早出降兩省以安時又有遂昌黃巖賊某聚衆且至萬各伏所穴未發將觀變而動其勢叵測至是聞景寧賊破膽寒先生又豫為形勢以擬之諸賊遂自解散去鎮守張公喜曰兹所謂不戰而屈人兵者矣巡按御史陳公金上其考語於臺部云文有名而士類咸服武有備而賊徒知懼者此也辛亥升雲南按察副使蓋僉事甫三年得升者數十年僅三五見亦殊恩也在雲南風操愈勵威惠益振其地民夷雜處官府政多仍其俗未免茍簡或有所改張尤恐動衆心先生獨曰此地既入華即當以華治奈何猶以夷待之乃多别名分重禮教又創分司以便官督造永安橋數十間以便民劾都司之冒功升賞者數十人皆謫戍窮邊他所施為多類是衆咸安之政俗有改觀者矣在浙江嘗監己酉鄉試在雲南連監壬子乙卯戊午鄉試所取士咸稱得人試録諸文多出其手筆蓋先生非惟文學素優其行誼政治亦自過人故所至上下翕然歸重之巡撫雲南都御史張公誥巡按御史張公泰金公獻民余公本實清戎御史徐公紀交章論薦衆方以大用期之而先生以年及懇疏乞休時己未之春也初冡宰三原王公守備南京得先生名於張司冦公而心識之故在吏部日先生得以三年僉事舉升副使及王公去位而當路無深知先生者故先生名位事業僅止是先生既歸休日杜門教子孫讀書足迹不及公門乙丑今天子即位推恩臣下進階亞中大夫先生善理家人人各有分業不得自暇逸常切切告戒使循理安分不得席勢凌物故子弟人人能勤約隱忍無一毫浮艷氣習嘗試以他宦門子姓較視之多覺别是一種風味矣先生遇士大夫禮度甚謹而一出於誠其待姻族恩意切至不以貧富貴賤而差異與鄉人處善薰之以和於有過者尤能以宇量包容之故卒之日自有位以及鄉士庶稍相知識者無不痛惜而奔赴焉壽七十三男四長文明薛出次文中朱出文英文昻側室王氏出女七淑適陳浚皓適劉模洪適陳汶淵適許繹濟適張次澄源未行孫男四璽縣學生次璺坤某皆文中子某則嗣文明者也孫女二模適楊鏐梓幼會孫女一先生生於宣德甲寅十月十一日卒於正德丙寅十一月十六日葬以丁卯某月某日清惟昔人嘗有承其師之子屬表其師之墓者自謂始不敢辭而又不敢不辭卒之不敢終辭焉若清今日之情殆有倣佛於此者故略次所見聞用塞來屬計恩門內外尚當有知吾先生深者别有所録以盡吾先生德業之詳而蓋不肖清之負焉耳其銘曰峩峩雲室雲山是宅清源一派流注洋溢欽德者所居成聚是惟居間之績施於有政彌漙其澤既文且武厥聲載赫豈伊腐者用之斯劇進難於先遲遲草年退勇於後了無所牽始終大節視履其旋嗟嗟雲室有學有德有為有識實我人之則不肖門生懷慚當筆尚俟來者揚幽不極晉江縣知縣吳公墓志銘居上不寬吾何以觀之哉此吾夫子為萬世為人上者立言也而周公亦曰平易近民民必歸之嗟乎二聖人者以其規天條地之規模過化存神之運用其論治豈不能為高世異俗之談以聳動天下後世者而乃一則曰寬一則曰平易若固為卑之之論何哉二聖人者殆亦慮之熟矣蓋凡職子民者本所以撫摩而乳哺之必不得已然後威加焉非專以督責為事也彼專事督責之治者民惟見威而不見德其法令精神雖若可快一時而國家之元氣則有潛虧暗削於可快之中而有不及覺者矣嗚呼此清於吾縣尹吳公之卒所以不能不為吾民惜也公狀貌雄偉望之若不可迫視而性度夷曠即之溫然豈弟君子也作縣三年清以所見及所聞考之大抵居之以寬行之以平易要在有實惠於民而不為一切之政以徼名希世者故久而民益戴之卒之日民無老少逺近咸咨嗟痛悼以為天之不相我民也嗚呼惜哉使世之為天子吏牧小民者皆公其人黎民尚亦有利哉而公之不壽不得以終其惠於吾民則天也謂之何哉公諱雲字民望世家松江之華亭祖軫冨平縣丞父禮義官母丁氏公生十三年而入邑庠又十五年而入太學在太學十六年而官在官三年而卒卒之日成化壬寅二月某日也距所生正統丙辰正月某日享年四十有七娶俞氏先卒子男三長縉次紳次纓女二長適謝奎次適楊纘皆俞出也繼娶王氏公之病革也與母及家人訣曰吾二親俱垂白在堂且無他昆弟即入地目不瞑矣為吾妻孥者念哉嗚呼良可哀夫縉將奉公柩歸葬先期詣清泣請文以賁諸幽清非知文者然雅愛公之寬大平易有出於一時諸君子故不辭而輒詳於寬大平易之説非惟以彰公之善亦因以告夫世之凡有子民者之責耳銘云樂只君子其心孔仁而惠弗克終於民孝弗克終於親雖然其弗終者在天而其弗可忘者在人留夫人黃氏墓志銘夫人黃氏今南雄通判留君汝礪之妻也隨君之官卒于官其子志淑方以春闈中選在京師聞訃輟廷試事奔南雄將扶柩歸葬而通守君已先歸其柩於家志淑既抵家則奉通守君命以請于大父處士茂明擇地晉江三十二都之文昌山卜某年某月某日葬而請志於豫志淑之言曰吾母性穎悟通物理人情而敦厚有器度雖不多讀書其所為之符合於古義者常多也事吾大父母及吾父二十年孝敬勤愼如一日於吾兄弟固所甚愛而教督之尤嚴志淑始得舉戒之曰爾毋遽以此一得自幸男子分內所當為者計尚未能萬一也此吾母性識大略也乂曰吾母諱某有元南安達魯花赤某公之幾世孫父曰曲江尹某公母曰孺人楊氏年二十歸我留氏生子五人長即志淑次志及志宏志業志憲殤孫男一曰宜讓又曰吾母生於天順辛巳正月十五日卒於𢎞治辛酉十月初七日年僅四十天乎何其與年之促而不令少得享不肖子之養也惟先生素教愛志淑者其尚哀而為之銘乎銘曰問夫人之所生南安黃氏接武簪纓問夫人之所適晉江留氏將相餘澤夫君伊何别駕南垂聲名有輝厥子伊何丱弱高第書香繼繼惟夫人之得於天兮亦豈云薄惟夫人之遺其子兮風樹為虐噫理數有窮親年有終慨吾徒之炯炯兮追所願之無從惟賢母之遠志兮子奉以躬銘莫此固兮以畀爾封坦夷居士林公墓志銘陳江林珤及弟寧國府推官珹將葬其父坦夷居士公于本邑二十八都之象山先期狀公行屬清為之銘珤與珹皆清所素知而公之疇昔又人所共知者故雖不知文而不容辭也公諱昱字曦明世居陳江之塢高祖諱天福公因號江塢隱翁有風操鄉人重之曾祖宗敬祖伯亨父仕齊皆不仕母吳氏公有兄而殤且無弟甫弱冠即能苦志立身以支撑門戶父母安其孝焉性仁厚而果於義姻族多能之二姊一蚤世一蚤喪所天公維持其家撫諸甥而長之立之有人所難者與人交淡而信終始如一日恭而有禮暴慢者處之夷然或數見侵侮而後以理直之卒皆愧屈無詞平居恂恂若無所區别至其臨事則矩度整如也軒几有微塵必命掃除之曰人之治心亦冨如是耳喜植花卉庭除間朝夕玩賞之其治園圃界限分明而脈絡貫通若得經界遺意者時或杖屨其間清風霽色昻首伸眉蕭然有出世外之趣年六十郡守李公哲張公濂二守羅公憓陳公旦皆知公名值鄉飲酒禮則前期具啓遣生員詣門請置焉啓詞稱公立心坦夷制行誠確公曰誠確未易也坦夷則吾其庶乎因摘坦夷二字自號𢎞治庚申六月初九日考終于正寢去所生正統丁巳九月二十五日享年六十有四娶蔡氏子三珤其長次曰繼卒珹其季也由丙辰進士出身女一適侯林吳輪孫男四良猷良材良器良儒孫女四葬用壬戌之十二月二十八日其地背乾面巽云銘曰吾泉諸姓莫盛於林林莫盛於陳江之一鄉維江塢公稱林之良厥世繩繩坦夷有光自身而家而鄉所履咸率厥常天錫之逸春意洋洋心塵是拂益使我愧悚而倣徨上下向風德音載揚有子克家或耀其章分帝之符將履周行其在陳江實破天荒嗚呼兹因坦夷公積德之報兮抑亦可以占江塢公餘慶之未央義民簡齋顧公墓志銘先君嘗與鄉之名勝通政使張公及簡齋顧公輩凡十有四人約為逸樂會時相與登高晀逺賞花玩月以相娛也適清得恩歸養諸公屬先君命清為記先君命記時有感於杜子美明年此會知誰健之句而諷焉時清雖為之戚然猶未意其言之必符也逮記成不數月而先君奄爾棄養又未幾而某齋陳公某齋翁公某齋包公洎顧公相繼謝世者至七人於是信人生之如寄聚會之無常而先君當日所舉子美之言今日適為荼毒腸腑之味矣顧公卒於𢎞治癸亥正月二日享年六十有五其生於正統己未十一月八日諱美字孟璽其為人明白坦夷意氣清曠頎然長者也平生無分外干取而才具俱優自其先世以資産償逋負于官而家已落至公能觀時燭物伸縮以樹有家而家始復振且重義輕利親故之匱乏者周之貸而不能償者毁其劵𢎞治癸丑山東飢公奉詔入粟賑飢得賜冠帶稱義民焉𢎞治己未公甲子適一周嘆曰凡人願望不可過逺禮六十而歲制今其時矣况吾仲子已幸科名而季子亦頗間家務吾何日擾擾為乃豫治諸送終具而委家於子惟與逸樂會諸公相從遊焉至癸亥而卒嗚呼其可謂知義命之士哉其先莆田人宋崇寧中有諱建中者由國史院編修官出判泉州因家泉城而籍晉江曾大父諱敬大父諱長祖父諱鸞母某氏娶魏氏子凡四長曰珊早世次珀由進士知虹縣又次瓚次㻾孫五原清原淑原淳原瀞原洌珊兹卜以乙丑某月某日葬公某縣某都某里之某山而珀述事狀以屬清銘嗚呼先友之喪通家之事也某何敢終以鄙陋辭銘曰嗟吾簡齋兮瑩乎其中曠乎其外雖不自異於俗而中有不俗者在惟德不孤名勝為徒惟善有後冠裳之秀所就未涯推恩有階小子志之有俟將來吉水縣丞韋君墓志銘韋君諱廷輔字尚輔廣西潯州府平南縣勞莫里人仕為江西吉安府之吉水縣縣丞致仕别號水竹居士君之在吉水也績用甚著江西盜羅顓侃號滿天星嘗破一縣賊良民無算且善妖幻其衆雲聚鳥散逋誅數載巡撫檄君偕諸督捕官理之君獨獲其嫂廉其蹤戮之於同江以報縣有陂塘通于江溉田千頃值水潦江漲隄輒決君承藩檄修之越舊隄外數尺深植木樁內蔽以板板內纍茅土合舊隄增築之既又治水閘視時旱潦而啓閉其流民至今食其利嘗出傍郡按事縣忽大水漂民居數千民號舟以濟舟人乘時邀厚利貧者莫得濟而君家人亦蒼惶借栖民樓水不及樓板者寸許值君終事歸嚴督漁舟五百餘分濟之先民而後及家人曰民在水吾家人固在樓也君之治行如此類甚多上官甚倚用之每遇部內事重且難者多以屬君巡按御史張公某分巡僉事羅公九鼎分守參政張公琳相繼請旌於朝而巡撫僉都御史閔公某又遣官自公所以旗鼓導送歸館勞以羊酒且親題其彩旗云萬民競覩無雙士九邑咸推第一官九邑者吉安屬邑有九也衆方謂其擢用有期而君以勞瘁得微疾乞休于當道者皆勉留不許乃遣其弟走疏於朝得致仕時年五十六也君少穎敏重厚其學務實行一言一動皆不妄孝友篤至遇姻族故舊厚從弟言姪表皆少失怙恃君實撫育之既長各授室焉族人多貧者曰用曰柱輩皆無以為家君曰吾固有餘也忍坐視其不足乎割己田以分給之臨事必辨别是非不肯雷同義所不可辭避引去茍所當為慷慨直前不計難易平南經冦亂多間田逺近流徙及逋逃者據耕之既不輸賦又恣暴良民且僭亂識者憂之君為太學生獨上疏陳其利害請改武靖州治于其地事下兵部及巡撫等官議卒從之自是民有所庇又益戶口若干而積年無徵之賦亦有所歸遂為鄉邦百世利蓋君之表表者固無待於既登仕之日而後見也其先世譜莫考國初有諱五嗣者始自慶逺府之宜山縣而遷平南祖諱以明父諱辨任廣東廣州府經厯母陳氏生子三長邦憲府學生次邦相鄉進士次邦吉女四長適馮名世次適梁國用次適李鵬三壻皆縣學生次未行孫男三應韶應龍應鳳君生於宣德乙卯五月十九日卒於𢎞治己未十月二十一日享年六十有五邦憲卜以年月日奉葬于某山之某以書馳訃邦相嘗從豫遊君之行豫固已得其槩矣及閲邦相所狀詞多托實益信君之為表表也乃節其詞為序而糸之以銘云峩峩在位有公有卿聲華振動誰齒縣丞縣丞乃克有所樹公卿或無得而稱置位較德孰辱孰榮我觀韋君有仁有義有禮有智一丞效官賢名在世使天少豐其位黎民尚亦有利嗚呼窮之所養達之所施計君治行之懿固已占於家食之時士不厚其養而欲功業見於世者云胡不思嗚呼知德者宜毋以其官之小而小之王訥庵處士墓志銘往時清講業于雲室林先生之門值􅔂作荷先生罔極之恩百方圖全之又屬同舍生王君泰視護疾以獲瘳故清與君交誼最篤嘗登拜其尊甫處士訥菴公見其古貌龎然古心泊然家事田圃而室中有書滿兒談論間往往及之清以是知公之賢而時方有行不得久留侍又三年再謁雲室因過訥庵而公卒矣哭弔而返越二月泰以書致其兄惠所狀行實來徴銘以葬且曰吾父備嘗辛苦以有諸孤而不肖碌碌持敝帚欲售人以千金而未得竟使吾父泯焉淪喪悲夫生無以為養死無以為喪惟君子其畀之銘嗚呼公善人也是固當銘不銘何以伸吾情且何以塞吾友之悲按狀公為人孝友而慈親在時出而課耕入而問膳日孜孜焉親沒而喪祭必問禮弟叔義屢空輒分所有周之嘗諭家人云范文正公義均九族况吾親昆弟耶吾力雖非范比尺布斗粟猶可及吾弟也鄭氏女兄無子不得於其夫氏公迎歸以養終身不見忤已沒而禮葬之族孫宥孤且窮寄食于治家公聞之曰彼雖屬疏自吾祖宗視之則皆子孫也亟反之且為之婚而籌其所以衣食焉凡此皆公之大節章章於人之耳目者也嗚呼公之大者如此其他清雖未及悉也信其為善人矣而况昔者一嘗及公之丰采已乎公諱隱字叔仁世為閩縣之永福里人曾祖拾父完母梁氏娶蕭氏生男三長某早卒次惠次泰女某適陳某繼娶余氏生女某未行公生於永樂庚子十一月十五日卒於成化某年七月十三日其葬卜以壬寅年某月某日其窆則樟林山之原背丁面癸銘曰吁嗟公兮螺江之濱芒鞋布衣清世一民然孔懷其義孝慈其仁能不喪其真書香有繼寒谷自春噫視彼之烜烜赫赫而一行無足録者一日蓋棺萬迹俱塵所得竟孰屈而孰伸吁嗟公兮我思古人凃室戴氏墓志銘笋江凃處士賢賓將葬其室戴氏于南安三十二都之􅀈埔山令其姪郡學生經以狀徴豫銘按狀戴氏諱儘娘大父某父某世為南安詩溪巨族少有淑行年十八歸于凃事姑余氏孝姑有疾旦夜侍左右奉湯藥久而不懈處士弟賢俊始尚幼衣服飲食類出戴氏供具無少後時者處士與其弟篤相友愛一錢尺帛不以歸私帑戴氏能終始順承其意處妯娌和翕然無間言故其家庭雍睦至于今不分異而處士亦以此受旌於有司矣無子一女嫁南安歐陽冬初嘗力贊處士置側室亦無子後有抱養子出陳氏甚愛之既冠且婚矣晚乃與處士議以為竟非我族恐負祖宗地下即厚遣之歸其宗而立其次姪為後嗟夫家人離必起於婦人戴氏始孝於姑勤於其叔氏此猶人所可能至於相成夫子之美終其身兄弟相好不分異此則未易能也况婦人之仁多失之小不忍戴氏取陳氏子於孩提襁褓之中而子育成就之又無他乃一旦覺前之為非是毅然贊其夫使别而正之不以淆夫氏宗祀此則又若非婦人之智所及者豫少時嘗聞經之母家萬石劉氏謂凃氏伯父母鍾愛其姪若己子逈與庸俗情不類吾母尤喜談之最後寓開元寺讀書適與經同館見其伯父時時從童僕攜薪米蔬果來視之使內非其人則此事容有掣其肘者矣以豫昔所聞所見證之經今日所狀戴氏之賢殆不為誣是故樂為之書也某生於永樂癸卯十二月初三日卒於成化辛丑年十一月十七日葬以己巳十二月初八日其墓背丙面壬虛右為處士壽藏也銘曰夫以善名是維其內輔之貞嗣以姪繼是亦其協正之義嗚呼雖不讀書行則幾矣吾以是知豆箕所刺雖丈夫為不識友字滅鄫以莒者雖丈夫為不識仁字而在女婦又不必皆如曹大家李易安者然後足為知書耳傳陳節婦傳孫燉附陳節婦福州閩縣南臺人福城張某女也年二十六其夫某死官事家且落煢煢無助矢志獨立一子慈時在娠甫兩月既就乳以育以教長為娶婦生孫二曰燉曰燁一節自老八十一而終未及葬燉繼亡嗚呼燉可念也燉思光祖母之德而猶未能也哀哉其父子世味清苦既無以終其祖母之喪又無以為自終之具垂絶獨懇懇囑其友王泰求清為傳其祖母以遺其後人顧居相逺燉又舉於顚沛末由得其節之詳而備書之僅得其槩如此哀哉燉之志可念也清質燉為人於其友益使人追向之不能忘嗚呼豈獨其祖母可傳哉燉字文眀敏而慤於學也專深於理味發之言尤雄贍剴切與清俱雲室先生門人獨遊不同時耳逮後一見即情親如故吾先生素愛燉常館之家孰以子姪託之同門諸友及凡與交遊者皆信重之無間其祖母殁以父有疾翌力成禮悲哀倍常其卒以此傷生乎年才三十五無子哀哉燉不死其將有立於時乎燉之死也同郡友車文昌李濬曾樞蕭寧葉性何圭袁升邱琚及泰諸人以義相倡為理其喪并舉其祖母喪共葬且為築生壙三二以待其父母一待其妻蔡氏庸以蓋其遺恨於冥冥也嗚呼卧病呻吟之中覽泰所為求傳事意愴惻傷泣為感數端顧碌碌何足任吾文明之意哉聊以寄吾哀耳泰之為求傳也盛夏涉三百八十里而來值清疾間愈復作負之久矣靜庵先生傳靜庵先生姓林氏諱玠字廷圭福州府候官縣雲程里人吾雲室先生之弟也少穎敏出倫類讀書一過目輒記其大半為文章下筆立就而天性孝友慷慨又有大局量深得雲室先生家法天順壬午年二十領鄉薦至乙酉弟瑭廷玉亦領薦相與北赴會試至鵝湖驛得疾廷玉亟扶以歸甫及門而卒其魂鬱不散家人每接之夢寐有時倣佛聞其聲迹所設靈兒間器物或自動家人乃如待紫姑神法置箕布灰于兒箕輒自舉遂令人扶之箕之運衮衮不休就視之則皆詩文也其别父母詩有云如今我已終天别何計能酬寸草心别兄弟云鴻鴈層雲憐隻影池塘芳草憶殘春又曰本期接武青雲路誰料身先入九泉别妻云寄言與爾無他故節義氷霜不可虛别兒云幸吾尚有連枝樹道孤根無所終於是親戚朋友聞者或相與詣几前訪之亦皆有詩與敘别其别苑時清云最羡君家總俊英奈愚不幸棄雲程其别王秉中云黃卷悠悠誰切琢平生空負一經綸又為牟勤夫賦書樓極目云清風搖動硯池雲飛鴻點破江山影又自賦書暇觀蓮云呼童泛美酒對此紅芳傾又曰若人已先去此花空自馨又父母將祭先祖則豫為作祭文逺方朋友來告别則為作送别序以贈之諸體凡七十餘首家人次以成編則又自名之曰靜庵遺玉而自序之有曰玉之體雖藏於山而其德自弗泯焉蓋以自况也初箕動成文之時親友臨者無不毛髮竦竪久之則與答問如平生矣趙余二友至與聯句焉如是者蓋餘一年然後其魂始反而歸耳嗚呼異哉先生之死而不死也自有載籍以來凡哲士文章之傳世者皆著自生前而垂之身後未有其身既死而其魂歸與生者相響答如此之異者也豈非先生之所稟與其所養獨有不類於常人者卒得暴疾弗遇良醫死於所不當死故身雖死而魂不與之俱耶抑自古之身死而魂不散如伯有之類亦多矣然往往皆癘屬如先生者非彛倫不親非法語不道蓋始終一正道生死一文儒也古人以女子既嫁而孝不衰於父母為賢若夫既死而猶戀戀於孝友之恩斯文之愛者則始於先生見之且幽魂滯魂自古有之槩皆不能免於怨懟如先生者雖亦以早世自悼然其所自悼實衆人之所共悼者也其可以怨懟目之邪其言蓋合於詩之怨而不怒者斯亦可以占其德矣自名曰遺玉其有以哉向使先生得永其年以大其所就設不偶而當變故之衝其能如古人之處生死而不亂為癘鬼以殺賊也可期矣而乃以弱冠之年舉子之身遽喪其身而殞其志是吾閩失一傑士國家失一俊才不但林氏一門失一賢子之為可悼而已也得命僅二十有五父某齋先生封南京刑部主事母某氏封安人兄弟三人雲室先生其長也以雲南按察司副使致仕廷玉後任御史奉勑提督南畿學校卒配某氏果能不虛氷霜之戒云子二長文祿敦詩禮而克家次文纘領𢎞治乙卯鄉薦孤根有托亦先生所已知者矣先生以成化丙戌年卒清以庚寅年始得遊雲室先生之門頗聞先生遺事而未能詳間者文祿兄弟出示遺玉編而泣因屬言以記其事清故得詳焉蓋程子所謂别是一箇道理者釋氏謂地水先散而火風尚遲者正不謂無理是雖怪而不怪也清今傳之殆不終於語怪也况在文祿兄弟之情其不容已於不傳乎高祖為人大略公性沉靜好讀書有高行又精地理之學其手澤猶存桃山之藏實公所自卜山勢大金蓋小金青龍三顧白虎四衛墳前印浮水面乃島嶼也水外羣山垣護天清日朗時厯數之得百餘峯焉地家以為出泉城東諸墳鮮有其比此非所宜瑣瑣以公所自卜地故及之先祖嘗言當時造墓規制并歲月日辰之類亦皆公病中所自裁墓銘吳靖司訓所撰惜不能詳公之平生故都憲朱公鑑公友也嘗語清云吾及識乃高祖世安公實一時善士也若翁貌頗類之清後登金粟洞中别室有祀像一位神牌曰檀越主純齋處士蔡公其貌果與家君類蓋公畫像大小二軸藏於長房者已燬于火清以是召工就洞祠傳其像以歸公晚歲委家於子遊神物外窮年山居不復問世事去城市貿遷至窮年絶葷膻進士周太初挽詩所謂處士素樂善晚年長蔬食大兒能克家小兒鄉進士者也洞在郡城西南紫帽山之巔自山麓至洞約十里許公於諸山多所遊寓而居此山獨久道流相傳公用己銀若干兩造屋若干間以與道流居故道流祀之至今云贊陳府尊贊清自成童讀公文而慕公又十年乃得登公堂而拜公今公殁且十有八年矣仲子漳以遺像屬贊贊曰十八載之前公貌澤然我心懌然十八載之後遺像恍然我心愴然嗚呼公有韋布之行履有錦繡之心胸及進而握皇家之憲度則凛乎有鐵石肝腸之風至其黜而令也擢而守也則又惠澤之沛乎其廣被而宇量之恢乎其有容若夫勇退於未衰之年高卧於田里之間桑榆景霽風月晴間斯又其風節之高挺然於歲寒之天者也嗚呼公斷斷兮其德孔多我思公兮閩山峩峩童廷式贊少而思奮老而益堅胸有杜氏之庫手弄堯夫之丸其志之所期直欲經邦而濟世其神之所適往往入地而升天奈之何光久韜於壯日穎方脫於耆年雖然使有能越常資以待度外之士則馬伏波之矍鑠功名成者其庶幾焉高孝子先生像贊簪纓文獻之家規矩凖繩之士眼前有景明月清風三百篇胸次無涯往古來今十九史善名早著於鄉邦孝行晚旌於天子今年七十又八矣而猶黎明深衣夜深細字蓋一味乎道腴殆忘情於勢利夫如是而終老於布韋兮豈不猶賢於世之心蒿萊而身朱紫者歟林母贊吾聞林氏有賢母焉實繼母也夫繼母之以賢聞者天下鮮矣其子啓迪請豫為之贊嗚呼閔子單衣薛包分異伯奇履霜於中野王祥失愛於朱氏繼母之為家病也古今蓋莫可勝計猗嗟林母其貌吾未及一識其行吾不能周知而悉紀但見里鄰多嘆其慈惠姻戚咸稱其德義謂母之遇子也厚而真謂子之事母也誠而至母今皤然兒亦暮矣藹天倫之無間諒感孚之常理繄是家風端可勵世吾為之贊非贊之體陳處士贊因公之子見公之真魁梧蕭散恍乎神人吾以是卜其平生自非卓犖不羣之士殆亦葛天無懷之民黃樂易先生贊望之肅肅即之雍雍其志剛果其氣舂容能遊心乎紫陌黃塵之外能納物于春風和氣之中能四十餘里不一侵於孩童能七十餘年不一罹於刑憲嗚呼樂易哉是翁樂易哉是翁郭司訓蘭谷先生贊平心如砥直氣如矢行重三族才優多士閉戶徒勤孫敬之功題柱莫酬相如之志白首青氊吾事已矣嗚呼世或口蜜腹劍而位公孤或玉表石中而身朱紫公豈宜然抑亦命耳嗟夫問之輿人孰為君子虛齋集卷五
