body:
  text: 虚齋集巻一明蔡清撰詩自嘆五十雖未老巳知非少年欲將心事道秪恐付空言題扇風本造化權却從手中得因思天下事也須著人力見武夷二首日日問山水今日見武夷㸃頭一段意山靈知不知泰山孔子登武夷朱子寓吾想萬山靈亦羨二山遇别鄒汝愚謫雷州某所吏目五首識君未三月别君遽萬里自疑非丈夫淚落不能止識君未三月别君遽萬里終不為君恨天地有正氣識君未三月别君遽萬里應思生才難莫負乾坤意此行比遊學十年觀造詣炎荒無友生神交李伯紀慷慨出門去黙與千秋期飽喫恵州飯少和淵明詩我觀古丈夫揮手構寰區節士非得已矧彼章句儒六籍垂世意豈為崇簡書心丹宜細煉為邦者如愚哀鄒汝愚六首天地元無情汝愚信死矣舉世嗤笑之吾獨不如爾汝愚信死矣展轉淚沾襟一死未光明為君恨轉深年少心更赤竟以死遐荒英魂飄何許願返托班行思君真益友過我擬十籌思君不可作緘恨付春秋君昔抗疏日計亦念至死正氣由乾坤有懐莫能止有懐莫能止一死亦吾事君氣盖一世君窮直至骨身死無所歸妻孥無黔突遥遥萬里道老父訝喪紼生子願聪明為君長壹鬱送黄邦瑞還廣抱病日㷀㷀君今又逺行斯文諒有味分手能無情栁色纔沾白稍頭又轉青百年真轉轂何以慰平生第一山和胡太守一登第一山自覺衆山小日起海門騰雲連邊樹杳物情隨運遷元化無時了一事類登山懐哉愧不少月夜雲谷室聮句今夕復何夕青燈共片心聮詩乗酒興弄月傍花陰清趣伴光景閒談斷古今萬年不盡意要在自家尋福州寄同志去家十五日始入福唐州宦心未汲汲鄉思奈悠悠行亦諉雙老用何能一籌途中每自問揩目看春秋白鹿洞書院武侯靖節祠二首洞中那得卧龍蹤因石興思盖世公當日何人撑國事洞中正爾卧真龍靖節當年更隠憂欲為諸葛勢難籌眼中風物皆非舊惟有黄花共晩秋尹太守遺愛祠二首山自蒼蒼水自深賢侯遺愛可勝吟至今一箇祠前月猶照當年撫字心饒他槖裏有千金難買邱民一㸃心今日泉山一片石千年永作牧民箴題何子完孝感詩昊天罔極更何言此事惟堪心自憐滿巻新詩傳盛事孝心當日豈其然月梅冬裏有春一味清不因風雪不知名問渠知己有誰在月在天心人在庭四一迂士巻造物無言露却真采真多是看花人傍花隨栁前川樂數百年来幾問津送唐給事兩廣盤糧三首使君自説未更事足認使君自老成年来頗訝當途客欲將矯拂輔昇平錢穀元非吾分外握筭亦能助太平學術多君非口耳此行認取舊書生感君遇我特從容愧我踈庸百未通宇宙之間大有事煩君細問白沙翁題鄭驛丞髙岡九老圖二首九老髙岡恣勝遊西来匹馬正追求我今亦奉吾親去紫㡌山頭境最幽紫㡌吾泉名山也擾擾塵途二十秋歸心今巳托東流披圖喜見林間叟極目雲山興不收題畫舟中昻首者閑棹扁舟出釣磯涼風掀動數莖髭江天一覽清如許誰解昻頭不語時建溪戀竹十月二十七日舟過建溪溪滸有竹數枝獨秀出其倫類且近映溪流天光涵之上下玲瓏其景妙甚為之停舟注玩不能去者久之舟中有王氏子自言能畫因令圖其像共載焉詩以詠之一見此君便有情況臨浮碧涵虚清行邊不忍抛君去敬寫君真作伴行飛鶴窺汀一道風雲次第經低徊有意在沙汀丁寧莫為緘鱗計且看滄浪清不清遣興舉天地間一正氣誰能收之腔子裏饒他身外無餘物可受用的滿天地讀書評寄鄭仲平昨夜得一讀書訣因風寄與吾人説此身跨在雲霄上俯照人間了毫末又作文評最愛前人一語真豪華落盡見真淳我今特與梅花約桃李相逢各認春題周世祥員外又是一别巻丈夫出處亦何意遇流則行坎則止都門纔喜接春風而今又是一别矣哀天台黄亞卿二首我入銓曹詢故事心香一瓣屬天台只今柱石廟堂者多自當年推轂来十年自占優閑地一札傳来歸夜臺不惜官階未極品胷中生意尚無涯輓温方伯一日盖棺萬迹陳百年何事只憂貧輸公勘破人間事獨執一清見古人戲友人作墨鶴天下皆知鶴質白怪君何意墨其身應嫌皦皦者易汙直將此意悟時人更願無心待品物形形色色任天真登清源次馬太守韻行行行上北山巔始信人間别有天紅日當頭真可捧白雲著袖似相牽細思田土千般物何似清源一滴泉我欲便為栖隠計壯心未忍負青年同黄石二生遊獅子巖和陳少參韻一上獅峯四望低恍然身躡九霄梯風雲何意俱来㑹蟲鳥無心自在啼靜對乾坤疑有話追思先哲愧留題攜朋更向清源去去路相將莫遣迷寄張廷實四首夜窻諭蟲有引在京六月初二夜青燈獨對紙窻外有蟲欵扣欲入者久之頗悶其徒勞而不得其門也然茍納之則彼決然赴死地矣不忍也口號以諭遣之云爾蟲勿愴忙是乃燈灼光迷途殆爾福得路將自殃去去效尺蠖朝来朝太陽答林待用江湖念亦在京每見江湖靣便生霄漢心此心固未穏有病莫能任豈惟吾身病心亦久清陰未須論世事歸去亦自鍼因見江湖靣轉得天地心天地心如何𤣥黙行古今大徳自敦化川流本靜深百年等旦暮浮雲浪自歆胷中無活水安得商家霖又和滕古甫見寄平居喜誦古人句男子要為天下竒却愧年来三十四正是濓溪作縣時興動時亦嘗試吟一二詩第清於此段工夫甚缺因詩伯扣及以請教耳詩雖不足言然區區心事亦畧見於此昨承出處之問即是為復矣題盛用陽師省巻我覽師省字惕然中不寧悠悠老將至省身愧未能惟昔有曾氏三省日有恆惟今有盛氏乃能上師曾師曾固非難師曾亦豈易省身勿泥三隨地安着己柔者思不隨剛者思不厲操術必求精濟人不謀利如此類推之一息不容己此心貫萬端疑即一貫地人品夫何常希曾亦曾矣小子嗟後時羨君早立志從今創脚跟行逺必自邇同年㑹愛我同年㑹㑹中皆俊英入同奉天殿出或各専城譬如一家子腑肺親弟兄或内而侍養或外以經營戮力家事理所冀家和寧丈夫始讀書便擬掇科名及其既登名豈徒娯一生髙科一時事千載有汗青富貴無所樹風花不百齡端居時獨念宇宙事非輕皇天生我曹豈我私聰明民胞并物與此責在書生昔年窻下業一一皆典刑少者忌謀躁老者戒宦成願言各自愛年弟復年兄題雲谷室山矗矗水簇簇白雲一片卧空谷卧空谷兮渾無心乗風起兮應為霖秋江送别我愛秋江水一清清徹底清波靜涵萬古心清流一瀉直千里君今從此發脩程我聊贈此淡中味和張大尹登最髙峯每句上四字皆張詩身在翠微兮我意登泰山之仲尼眼空溟渤兮而亦收其吞天之勢以助吾胷中之竒足躡青雲兮遂揮長風而直上手扶紅日兮光光明明於宇宙間是曰男兒題商山四皓圖鄒魯儒生落秦火諸公正在山中卧咸陽宫殿三月紅諸公洞裏自春風馬上英雄饒善罵罵聲不到商山下獨憐帝子意来䖍一至漢廷力回天君不見李斯韓彭皆葅醢秦皇漢帝亦安在當年商山四老翁至今人間往往想丰采洛江行送業師我有先生學行獨不羣籍籍聲華動八閩我竊緒餘尚一薦嗟吾先生兮始自貢途充國賔先生不見伊吕當年無科第自有功名萬古新困龍若際風雲便方潭勺水可騰身雖然先生早了環中趣否泰由来都是春此行如遇成都卜只問忠與孝不問屈與伸題嚴陵送别巻我未識江生而知生之名生年始十六文采動羣英乃父嚴州守其學見之行承家今有子賢路擬相仍吾友阮君浩楊欽及其兄與生同筆硯臨别莫為情千里馳書来祈我贈詩聲詩以道情志不以供人事矧我非善鳴何以塞君意雖然仁者贈言古有之要之其言不必寄嘗聞君子學為己請贈此語當篇詩畫圖景崇山巍巍矗天起根盤不知幾十里萬木羣然山之巔其中大者挺然長幹而繁枝明堂之棟應可擬逺山其勢浸微茫雙峯直𥪡青雲裏丈人結廬擅山光閑来呼童攜竹杖出門一徜徉翹然矯首青雲上意欲乗風至帝旁一得至帝旁俯首瞰下方何處民窮何俗陋誰為奸惡誰善良便應奮起今日凭欄手為兹民胞物與一鋪張鋪張畢塞吾責然後歸去来兮舊山阿千駟萬鍾奈爾何題洪氏慈節堂慈母人間非不多慈而節者能幾何洪母之慈似亦少慈不徒愛愛而教一燈母子共分光母讀子讀影相弔若其操節果何如為念夫家世業儒我今儻若差一念萬巻家藏棄無餘天地一逆旅百年能幾許夫在則視夫夫亡則視子但願子有立夫死猶不死妾身自分止於此吁嗟兮洪君君母之賢世罕倫君今莫計位髙下只取胸中一物真我聞立身須以道善名是顯親汗青豈必皆達者未計眼前屈與伸我亦為人子年来已度三十春家貧自少事章句父祖力家百苦辛往年吾祖己捐棄臨行猶願孫成器而今一第市童憐痛哉吾祖安在矣祖母于今老色深念之中痛不能任雙親四目僅一子況復暮景仍駸駸平生學力盡虚耳世事顛迷無與比靜中自笑復自悲授之以政將何以每覽程朱性理書踐履一意負心期古云三十骨骼成輕暴氣質若未移顔淵三十徳行立鄧禹三十功業畢我今三十何為哉少日已去老將来父祖教育良可哀為感洪君訴母苦客燈獨對淚如雨濡毫不管詩家數為君草草傳心語四哀詩成化辛丑予自京師南還以病少留嚴州嚴之士就予館問所疑者二十人其中楊氏二子銑欽最敏而厲夜讀書率至四鼓日不復就寢予固期其成而常戒其過也越數年欽領鄉薦而銑以病卒其親友皆曰是過於苦學所致噫死生有命固己獨不曰守身為大父母惟其疾之憂乎知所以為學者正不當爾予今不得九原而責之矣獨念其正身刑家之化有可言者銑病亟妻陳氏年二十四哭曰婦人喪夫其初誰不云守節但不保其終耳且後日守節與否死者亦安知其能悉哉遂潛入室自縊死既盖棺而夫目亦瞑遺一女欽育之未幾亦死欽哀痛久甚而不能忘也因求大司空鉄泉胡先生大司成雙溪劉先生為序為歌以存兄之名以傳嫂之節以伸巳之恨予素不能詩文適覽二先生之作懐昔感今自訟其缺也不揆而續貂焉而乃追尤銑苦學之過者以欽此病猶或未盡祛也設有議予不宜用死者之事戒生者則豈知予與欽相與之情哉失言之咎吾寧任之四哀之目見胡先生序云一哀兄古有二宋與二蘇我意二楊亦並驅銑也早逝欽也孤霜月哀哀孤雁呼銑也之逝何早乎旬日期盡萬里途二哀兄即師昔日小蘇與大蘇對床舊約老不踈生今此願不可攄青燈獨對讀遺書讀書之意竟何如立徳立功澤八區顯祖宗兮大門閭伸兄遺志無使孤三哀嫂死於貞烈一死人生所必有佐逆偷生多白首往往仍出儒紳胄到此昏顛不可究娟娟女兒閨中秀夫危未絶命先授所決夫目得親覯青天白日九地透至性獨能全所受寧知身名朽不朽嗟嗟末世多盜儒如此女兒真丈夫若夫昔也曾師吾吾今以若為師乎四哀姪女死於孩提兄嫂相從九地遊獨遺孩女哭啾啾丁寧内人勤恤收古有伯道若知否神理茫茫竟莫求掌中珠失竟莫留骨肉之恩竟莫酬此恨此恨百年何人瘳雜著管見上堂尊治病者必求其致病之由然後藥力之施得其地而病可起不然藥物千種所投泛漫無益於疾也近日彗星之異天道𤣥逺固未可必知其果為人間何事而見然以目前之事計之或者外冦之勢方張而吾所以禦之之具瀟然無一可仗天之意其為此耶愚謂此病􅂒也非病源也數十年来上下玩安忽危紀綱日以廢弛紀綱日廢則士風日弊士風日弊則民力日屈民力日屈則國勢之危隠然無形歳復一歳如種在地萌動有期政使無邊場之警亦將有境内之憂故今日急務在朝廷之紀綱其次乃在邊境紀綱既振朝廷既正疆場自固外冦自服矣何謂紀綱不振愚不能周知四方事姑以耳目所及者言之前歳清寧宫災皇上躬自脩省又誡論羣臣各陳時務得失於是兩京科道官請以皇上所得李廣所受朝士賄賂簿籍按行黜罰而更賢共理此固亦脩省之大節目也而中外臣僚狥情為己曲相彌縫竟使皆得無恙縱以人衆為疑亦當去其太甚奈何公論所指曰某為姦之首而姦之首乃晏然朝端不動矣曰某為佞之魁而佞之魁乃亦晏然朝端不動矣至其所貶逐以應天變者僅言事御史胡獻一人耳即此一事皇上所親目而切齒者臣下猶能巧計彌縫如此況於其他之可以游詞浪説眩惑於萬里君門之外者哉愚雖不能悉舉抑亦無待深言今日紀綱之廢弛一至於此士大夫風俗安得而不壊乎故一波動萬波隨謂罪皆計免何用惴惴懐刑謂功皆可以權得何必孜孜從事茍可以利其身赤子之填委溝壑不暇恤也茍可以利其家君父之大事所繫不暇顧也非但大姦大佞其實至愚至癡士風如此民力之屈尚忍言哉今士民之貧者無立錐之地而宦官厠養至有宅舍擬於公侯金銀動以萬計此皆萬民膏血所萃也朝廷錙銖而取於民以為士馬之資者乃多充牣於庸將之家轉運於權倖之門於是兵弱不能衞民敵騎一至而邊人身家一掃空矣諸若此類愚亦不能盡言也意今日中國之虚實四裔亦當知之過半矣甚可懼也抑豈惟四裔為足虞前世草木間英雄往往乘間而起盖士風弊則人才乏民力屈則兵力弱今日天下大勢皆然故謂備禦之具無一可仗也其可不汲汲及時振吾紀綱以捄藥之乎夫賢者必用不肖者必去有功必賞有罪必罰此紀綱之大凡而朝廷之所以為朝廷者也嘗怪周世宗以盖世之雄舉中原百郡之兵而伐南唐宜若無事於再舉者而乘輿三駕首尾四年僅得江北而無全功何則當時南唐僅能持其紀綱也如叛將朱元之妻樞宻使查文徽之女也文徽以寵臣故表乞全其女命唐主批曰只誅朱元妻不殺查家女當時無有能以巧計彌縫之者故國雖弱小猶能支吾大敵焉況以今日堂堂天朝幅員餘萬里萬國無二尊曰兵曰財色色皆可辦者惟紀綱朝振則國勢夕張矣不然地大不足恃久安更可危也當宋元祐閒朝廷相司馬光而黜章惇輩盡革熙豐弊政遼人聞之戒其邊吏曰中國相司馬矣慎母生事開邊隙以此觀之中國動息四裔無不知者其可自廢吾所恃以為外域利哉更以周世宗髙平之戰觀之纔一按誅敗將何暉樊愛能等而兵勢遽赫然改觀於俄頃之間自後百戰百勝率如破竹之勢則紀綱為國之命脉舉四肢貫百骸至重而不輕也明矣若夫紀綱根本所在則又在於人主之一心故心正則百事可正理明而後其心可正講學而後理可明學必正學母徇於文藝之末而後有明理之功其指要則皆不外乎真氏大學衍義一書所言矣嗚呼此一書者真聖學之藏寳也人主不但當以日講經筵凡深宫燕居之際終食造次之頃皆當時時誦服不少遺忘務使其言浸漬融化於一心之内而時出迭見於應物之間然後為有得而天下事皆可無俟多言矣不然安得事事而爭之旦旦而正之也哉此雖書生之常談其實不易之至理盖不患外域之不服而患朝廷之不治不患萬事之不理而患君心之不明今日脩省之計伏惟大臣為國家先謀其大者生之言粗踈繁絮非敢擬為尊者所採以獻上也冀採其意而更為詞以獻上耳又今日兵備廢弛而邊境為尤甚其當捄為尤甚急盖朝廷養兵本以制敵而今多役於權要之門朝廷給財本以養兵而今多落於權要之手氣勢不振於未戰之先威令不行於方戰之際功罪不明於既戰之後我之虚實既素為敵之所窺敵之虚聲益足為我之所畏今欲救之糧賞宜遣朝官以頒給不必悉關由於將領私役宜専委官以防察無事則寧恣之逸遊非親得雋於矢石之間者不得冐功宜從兵部報效試中者乃遣之一或敗事於旗鼓之下者不得逃罪宜委方正官員紀功者并察之然其要在於將帥之人品不凡人品不凡則無事於防察以妨其權其機在於朝廷之紀綱振舉紀綱振舉則自將帥以下無不用命昔儂智髙屢敗官軍宋一用狄青為總帥而南方遂平於旬月之内周世宗始敗於北漢立誅敗將何暉樊愛能等而兵遂無敵於天下唐羣帥討淮西之兵不用宦官監軍而用裴度臨督一舉而事定盖同此將領同此士卒同此器械同此糧賞亦在乎所以用之者何如耳此非經世之大本似亦救時之急務也謹具手啓以備采擇之萬一自箴十四條夫禮者賢愚貴賤之相休戚存亡之幾也四肢百體身之膚殻也愚惡者所均有也心術言行身之精也思齊賢者所致力也於此而不致其力焉是無身也所存者膚殻焉而已矣多言何為事理通達而心氣和平故能言品節詳明而徳性堅定故能立此語其誰不知誦之顧實得者難耳人之真常見於飲食言動之末因仍造次之間故君子慎獨除邪之根也不然畢露矣善愛其身者能以一生為萬載之業或一日而遺數百年之休不知自愛者以其聰明而際盛時操名器徒以就其一巳之私而已矣所謂如入寳山空手回者也斯須不離乎正大則俗所謂吉者亦自不我離於斯須矣雖或不吉猶吉也斷乎必然也天地不能違者也虚而一盡矣最要靜愈靜愈靈步步是理即歩步天堂盖聞天地所以長久者以其氣運於内而不洩耳故仁者靜而夀天下事斷非浮躁者所能完也分陰不惜學力不充當事臨疑口耳無所歸手足無所措不學無術之弊至於赤族立人之道曰仁與義一陰一陽也盖凡接一切人應一切事皆當以仁為主至於仁之行不去處便有義以裁之矣故不窮闕許多當避嫌闕便以聖賢自擬王應韶云此魯男子善學栁下恵之法也書戒五條吾置書亦甚難子孫宜念之善讀之則忠臣孝子碩徳竒才之士皆自此出不負吾所以積書之意也不善讀之或僅足謀祿利而已行業無聞物論不與書於汝竟何有哉吾墓土亦無輝矣讀書貴乎以序而一一則可以致精精則有得而著己矣學不著已雖多何為前輩云臯䕫稷契何書可讀盖此數公者雖未嘗讀書亦未嘗不窮理也窮理力行以致用學之為道何以加此吾嘗見有胷富萬巻筆下如流而實於其身不得幾字受用者則學其可不務擇術哉使臯契輩生今世吾知其亦自不能已於讀書但其讀之得術耳每讀書時輒有欲取而用之之心則亦何必多為也然既有是心則又自不容不多矣書籍視他物尤須愛䕶小學書載顔氏家訓一段盡之矣其借人更須慎與郭文博書凡九段承文博書拳拳欲得京師中好文字議論以為進學之助吾自到京一向匆匆未有可以答来意唯天官冢宰王公舉朝士大夫皆以為方今第一等人吾頗辱其教愛時召至書軒賜之談論間及書史多有可發吾人志意者因憶數段録寄其一皇上一日御經筵公侍講退召問予以大學心有所忿懥一章之㫖予畧述舊聞以對公頗然之因曰今日當講先生於此數句各貼一先字謂事未至而心先有所忿懥則忿懥之行不得其正不知若無箇事有以激其忿懥彼亦安得無端而生忿懥耶即是有所忿懥則忿懥即著於其事矣又安得謂之無事而先忿懥耶予意公此説儘精切茍非有得於體驗者宜道不到此故録之公且微笑當講先生未必有體驗身心之學也其二中庸道不逺人章自詩云伐柯伐柯至君子胡不慥慥耳公亦疑只是一串意謂忠恕貫天下之道如何只把作愛人一端之事吾故意朱子或先入於張子正蒙中所載之三言也其三論語夫子之道忠恕而已矣公不以予舊説為然曰朱子之説亦未當也忠恕不宜分貼一貫曾子本意是謂忠恕一理貫天下之道而無餘者也故曰有一言而可以終身行之者其恕乎不知朱子若得聞此説以為何如亦可見此公之髙也此方是真學問者乎其四孟子無為其所不為無欲其所不欲公亦以為上句是以義制事方外之功也下句是以禮制心直内之功也且曰盡之矣故曰如此而已矣其五人之有徳慧術智者恆存乎疢疾公亦謂朱子所解恐未當盖孟子本言凡人之無智慧者心常安泰不知憂患甚者安其危而利其菑惟有智慧之人則心便常存夫憂患故獨孤臣孽子身履乎逆境其操心也危其慮患也深故能在邦必達在家必達行無不得也此説如何疑朱子解恆存為常由存字與由字義本相逺此亦可備一説也其六易經仁以行之公亦欲主當理無私之説謂愛字狹但寛以居之欲作寛緩以區處之此説未能無疑其七繫辭傳之説亦多未能合公本治易然於各經亦皆涉獵尤熟於書詩常言我亦垂老方理㑹學問此亦可見學問之有益於人矣不然此老何以至今日尚拳拳也而公之徳之才垂老而不衰者其有得於學問之力益信矣公今年七十四其八有一給事中奏請求天下之異才者事下吏部議公偶問予曰此事當何如議處予謝以淺陋不足與此等言論公固令述所聞於朋友間議論云何予對言異才尤光岳所靳亘古不多得今日上之人雖未可絶望當世之無人然亦不可必求其人以實其科端教養精舉察而己矣至於天下之人尤宜自量不可因上之有求而妄應其選以逺大自勵而巳矣況今天下人才大概以科目收盡矣此外所遺異才宜不可多得然清亦疑天下異才或不入於科目但恐亦須以試而知堯之於舜且厯試之必若求之於林野亦當先求於庶官之已試者也其九公又問今學者滿天下何故異才難得予對言是固有由也上之人所以養之者本未盡其道下之人又幸際時之昇平而售之急耳以生所見言之如生稍知章句訓詁人便舉而進之於學宫矣未幾作經義甫成篇便得補廪以為當然矣又未幾作三場文字纔可讀便迫迫期中舉中進士矣一中進士則官已到手或無暇於學或自以為無用學矣其仕而能學者無幾耳又或有過時扞格之患盖識見既淺踐履必薄規為必粗非所謂俟其熟而食之者也況自幼入小學而其所學者多非學做人之實事人才之不如古者以此故雖有異質者亦不能成異才生等躬坐此病今日雖知悔前之欠實蹈扞格之患矣公曰然吾兒子承裕今年二十三丙午年已中舉然吾未欲其急於仕且令靜覽羣書間閱世務冀他日得實用耳此一段似有益於吾輩故詳録之自警詩自怪讀書廿餘年于今始解書中意往聞世俗語津津總道讀書萬倍利吁嗟讀書只為利是亦商人而已矣古昔聖賢所樹立明並日月照天地非義一毫絶胸中方能充養浩然氣方能做得人間事彼志美衣兮沐猴而冠耳司馬相公何等人巍巍勲徳甘布被彼志美食兮多是啖同類人能飽徳膏粱薄簟瓢之中有餘味或志宫室事華居寇公樓臺何地起丈夫以宇宙為家道義是安形骸鄙或志田宅遺子孫賢而多財亦損志關西所遺惟清白雲仍百代榮其裔此外或為燕居娯帷薄之間尤所忌挺挺時賢楊繼宗之官能不攜其累吁嗟復吁嗟世上榮枯無百年人生芳穢有千祀静言思之吾將哀若復不堅須早逝經云人心惟危道心惟微今亟書此我拏誦之每旦出房用提吾耳庶幾不至羞見爾寄張廷實書别吾廷實久矣得緝熙先生傾欵連日私以為天餉也翌旦且復西東敬就燈下索筆附上愚見一二代靣論因便示正幸也向日所寄宋地官来華翰及次韻白沙老先生諸詩已領感佩感佩人之一身亦微矣而充其能事直至於與天地參者子在齊聞韶三月不知肉味且看聖人是甚麽様下工夫我輩尚何以自諉乎每讀書時輙有欲取而用之之心則亦何必多為也然既有此心則自不容不多矣天地人物􅀈柄皆在靜上道學乃造化元物也故靈透地穿天木石眼經邦濟世水雲身心當靜處天機現氣到完時鬼力隨與姚徳輝古云三十年前好用工吾人年且三十矣將奈何昔項羽之救趙也既渡河沈船破釡持三日糧示士卒必死無還心一戰勝之由此遂霸天下夫羽無足言也然能決志用勇直於死中求生如此是亦學者所當師其一節而未可以人廢也漳浦姚徳輝從予遊將歸求予言以警其惰予始為借粗論之㑹見陳進忠其亦以是語之也贈鄭温卿宰鄒平虚心順理毋激毋隨凡弊事且先去其太甚者使愛孚於下而敬不失其上久之無不可為之事矣凡能為百姓立久大之利者類非作色於旦夕者所能也學者平居常患不得行道一旦得百里之邑而君之多有不樂就之意是皆欲一蹴到公卿者邪安在其為行道借曰今之作縣實難然賢公卿由此而出者多矣謂非進徳之地其不可也夫自古卿相與草木同腐或遺臭於世者何限而卓魯輩乃僅以一縣令名萬世其後来亦多至卿相盖其初心但知為縣令而不知為卿相也辱誤愛索贈言顧闇劣何以稱求益之盛心適歸来夜已深得恵東云發行在明早拙才匆遽不能成文草草如拾碎耳然何事於此吾温卿平昔所讀書多矣廬墓文移一條欽差提督學校江西等處提刑按察司副使蔡為廬墓以終喪服事據饒州府呈據本府儒學申據本學廪膳生員周鴻呈有母董氏於𢎞治十六年八月二十六日病故至次年閏七月二十六日父又繼故鴻居喪三十九箇月母喪雖終父服尚缺一十五箇月況廬墓未滿二年痛哀之情不能自釋云云如䝉呈乞姑容在外廬墓私補父服等因備呈到職參照先王制禮不容稍有過不及之差周鴻母喪幾一載繼喪父則父母之哀一時俱已作於其心而父母之服及一切喪事俱不容不並行於外矣今乃欲於母喪二十七箇月之後復脩父服如數則是方母服未滿之先其哀父之念能且遏之使不行格之使有待乎宜無是理也盖雖過厚之意實非中正之行方今三重昭昭文軌攸同自用自専常刑罔赦吾所期於鴻者要在為善於獨不求甚異於人使無名過其實乃為恰好不謂此舉乃涉迂怪也故為直之使知所勵答洪元達書凡十三段承元達書一通及問目三條覽之知學識進步至喜也前二條所問雖關理致却容易剖析末一條只是度數之間然頗難分理自克忠到數日尚匆匆未暇序答兹遇人便且就末條所問述其管見其前二條稍暇亦當寄復以相質證有未安處便中希更不惜駁難如此往復最有益也其一按孟子註云周七八月夏五六月則周正月為夏十一月可知矣是乃所謂天正者也不然天正之正字何所安著商正義亦宜然但愧覽閱未博不得其證耳其二易臨卦本義云或曰八月謂夏正八月於卦為觀其以或曰冠之者界前説也前説是謂八箇月也非必以周正言也然周正於遯卦之六月亦適謂之八月但文王繫辭時未有周正耳其三春秋胡氏傳夏時冠周月之説雖非後學所敢輕議然每讀之覺其曲折費力終未能惬然於心或意經所書王正月者盖謂時王之正月明其非夏時商時所謂正月耳為自夏商以前便已有三正迭用之事矣夏啓聲有扈之罪云怠棄三正可見矣故夫子於春秋有王正之文歟想王正二字亦有自来不必是孔子所立也其四夏時冠周月之説朱子當時又嘗疑之其説見春秋大全註云文定春秋説夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改作春正月某便不敢信據今周禮有正月有正歳則周寔是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅耳愚謂據朱子説則周時之所謂春非夏時之所謂春亦明矣此説與今胡傳不同其五正字既可推移而迭用春夏秋冬疑亦可隨之而遞遷矣設使今日乍以十一月為正月人必怪之然久之人亦必安然以為正月而不覺其異矣使今日乍以十一月為春人又必怪之然久之又必安然以為春而不覺其異矣試以他事試之便亦可見但周正終不如夏時之善故夫子私以授顔子曰行夏之時若夫春秋所載皆周之事其從周似無疑孔子平日以生今世反古道者為何如人顧於尊周之書乃自犯之乎其告顔淵云云者謂若得邦家而制治則云云也胡氏以為此見諸行事之驗也愚未敢必其然儻如其説經文不用書王字矣而又何謂作春秋以尊王也其六胡氏所據有二説一曰前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也是未知有三正迭用之故矣既改正便當改月數也又周詩七月篇亦有用夏正者七月流火九月授衣之類其七又其一曰後乎周者以亥為正其書始建國曰元年冬十月則知時不易也不知秦百事不師古顛倒錯繆何可殫言其以亥月為正已是不識正字為何説矣則又安知改月以從時乎縱使改十月為正月亦一槩顛錯耳本無足深論也其八周以建子之月為歳首未盡善也孔子春秋不之改者據實而録也秦以建亥之月為歳首又全無謂也朱子綱目不之改者亦據實而録也周改正春秋於歳首則從而正月之秦無所謂改正者綱目於歳首則只從而十月之此亦可證春秋於周月數未嘗改矣使胡氏脩綱目亦將以夏時冠秦月而謂之春正月乎其曰冬十月者又秦之不知師古而偶存古之一節者也然皆無足深論其九又按莊二十八年冬經書大無麥禾胡傳曰麥熟於夏禾成在秋而書於冬者有司於歳抄㑹計歳入之多寡虚實也此説亦覺曲折愚意經所書之冬即夏時之秋也其與夏麥併言省文例也若大無麥禾為指在倉廪者則大有年亦為指在倉廪者乎其十冬十月既云建亥則月數用夏正明矣此節無庸疑者自秦始皇二十六年以後至漢武帝太初元年以前俱用冬十月為歳首来問謂綱目於漢武未改朔之前一皆以夏正書之大槩然也但正月之正字為虚用耳其十一四時及各月數雖易而甲子未嘗易也故夏正月建寅周三月亦建寅商正月建丑周二月亦建丑知此則知如今年辛亥須管到建亥之月然後今年歳君始滿明年壬子亦須管到建亥之月然後滿今俗以十二月交春時為滿者非也所以千歳之日至必以甲子年甲子月甲子日甲子時為厯元云其十二大抵周時雖以建子月為正月然天下終有呼為十一月者餘倣此故左傳載僖公五年卜偃言滅虢之期曰其九月十月之交乎丙子旦日在尾月在箕鶉火中而下文即云冬十二月丙子朔滅虢林堯叟註云以星數推之乃夏之九月十月晦朔交㑹之日夏十月周之十二月也是周人固以周正紀事亦或有時用夏正矣盖公家紀事必用周正者時王之制也私家紀事或用夏正者以所自来者逺也而亦可見夏時之正有非周正可及在人自有所不能置而不用者也予嘗謂凡古聖賢所創法皆不可據今所便而任己見輕改之以周公之聖夜以繼日之思其改夏正一節分明改得未盡善況他人乎其十三三正迭用之説似踈而通且亦有據其試思之前二條得暇更欲寫出若他有疑儘可寄来商量此段可質恆謙亦可寄徳馨仲殷二友議之聖人心安於正論昔有問於程子者曰形貌怠惰而心不慢可乎程子曰安有箕踞而心不慢者愚嘗因是而得夫心迹相符之説今觀魯論記夫子席不正不坐而先儒謝氏以聖人心安於正釋之嗚呼心迹之相符也審矣盖知人之箕踞由於其心之慢則知聖人之席不正不坐由於其心之安於正此其心迹相符之理正可以相形觀也愚故特舉程子之言以發謝氏之意於以見學聖人者必自治心始也是為論劉項論或謂劉項雖成敗不同要皆一時英雄也愚竊謂不然夫英雄以識見為先項氏當垓下之敗曰此天亡我非戰之罪且羽既以其亡為非戰之罪則自古之亡者如桀紂如幽厲可數也其果皆戰之罪乎而帝王之興也又果皆戰之功乎此則項氏之識見也項氏無論矣髙帝大風之歌曰威加海内兮歸故鄉安得猛士兮守四方嗚呼王者之守四方也猛士而已乎此則漢髙之識見也雖其仁暴興廢不同要皆未到英雄本色也岳飛班師嗚呼岳公報國之志所以終不酬者果天耶人耶彼髙宗秦檜無復論矣愚獨恨公之未知權也孝子之於親也從治命不從亂命公向者親受髙宗肺腑之屬曰中興之事一以委卿矣今乃無故一日十二金字牌趣班師此非檜之為而誰檜為之而髙宗聽之則亦亂命之類耳將在軍君命有所不受正謂此也茍利社稷専之可矣公亦素好左氏獨不知斷以此義耶且其時萬世之悲憤既積吾胸中不世之機㑹又在吾目前朝廷乃無故入姦臣之言使我十年之功廢於一旦將不復以宗社為意父兄為念果何説也吾為國臣子誓赤心報國者也矧有成命在又民遮道慟哭者聲振野此亦天意也不以此時特出不得已之計脱然於㝷常法度之外而有所敢為則終為姦臣所制縛而君父大事自我去矣又何言哉夫權姦可畏髙宗之不足倚吾亦知之矣獨不見前日宗留守乎人臣殺其身有益於君則為之況汚其身以善其君乎當日之事愚以為正當用權以濟直馳表而南極陳時之難得易失不敢自墜于姦臣之計以負陛下肺腑之托而延吾國家萬世之辱隨舉鞭而北滅此而後朝食可幾也胡為乎竟以不得擅留一語自將哉夫徇君命之忠孰與為吾君報萬世不共戴天之讐之為忠也且髙宗之所以忍與金和而急召公者亦惟懼吾力之未足以克而反速来禍耳今吾自揆吾力必克無疑矣一舉而克之以還報吾君以為如何也既克之日安集之餘人民府庫籍上於朝將士卒伍亦約束以俟朝命吾特蓬頭跣足步至國門上表自劾其違命進兵之罪藉藁以待粉身碎骨萬死甘之吾赤心報國事畢矣儻必吾全則從此乞骸骨歸田里終身布衣蔬食自處於除名不叙之數曰後有違君命者雖能成功如此律若是亦足以存王法而白此心於吾君與天下来世矣盖其轍行雖近類桓温而心迹則與温有間不害為同行異情也此乃所謂權也夫權出於不得已者也若果不得已而猶不用權雖聖人無以濟事而聖人亦不立權之説以教天下萬世矣況公當日之事尤非可以一夕安者乎易有之曰大過之時大矣哉大過君子以獨立不懼意大過之時必有大過人之才而敢為大過人之事不膠於㝷常故轍焉乃克有濟也是故以天下與人上世未有也而堯始行之君無道而伐之上世未有也而湯始行之君覆典刑而放之自艾而復之上世未有也而伊尹始行之萬世之下終不聞有以為名教罪人者使公當日而出此其要歸于忠孝耳又非有改立放弑事也誰得而罪之嗟夫大丈夫建大事茍非利己安能為㝷常法度所制縛哉青天白日萬世一日也所責備乎英雄者正在此耳今一解而歸非惟前功盡棄其身之不免人固已豫知之矣嗚呼公何不為趙氏九廟神主惜此去就乎此見可與權者之難也嗚呼使公當日雪恥之志既酬而後為檜所害愚亦為公甘之矣臯陶執瞽瞍疑桃應問曰舜為天子臯陶為士瞽瞍殺人則如之何孟子曰執之而已矣執之之説愚猶未能釋然也夫舜君也臯陶臣也臣之於君猶子之於父也瞽瞍寔舜之父則亦臯陶之大父也不然亦非臯陶之屬而為臯陶者乃但知有舜而不知有舜之父知有其父而不知有父之父執之而已矣愚恐臯陶於此或有所不安也非惟不能安其勢必至於使舜竊負以逃而舜之逃實臯陶驅之也則一時之天地神人其將委之誰乎為匹夫復讐固義也以一匹夫之故而遂廢天地神人所依歸之聖主於權衡得乎孔子曰父為子隠子為父隠直在其中矣舜父殺人臯陶必執而戮之舜亦聽其執而不禁焉如此乃得為直乎夫臯陶明刑以弼教也使天子之父殺人為之臣子者必執而甘心焉斯亦可以為教否乎凡此皆愚之所展轉於心而未能寔得聖賢之意者也然則桃應之問也孟子答之當云何竊意孟子當時只可答云若舜為天子其父必無殺人之事也如此則絶不費辭而已足以倒桃應之問矣設桃應復曰瞽瞍向者尚欲殺舜矣何以謂其必無殺人之事也則將應之曰欲殺舜者未底豫之日也瞽瞍之未底豫也舜方如窮人之無所歸其肯安受堯之天下乎既受堯之天下則瞽瞍底豫矣瞽瞍既底豫又安有殺人之事也設桃應復曰瞽瞍未底豫舜嘗妻帝之二女而不告矣受堯之天下又安知其必底豫而後可也則將應之曰不告而娶為無後也孟子固有是説矣然無後與無親其罪恐未易差等此又愚之所未能釋然者也且不得乎親不可以為人又可為天下君乎姑記其疑以俟達者衞武公孟子孰優邵國賢述某人問衞武公與孟子孰優清謂武公實踐之學疑孟子無以過其入為王卿士信無瑕可指矣然不聞有大建立於天下後世也使孟子得君計其規模運用當有旋乾轉坤張皇皇極之理不但如斯而已也抑六合之内上有天下有地中有人自伏羲神農黄帝堯舜禹湯文武周公孔子顔曾思孟及周程張朱之數聖賢則盡人道立皇極於中而上配天下配地更無所與讓者也其餘羣哲則槩似紫薇垣中諸有名大星宿環拱乎帝座者也曰然則詩謂睿聖武公又何得為孟子屈邪曰伯夷伊尹栁下恵獨不謂之聖乎但謂有功徳於一時則可孟子則有功徳於萬世願學孔子而不為夷尹者也故宰我謂夫子賢於堯舜是亦可以例矣論詩詩學在程朱當為後世主張了奈何亦混衆人作律詩夫詩以言志耳豈必用平側對偶而後成其言哉既拘對偶則有當言者以不諧聲律而已之又有不必言者姑以凑押聲律矣是何趣味是何道理其始創為律詩者決非有大人之志有不俗之見者也不可復以導士亷生威銘亷則威伸清風先人茍舉動得其當令之行也如神不然雖周公之才美與師尹之勢位匹夫或能勝予也譬之神龍失水抑予非不能論理而徒論其利害也論其利害斯尤可畏是故君子靜為本儉為貴李膺按部貪濁聞風而解佩亦自省事而無所係累矣靜生明銘靜則生明方寸之府天朗日晶坐照来物物無遁情毗女知廢陵母知興郭公知杞蘇老知荆為蜀山人為董五經不可度思盖人心本天地之至精惟節欲定神以養之而不為物所鬬則自還其虛靈不然雲霧漲空雖泰山在前對之如䝉矧無形之至理與未来之事功嗚呼我憶曹爽人固已禽之胸中矣駑馬戀豆芻猶欲為富家翁虚齋集巻一
